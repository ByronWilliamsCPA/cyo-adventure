# SonarCloud Configuration for CYO Adventure
# Documentation: https://docs.sonarsource.com/sonarqube-cloud/

# =============================================================================
# Project Identification
# =============================================================================
sonar.organization=byronwilliamscpa
sonar.projectKey=ByronWilliamsCPA_cyo-adventure
sonar.projectName=CYO Adventure
# sonar.projectVersion is deliberately NOT set here. It was pinned at 0.1.0
# while the real version reached 0.28.0, because nothing bumps this file on
# release. A silently stale version is worse than an absent one: it is the
# baseline for a "previous_version" New Code definition, so a frozen value
# would make every change since 0.1.0 count as new forever. Leave it unset and
# let SonarCloud default, or pass -Dsonar.projectVersion from CI if it is ever
# actually needed.

# =============================================================================
# Source Code Configuration
# =============================================================================
# !! PRECEDENCE WARNING !!
# .github/workflows/sonarcloud.yml calls the org reusable workflow
# ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml, which
# invokes sonarqube-scan-action with explicit -D arguments. Command-line -D
# beats this file, so the four settings marked "[overridden in CI]" below have
# NO effect on a CI run and are kept only so a local `sonar-scanner` invocation
# behaves the same way. Change the workflow inputs, not these lines.
# #VERIFY: if a value here disagrees with the scanner args in that reusable
# workflow, the workflow wins; reconcile there first.

# Source directories (comma-separated)   [overridden in CI: -Dsonar.sources=src]
sonar.sources=src/

# Test directories (comma-separated)     [live: no CI override]
sonar.tests=tests/

# Python version   [overridden in CI: -Dsonar.python.version from the
# `python-version` workflow input, currently 3.14]. Kept in sync with that
# input so local scans match; 3.12 here was stale after the #295 upgrade.
sonar.python.version=3.14

# =============================================================================
# Test Coverage Configuration
# =============================================================================
# Coverage report paths (Cobertura XML format)   [overridden in CI]
# Generated by: pytest --cov=src --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml

# Branch coverage (recommended for thorough analysis)
# Enabled via pytest-cov: --cov-branch

# =============================================================================
# Exclusions
# =============================================================================
# Files to exclude from analysis
sonar.exclusions=\
  **/__pycache__/**,\
  **/.venv/**,\
  **/.pytest_cache/**,\
  **/.mypy_cache/**,\
  **/.ruff_cache/**,\
  **/dist/**,\
  **/build/**,\
  **/*.egg-info/**,\
  **/node_modules/**,\
  **/.git/**

# Test files to exclude from coverage
sonar.coverage.exclusions=\
  **/tests/**,\
  **/*_test.py,\
  **/test_*.py,\
  **/conftest.py

# Files to exclude from duplication detection
sonar.cpd.exclusions=\
  **/tests/**,\
  **/*_test.py,\
  **/test_*.py

# =============================================================================
# Quality Gate & New Code Definition
# =============================================================================
# Define what constitutes "new code" for analysis
# Options: previous_version, number_of_days, reference_branch
sonar.newCode.referenceBranch=main

# =============================================================================
# Issue Filtering (Optional)
# =============================================================================
# Ignore specific rules for certain files
# Format: sonar.issue.ignore.multicriteria.<key>.ruleKey=<rule>
#         sonar.issue.ignore.multicriteria.<key>.resourceKey=<pattern>

# Example: Ignore complexity warnings in __init__.py files
sonar.issue.ignore.multicriteria=e1,e2,e3

sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/__init__.py

# Example: Ignore string duplication in test files
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/tests/**

# Example: Ignore too-many-arguments in test fixtures
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e3.resourceKey=**/conftest.py

# =============================================================================
# Additional Linter Reports (Optional)
# =============================================================================
# If using external linters, specify report paths
# sonar.python.pylint.reportPaths=pylint-report.txt
# sonar.python.bandit.reportPaths=bandit-report.json
# sonar.python.mypy.reportPaths=mypy-report.txt

# =============================================================================
# Performance & Debugging
# =============================================================================
# Enable verbose logging for debugging (set to false in production)
# sonar.verbose=false

# Scanner timeout (seconds)
# sonar.scanner.socketTimeout=300

# =============================================================================
# Links (displayed in SonarCloud UI)
# =============================================================================
sonar.links.homepage=https://github.com/ByronWilliamsCPA/cyo-adventure
sonar.links.ci=https://github.com/ByronWilliamsCPA/cyo-adventure/actions
sonar.links.issue=https://github.com/ByronWilliamsCPA/cyo-adventure/issues
sonar.links.scm=https://github.com/ByronWilliamsCPA/cyo-adventure

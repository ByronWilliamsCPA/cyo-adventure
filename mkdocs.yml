
# MkDocs Configuration for CYO Adventure
# Documentation: https://www.mkdocs.org/user-guide/configuration/

site_name: CYO Adventure
site_description: A choose-your-own-adventure reading app for kids
site_author: Byron Williams
site_url: https://cyo-adventure.readthedocs.io
repo_url: https://github.com/ByronWilliamsCPA/cyo-adventure
repo_name: ByronWilliamsCPA/cyo-adventure
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2025 Byron Williams

# Theme Configuration
theme:
  name: material
  custom_dir: overrides
  language: en

  # Color Palette
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Features
  features:
    - navigation.instant      # Instant loading
    - navigation.tracking     # Anchor tracking
    - navigation.tabs         # Top-level navigation tabs
    - navigation.sections     # Navigation sections
    - navigation.expand       # Expand sections by default
    - navigation.indexes      # Section index pages
    - navigation.top          # Back to top button
    - search.suggest          # Search suggestions
    - search.highlight        # Highlight search results
    - content.code.copy       # Copy code button
    - content.code.annotate   # Code annotations

  # Fonts
  font:
    text: Roboto
    code: Roboto Mono

  # Icons
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

  - autorefs  # Automatic cross-references

  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_if_no_docstring: false
            show_source: false
            show_root_heading: true
            show_root_toc_entry: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: alphabetical
            group_by_category: true
            show_category_heading: true
            filters:
              - "!^_"  # Hide private members
            extensions:
              - griffe_pydantic  # Render Pydantic constraints

  - section-index  # Section index pages

  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      type: date

  - gen-files:
      scripts:
        - tools/gen_tools_catalog.py

# Markdown Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Extra Configuration
extra:
  org_name: "Byron Williams"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/williaby
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

# Navigation
nav:
  - Home: index.md

  - User Guide:
      - Overview: guides/overview.md
      - Configuration: guides/configuration.md
      - Usage: guides/usage.md

  - API Reference:
      - Overview: api-reference.md

  - Architecture:
      - Overview: architecture/README.md
      - System Overview: architecture/system-overview.md
      - Generation Pipeline: architecture/generation-pipeline.md
      - Validation and Player: architecture/validation-and-player.md
      - Data Model: architecture/data-model.md
      - Deployment: architecture/deployment.md

  - Development:
      - Architecture: development/architecture.md
      - Testing: development/testing.md
      - Code Quality: development/code-quality.md
      - Contributing: development/contributing.md

  - Project:
      - Roadmap: project/roadmap.md
      - Changelog: project/changelog.md
      - License: project/license.md

  - Planning:
      - Overview: planning/index.md
      - Project Vision: planning/project-vision.md
      - Tech Specification: planning/tech-spec.md
      - Project Plan: planning/PROJECT-PLAN.md
      - Roadmap: planning/roadmap.md
      - ADRs:
          - Overview: planning/adr/README.md
          - ADR-001: planning/adr/adr-001-story-format-json-storybook.md
          - ADR-002: planning/adr/adr-002-client-pwa.md
          - ADR-003: planning/adr/adr-003-frontier-llm-generation.md
          - ADR-004: planning/adr/adr-004-homelab-first-deployment.md
          - ADR-005: planning/adr/adr-005-mandatory-human-approval.md
          - ADR-006: planning/adr/adr-006-conditions-inhouse-evaluator.md

  - Supplementary Docs:
      - Project Setup: PROJECT_SETUP.md
      - OpenSSF Compliance: OPENSSF_COMPLIANCE.md
      - Python Compatibility: PYTHON_COMPATIBILITY.md
      - Template Feedback: template_feedback.md

  - Reference:
      - Architecture Decision Records: ADRs/README.md
      - ADR Template: ADRs/adr-template.md

# Docs exclusion
# planning/README.md conflicts with planning/index.md (which is the proper index)
# planning/project-plan-template.md is a template, not intended for publishing
exclude_docs: |
  planning/README.md
  planning/project-plan-template.md

# Validation
strict: true

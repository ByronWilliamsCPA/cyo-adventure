# Codecov Configuration for CYO Adventure
# A choose-your-own-adventure reading app for kids

# Security: Only read configuration from main branch
codecov:
  strict_yaml_branch: main
  require_ci_to_pass: true
  max_report_age: 12h
  notify:
    # Three coverage uploads gate statuses/comments: backend (coverage.xml),
    # frontend (lcov), and design-system (lcov). Test Analytics uploads
    # (junit, flags frontend/api) do not count here. Keep this equal to the
    # number of COVERAGE uploads, or the comment/status deadlocks waiting.
    after_n_builds: 3
    wait_for_ci: true

# Coverage targets and thresholds
coverage:
  precision: 2
  round: down
  range: 70..95

  status:
    project:
      default:
        # Current baseline: ~80%, targeting 80%+
        target: "80%"
        threshold: 2%
        if_ci_failed: error
        # Prevent deadlock on doc-only/config-only PRs with no coverage uploaded
        if_not_found: success

    patch:
      default:
        # New code must meet 90% patch coverage per OpenSSF standards
        target: 90%
        threshold: 5%
        if_ci_failed: error
        if_not_found: success
        # Pass gracefully when well-tested code is deleted (avoids penalizing cleanup PRs)
        removed_code_behavior: fully_covered_patch

# Flags (single axis). See standards/testing.md section 16.2.
#
# CYO is full-stack and its runners cannot split by test type in one pass:
#   - backend runs the whole pytest suite (unit + integration + security
#     markers) in one reusable-workflow invocation -> one coverage.xml.
#   - each Vitest package runs all its component tests in one pass -> one lcov.
# Per the standard's full-stack exception, we therefore flag by SURFACE, not
# by test type, and carry the code-area split in components (below). Only
# flags that an uploader actually produces are declared, so the Codecov Flags
# tab shows live data instead of "No report uploaded" placeholders.
#
# Test-type coverage flags (unit/integration/security/e2e/contract) are a
# FOLLOW-UP: promote them by splitting the backend into nox-session-per-type
# uploads (`nox -s unit`, `-s integration`, ...), each uploaded with `-F <type>`.
# Until then: contract is enforced by the OpenAPI drift CI job, security by
# bandit + `-m security` inside the backend gate, e2e by the mocked Playwright
# CI job. `api` is a Test Analytics flag (newman JUnit; see ci.yml, guarded on
# a Postman collection existing).
flags:
  backend:
    carryforward: true
    paths:
      - src/cyo_adventure/
  frontend:
    carryforward: true
    paths:
      - frontend/src/
  design-system:
    carryforward: true
    paths:
      - frontend/design-system/src/
  api:
    # Test Analytics only (newman produces no code coverage); no coverage
    # status is set on this flag.
    carryforward: true

flag_management:
  default_rules:
    carryforward: true
    # if_not_found: success on each status keeps dormant flags (e.g. api before
    # a Postman collection exists) from blocking when they upload no report.
    statuses:
      - type: project
        target: auto
        threshold: 2%
        if_not_found: success

  individual_flags:
    - name: backend
      statuses:
        - type: project
          target: 80%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 90%
          threshold: 5%
          if_not_found: success

    - name: frontend
      statuses:
        - type: project
          target: 70%
          threshold: 3%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 70%
          threshold: 5%
          if_not_found: success

    - name: design-system
      statuses:
        - type: project
          target: 75%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 75%
          threshold: 5%
          if_not_found: success

# Components carry the "which code area" axis (orthogonal to flags). Critical
# modules for a kids' reading app get 90/95 overrides per standards section 16.3:
# content moderation/safety and the generation pipeline are the outsized-blast
# -radius areas. component_id values are immutable once created.
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 2%
        if_not_found: success

  individual_components:
    - component_id: backend
      name: Backend (all)
      paths:
        - src/cyo_adventure/**

    - component_id: safety-critical
      name: Safety & Security Critical
      # Content moderation is the safety gate for a children's app; the
      # security middleware + core plumbing carry every request.
      paths:
        - src/cyo_adventure/moderation/**
        - src/cyo_adventure/middleware/**
        - src/cyo_adventure/core/**
      statuses:
        - type: project
          target: 90%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 95%
          threshold: 2%
          if_not_found: success

    - component_id: generation-pipeline
      name: Story Generation Pipeline
      # Data-processing pipeline (LLM generation -> validation -> publish).
      # External-LLM code is hard to fully cover, so 85/90 rather than 90/95.
      paths:
        - src/cyo_adventure/generation/**
        - src/cyo_adventure/validator/**
        - src/cyo_adventure/publishing/**
      statuses:
        - type: project
          target: 85%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 90%
          threshold: 5%
          if_not_found: success

    - component_id: frontend
      name: Frontend (React app)
      paths:
        - frontend/src/**

    - component_id: design-system
      name: Design System
      paths:
        - frontend/design-system/src/**

# Paths to ignore from coverage
ignore:
  # Test directories
  - "tests/**"
  - "**/*_test.py"
  - "**/test_*.py"

  # Validation scripts (not production code)
  - "validation/**"

  # Python cache and compiled files
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/*.pyd"
  - "**/*.so"
  - "**/*.dll"
  - "**/*.dylib"

  # Virtual environments
  - ".env/**"
  - ".venv/**"
  - "env/**"
  - "venv/**"
  - "ENV/**"
  - "env.bak/**"
  - "venv.bak/**"

  # IDE and editor files
  - ".vscode/**"
  - ".idea/**"
  - "*.swp"
  - "*.swo"
  - "*~"
  - ".DS_Store"

  # Build and distribution
  - "dist/**"
  - "build/**"
  - "*.egg-info/**"
  - ".eggs/**"
  - "*.egg"
  - "wheels/**"

  # Documentation
  - "docs/**"
  - "*.md"
  - "*.rst"

  # Configuration files
  - "*.toml"
  - "*.cfg"
  - "*.ini"
  - "*.yaml"
  - "*.yml"

  # Security and secrets
  - ".secrets*"
  - ".age"
  - ".sops.*"
  - "*.key"
  - "*.pem"

  # Dependency files
  - "poetry.lock"
  - "requirements*.txt"
  - "Pipfile.lock"

  # Git and CI
  - ".git/**"
  - ".github/**"
  - ".gitignore"
  - ".gitattributes"

  # Logs and temporary files
  - "logs/**"
  - "*.log"
  - ".pytest_cache/**"
  - ".mypy_cache/**"
  - ".ruff_cache/**"
  - "htmlcov/**"
  - ".coverage*"
  - "coverage.xml"

  # Temporary cleanup directory
  - "tmp_cleanup/**"

# Pull request comment configuration
comment:
  # components = per-component coverage breakdown. ("testcase" is NOT a valid
  # layout token; it made Codecov reject the whole config. Test Analytics
  # results surface in the Tests tab and their own PR comment, not via layout.)
  layout: "reach, diff, flags, components, files"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true
  # Show carryforward flag data in PR comments (hidden by default when carryforward: true)
  show_carryforward_flags: true

github_checks:
  # Annotations conflict with flags/components and cannot be cleared once posted
  # (GitHub API limitation). Use PR comments + Codecov UI for line-level investigation.
  # See: https://docs.codecov.com/docs/github-checks
  annotations: false

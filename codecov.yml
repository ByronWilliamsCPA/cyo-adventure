# Codecov Configuration for CYO Adventure
# A choose-your-own-adventure reading app for kids

# Security: Only read configuration from main branch
codecov:
  strict_yaml_branch: main
  require_ci_to_pass: true
  max_report_age: 12h
  notify:
    # Coverage uploads that gate statuses/comments: unit, integration, frontend,
    # design-system (security is a bonus 5th when security-marked tests exist).
    # Keep this at or below the reliably-produced count, or the comment/status
    # deadlocks waiting for an upload that never arrives.
    after_n_builds: 4
    wait_for_ci: true

# Coverage targets and thresholds
coverage:
  precision: 2
  round: down
  range: 70..95

  status:
    project:
      default:
        # Current baseline: ~80%, targeting 80%+
        target: "80%"
        threshold: 2%
        if_ci_failed: error
        # Prevent deadlock on doc-only/config-only PRs with no coverage uploaded
        if_not_found: success

    patch:
      default:
        # New code must meet 90% patch coverage per OpenSSF standards
        target: 90%
        threshold: 5%
        if_ci_failed: error
        if_not_found: success
        # Pass gracefully when well-tested code is deleted (avoids penalizing cleanup PRs)
        removed_code_behavior: fully_covered_patch

# Flags (single axis: one report -> one flag), per the org's tiered Codecov
# flag standard (testing.md 16.2 in the org standards repo, not this repo).
#
# Backend is flagged by TEST TYPE: the reusable python-ci workflow runs the
# unit, integration, and security buckets separately and emits
# coverage-{unit,integration,security}.xml + junit-{...}.xml; ci.yml's
# coverage-upload job uploads each under its own flag.
#
# Frontend + design-system are flagged by SURFACE: Vitest runs all component
# tests in one pass and cannot split by test type, so a surface flag is used
# per the standard's full-stack exception. The code-area split (frontend vs
# backend modules) is carried by components (below), which are orthogonal to
# flags. `api` is a Test-Analytics-only flag (newman JUnit from ci.yml's
# api-tests job, running docs/api/postman-collection.json) with no coverage
# status by design.
flags:
  unit:
    carryforward: true
    paths:
      - src/cyo_adventure/
  integration:
    carryforward: true
    paths:
      - src/cyo_adventure/
  security:
    carryforward: true
    paths:
      - src/cyo_adventure/
  frontend:
    carryforward: true
    paths:
      - frontend/src/
  design-system:
    carryforward: true
    paths:
      - frontend/design-system/src/
  api:
    carryforward: true

flag_management:
  default_rules:
    carryforward: true
    # if_not_found: success keeps a flag that uploaded no report this run (e.g.
    # api, which is Test-Analytics-only and never uploads coverage, or security
    # when no security-marked tests exist) from blocking.
    statuses:
      - type: project
        target: auto
        threshold: 2%
        if_not_found: success

  individual_flags:
    - name: unit
      statuses:
        - type: project
          target: 85%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 90%
          threshold: 5%
          if_not_found: success

    - name: integration
      statuses:
        - type: project
          target: 75%
          threshold: 3%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 70%
          threshold: 5%
          if_not_found: success

    - name: security
      statuses:
        - type: project
          target: auto
          threshold: 2%
          if_not_found: success
        - type: patch
          target: 80%
          threshold: 5%
          if_not_found: success

    - name: frontend
      statuses:
        - type: project
          target: 70%
          threshold: 3%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 70%
          threshold: 5%
          if_not_found: success

    - name: design-system
      statuses:
        - type: project
          target: 75%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 75%
          threshold: 5%
          if_not_found: success

# Components carry the "which code area" axis (orthogonal to flags). Critical
# modules for a kids' reading app get 90/95 overrides per standards section 16.3:
# content moderation/safety and the generation pipeline are the outsized-blast
# -radius areas. component_id values are immutable once created.
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 2%
        if_not_found: success

  individual_components:
    - component_id: backend
      name: Backend (all)
      paths:
        - src/cyo_adventure/**

    - component_id: safety-critical
      name: Safety & Security Critical
      # Content moderation is the safety gate for a children's app; the
      # security middleware + core plumbing carry every request; api/deps.py is
      # the auth boundary and publishing is the approve-and-publish gate.
      paths:
        - src/cyo_adventure/moderation/**
        - src/cyo_adventure/middleware/**
        - src/cyo_adventure/core/**
        - src/cyo_adventure/api/deps.py
        - src/cyo_adventure/publishing/**
      statuses:
        - type: project
          target: 90%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 95%
          threshold: 2%
          if_not_found: success

    - component_id: generation-pipeline
      name: Story Generation Pipeline
      # Data-processing pipeline (LLM generation -> validation -> publish).
      # External-LLM code is hard to fully cover, so 85/90 rather than 90/95.
      paths:
        - src/cyo_adventure/generation/**
        - src/cyo_adventure/validator/**
        - src/cyo_adventure/publishing/**
      statuses:
        - type: project
          target: 85%
          threshold: 2%
          if_ci_failed: error
          if_not_found: success
        - type: patch
          target: 90%
          threshold: 5%
          if_not_found: success

    - component_id: frontend
      name: Frontend (React app)
      paths:
        - frontend/src/**

    - component_id: design-system
      name: Design System
      paths:
        - frontend/design-system/src/**

# Paths to ignore from coverage
ignore:
  # Test directories
  - "tests/**"
  - "**/*_test.py"
  - "**/test_*.py"

  # Validation scripts (not production code)
  - "validation/**"

  # Python cache and compiled files
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "**/*.pyd"
  - "**/*.so"
  - "**/*.dll"
  - "**/*.dylib"

  # Virtual environments
  - ".env/**"
  - ".venv/**"
  - "env/**"
  - "venv/**"
  - "ENV/**"
  - "env.bak/**"
  - "venv.bak/**"

  # IDE and editor files
  - ".vscode/**"
  - ".idea/**"
  - "*.swp"
  - "*.swo"
  - "*~"
  - ".DS_Store"

  # Build and distribution
  - "dist/**"
  - "build/**"
  - "*.egg-info/**"
  - ".eggs/**"
  - "*.egg"
  - "wheels/**"

  # Documentation
  - "docs/**"
  - "*.md"
  - "*.rst"

  # Configuration files
  - "*.toml"
  - "*.cfg"
  - "*.ini"
  - "*.yaml"
  - "*.yml"

  # Security and secrets
  - ".secrets*"
  - ".age"
  - ".sops.*"
  - "*.key"
  - "*.pem"

  # Dependency files
  - "poetry.lock"
  - "requirements*.txt"
  - "Pipfile.lock"

  # Git and CI
  - ".git/**"
  - ".github/**"
  - ".gitignore"
  - ".gitattributes"

  # Logs and temporary files
  - "logs/**"
  - "*.log"
  - ".pytest_cache/**"
  - ".mypy_cache/**"
  - ".ruff_cache/**"
  - "htmlcov/**"
  - ".coverage*"
  - "coverage.xml"

  # Temporary cleanup directory
  - "tmp_cleanup/**"

# Pull request comment configuration
comment:
  # components = per-component coverage breakdown. ("testcase" is NOT a valid
  # layout token; it made Codecov reject the whole config. Test Analytics
  # results surface in the Tests tab and their own PR comment, not via layout.)
  layout: "reach, diff, flags, components, files"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true
  # Show carryforward flag data in PR comments (hidden by default when carryforward: true)
  show_carryforward_flags: true

github_checks:
  # Annotations conflict with flags/components and cannot be cleared once posted
  # (GitHub API limitation). Use PR comments + Codecov UI for line-level investigation.
  # See: https://docs.codecov.com/docs/github-checks
  annotations: false

# Docker Compose configuration for CYO Adventure
# Development and production-ready setup with common services

version: '3.9'

services:
  # =============================================================================
  # Application Service
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: ${ENVIRONMENT:-development}
    image: cyo_adventure:${VERSION:-latest}
    container_name: cyo_adventure-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Core settings (valid: local | dev | staging | production; non-local
      # activates the api/deps.py auth-stub guard and the database_url fail-fast)
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JSON_LOGS: ${JSON_LOGS:-false}

      # Database configuration. Must use the asyncpg driver: core/database.py
      # builds the engine via create_async_engine(), which rejects a bare
      # postgresql:// (sync) URL.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://cyo_adventure:password@db:5432/cyo_adventure}
      # Redis cache (if applicable)
      # REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

      # Sentry (error tracking)
      # SENTRY_DSN: ${SENTRY_DSN:-}
      # SENTRY_ENVIRONMENT: ${ENVIRONMENT:-development}

      # Google Cloud credentials (if using Assured OSS)
      # GOOGLE_APPLICATION_CREDENTIALS_B64: ${GOOGLE_APPLICATION_CREDENTIALS_B64:-}
      # GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}

    volumes:
      # Development: Mount source code for hot reload
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      # Logs (optional)
      # - ./logs:/app/logs

    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Use Python stdlib: the production image deliberately omits curl to avoid
      # its CVE surface. This matches the HEALTHCHECK in the Dockerfile exactly.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/live', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped

    # Security: Run as non-root user
    user: "1000:1000"

    # `backend` alias lets frontend/nginx.conf's /api proxy resolve this
    # service consistently with the homelab R1 deploy stack (services/
    # cyo-adventure/ in homelab-infra), which names it `backend`.
    networks:
      cyo_adventure-network:
        aliases:
          - backend

# =============================================================================
  # Frontend Service (React + Vite)
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: cyo_adventure-frontend:${VERSION:-latest}
    container_name: cyo_adventure-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=http://localhost:${APP_PORT:-8000}
    volumes:
      # Development: Mount source code for hot reload
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
    depends_on:
      - app
    restart: unless-stopped

    networks:
      - cyo_adventure-network

# =============================================================================
  # Database Service (PostgreSQL)
  # =============================================================================
  db:
    image: ghcr.io/byronwilliamscpa/dhi-postgres:16-debian13
    container_name: cyo_adventure-db
    environment:
      POSTGRES_DB: cyo_adventure
      POSTGRES_USER: cyo_adventure
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    volumes:
      # Persistent data
      - postgres-data:/var/lib/postgresql/data
      # Init scripts (optional)
      # - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro

    ports:
      - "${DB_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyo_adventure"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    networks:
      - cyo_adventure-network

# =============================================================================
  # Redis Service (Caching/Sessions)
  # =============================================================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: cyo_adventure-redis
  #   command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
  #
  #   volumes:
  #     - redis-data:/data
  #
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
  #
  #   restart: unless-stopped
  #
  #   networks:
  #     - cyo_adventure-network

# =============================================================================
# Volumes (Persistent Storage)
# =============================================================================
volumes:
  postgres-data:
    driver: local
# redis-data:
  #   driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  cyo_adventure-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# =============================================================================
# Usage Instructions
# =============================================================================
# Development:
#   docker-compose up -d
#   docker-compose logs -f app
#   docker-compose exec app bash
#
# Production:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Rebuild after dependency changes:
#   docker-compose up -d --build
#
# View logs:
#   docker-compose logs -f
#
# Stop services:
#   docker-compose down
#
# Clean up (including volumes):
#   docker-compose down -v

# REUSE Software Bill of Materials
# https://reuse.software/
# This file provides centralized licensing information for the entire project
# avoiding the need for SPDX headers in individual files.

version = 1
SPDX-PackageName = "cyo_adventure"
SPDX-PackageSupplier = "Byron Williams"
SPDX-PackageDownloadLocation = "https://github.com/ByronWilliamsCPA/cyo-adventure"

# Source code (Python, tools, tests) - MIT
[[annotations]]
path = [
    "src/**",
    "tools/**",
    "tests/**",
    "validation/**",
    "fuzz/**",
    "benchmarks/**/*.py",
    "scripts/**/*.py",
    "modal/**/*.py",
    ".claude/**/*.py",  # Claude skill helper scripts
    "*.py",
    "noxfile.py",
    "schema/**",  # JSON Schema generated from the MIT-licensed Pydantic models
    "supabase/migrations/**",  # Supabase CLI SQL migrations
]
SPDX-License-Identifier = "MIT"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Frontend source code (React/TypeScript/JavaScript) - MIT
[[annotations]]
path = [
    "frontend/src/**",
    "frontend/e2e/**",  # Playwright end-to-end specs (mocked tier)
    "frontend/e2e-real/**",  # Playwright end-to-end specs (real-backend tier)
    "frontend/e2e-prod/**",  # Playwright end-to-end specs (production smoke tier)
    "frontend/e2e-staging/**",  # Playwright end-to-end specs (staging smoke tier)
    "frontend/*.ts",
    "frontend/*.js",
    "frontend/eslint.config.js",
    "frontend/vite.config.ts",
]
SPDX-License-Identifier = "MIT"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Design-system component package source (React/TypeScript) - MIT
[[annotations]]
path = [
    "frontend/design-system/src/**/*.tsx",
    "frontend/design-system/src/**/*.ts",
    "frontend/design-system/.design-sync/previews/**/*.tsx",  # Authored preview fixtures
    "frontend/design-system/vite.config.ts",
]
SPDX-License-Identifier = "MIT"
SPDX-FileCopyrightText = "2026 Byron Williams"

# Documentation - CC-BY-4.0
[[annotations]]
path = [
    "docs/**",
    "*.md",
    "frontend/README.md",  # Frontend documentation
    "scripts/README.md",  # Scripts documentation
    "tmp_cleanup/**/*.md",  # Temporary reference files
    "benchmarks/*.md",  # Benchmark documentation (not reports)
    "!LICENSES/*.txt",  # Exclude actual license text files
]
SPDX-License-Identifier = "CC-BY-4.0"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Design-sync tooling notes - CC-BY-4.0
[[annotations]]
path = [
    "frontend/design-system/.design-sync/NOTES.md",
    "frontend/design-system/.design-sync/conventions.md",
]
SPDX-License-Identifier = "CC-BY-4.0"
SPDX-FileCopyrightText = "2026 Byron Williams"

# Configuration files - CC0-1.0 (public domain dedication)
[[annotations]]
path = [
    "*.toml",
    "*.yml",
    "*.yaml",
    ".github/**",
    ".gitignore",
    ".gitattributes",
    ".trivyignore",  # Trivy CVE suppression list for container scanning
    ".pre-commit-config.yaml",
    ".readthedocs.yaml",
    "mkdocs.yml",
    "poetry.lock",  # Dependency lockfile for reproducible builds
    "requirements/**/*.txt",  # Generated from poetry export
    "benchmarks/labelmaps/**/*.yaml",  # Benchmark label mappings
    ".zenodo.json",  # Zenodo metadata for DOI
    ".mcp.json",  # Committed MCP server baseline (context7, sonarqube, Supabase)
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Data files and models - ODbL-1.0 (Open Database License)
[[annotations]]
path = [
    "data/**",
    "models/**",
]
SPDX-License-Identifier = "ODbL-1.0"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Build artifacts and generated files - excluded from licensing
[[annotations]]
path = [
    "build/**",
    "dist/**",
    "site/**",
    "*.egg-info/**",
    "__pycache__/**",
    ".venv/**",
    "venv/**",
    ".nox/**",
    ".mypy_cache/**",
    ".pytest_cache/**",
    ".ruff_cache/**",
    "*.pyc",
    "*.pyo",
]
precedence = "override"
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Additional configuration and temporary files - CC0-1.0
[[annotations]]
path = [
    ".claude/settings.local.json",
    ".claude/**/*.json",  # Claude configuration files
    ".claude/**/*.md",  # Claude documentation files
    ".standards/**",  # Baseline standards (auto-updated by cruft)
    ".clusterfuzzlite/**",
    ".sonarlint/**",  # SonarLint IDE configuration
    ".qlty/**",  # Qlty configuration
    ".coderabbit.yaml",  # CodeRabbit AI review configuration
    ".snyk",  # Snyk Open Source scope/policy file
    ".dcignore",  # Snyk Code (SAST) path exclusions
    ".vscode/**",  # VS Code settings
    ".idea/**",  # IntelliJ/PyCharm settings
    "concept.txt",
    "image_reference_sets.txt",
    "overrides/**",
    "renovate.json",
    "validate_workflows.sh",
    "scripts/**/*.sh",  # Shell scripts for automation
    "tmp_cleanup/**/*.txt",  # Temporary text files
    "tmp_cleanup/.gitkeep",  # Directory placeholder
    "sonar-project.properties",  # SonarCloud/SonarQube configuration
    "codemeta.json",  # CodeMeta software metadata
    ".zenodo.json",  # Zenodo DOI metadata
    "Makefile",  # Build automation
    "justfile",  # Just command runner
    "Taskfile.yml",  # Task runner configuration
    ".claude/**/*.json",  # Claude config and example files
    ".claude/**/*.example",  # Claude example config files
    ".cruft.json",  # Cruft template tracking metadata
    ".dockerignore",  # Docker build context exclusions
    ".editorconfig",  # Editor configuration
    ".env.example",  # Environment variable template
    ".env.staging.example",  # Staging environment template
    ".infisical.json",  # Infisical secrets manager config
    ".markdownlint.json",  # Markdownlint configuration
    ".mutmut_config",  # Mutmut mutation testing config
    ".prettierrc",  # Prettier formatter config
    ".secrets.baseline",  # detect-secrets baseline
    ".shellcheckrc",  # ShellCheck configuration
    ".yamllint",  # yamllint configuration
    "Dockerfile",  # Container build definition
    "uv.lock",  # UV dependency lockfile for reproducible builds
    "supabase/config.toml",  # Supabase CLI project configuration
    "supabase/.gitignore",  # Supabase CLI-generated ignore rules
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Frontend configuration, lockfiles, and assets - CC0-1.0
[[annotations]]
path = [
    "frontend/.env.example",  # Frontend environment template
    "frontend/.env.e2e-prod.example",  # Production smoke e2e credential template
    "frontend/.env.e2e-staging.example",  # Staging smoke e2e credential template
    "frontend/.gitignore",  # Frontend git exclusions
    "frontend/.prettierrc",  # Frontend Prettier config
    "frontend/Dockerfile",  # Frontend container build
    "frontend/nginx.conf",  # Nginx serving config
    "frontend/index.html",  # Vite entry HTML
    "frontend/package.json",  # npm package manifest
    "frontend/package-lock.json",  # npm dependency lockfile
    "frontend/tsconfig.json",  # TypeScript base config
    "frontend/tsconfig.app.json",  # TypeScript app config
    "frontend/tsconfig.node.json",  # TypeScript node config
    "frontend/tsconfig.e2e.json",  # TypeScript e2e/e2e-real config
    "frontend/public/**",  # Static public assets
    "frontend/src/**/*.css",  # Frontend stylesheets
    "frontend/src/assets/**",  # Frontend asset files
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2025 Byron Williams"

# Design-system package configuration, lockfile, and sync artifacts - CC0-1.0
[[annotations]]
path = [
    "frontend/design-system/.gitignore",
    "frontend/design-system/package.json",
    "frontend/design-system/package-lock.json",
    "frontend/design-system/tsconfig.json",
    "frontend/design-system/.design-sync/config.json",
    "frontend/design-system/src/**/*.css",
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2026 Byron Williams"

# Story skeletons and generated output files - CC-BY-4.0
[[annotations]]
path = [
    "skeletons/**/*.json",  # Pre-authored story skeleton files
    "out/**/*.json",        # Generated story output files from the yield harness
    "out/reports/*.md",         # Authoring-run summary reports
    "out/reports/**/*.md",      # Story design and compliance review reports
]
SPDX-License-Identifier = "CC-BY-4.0"
SPDX-FileCopyrightText = "2026 Byron Williams"

# Authoring output directory placeholders - CC0-1.0
[[annotations]]
path = [
    "out/reports/.gitkeep",
    "out/reports/skeletons/.gitkeep",
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2026 Byron Williams"

# Benchmark results and generated metadata files - CC0-1.0
[[annotations]]
path = [
    "benchmarks/reports/**/*.json",
    "benchmarks/reports/**/*.md",
    "codemeta.json",
    "benchmarks/LICENSES.md",
    "benchmarks/registry.yml",
    "notebooks/**/*.ipynb",  # Jupyter notebooks (Colab training examples)
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2025 Byron Williams"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A choose-your-own-adventure reading app for kids" />
    <!-- Matches manifest theme_color (vite.config.ts). -->
    <meta name="theme-color" content="#1d3557" />
    <!-- Default before the theme script below runs (and the no-JS/no-storage
         fallback): native form controls follow the OS. Once data-theme is
         stamped, tokens.css's :root[data-theme] blocks pin color-scheme to
         match the resolved theme (see design-system/src/tokens.css). -->
    <meta name="color-scheme" content="light dark" />
    <title>CYO Adventure</title>
    <!-- Stamps the resolved theme (stored preference, or the OS's if the
         preference is 'system'/unset) onto <html> before first paint, so
         there is no flash of the wrong theme while src/main.tsx's bundle
         loads. Mirrors src/theme/theme.ts's readStoredMode/resolveTheme
         exactly; ThemeProvider re-applies the same result once it mounts, so
         this is belt-and-suspenders, not a second source of truth. Kept
         inline (not a module) so it runs synchronously, and wrapped in
         try/catch since localStorage can throw in private-mode Safari. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('cyo-theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          // Storage unavailable; :root's light defaults in tokens.css apply until ThemeProvider mounts.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

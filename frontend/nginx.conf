server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
        access_log off;
    }

    # API proxy: nginx is the single ingress point in the homelab R1 deploy
    # (services/cyo-adventure/ in homelab-infra), matching the VITE_API_URL=/api
    # build default. FastAPI is not published to the host in that stack; only
    # reachable from here as `backend:8000`, an alias this repo's own compose
    # files also define on the app service so both stacks resolve it.
    # #ASSUME: timing dependencies: proxy_pass resolves its upstream at
    # config-load time unless deferred via a variable, so a plain hostname
    # here would make nginx fail to start if the backend container isn't
    # already up. The resolver + variable below defer resolution to request
    # time instead, so startup order and container restarts don't break nginx.
    # #VERIFY: nginx -t (this repo's CI) confirms the config loads without a
    # live network.
    # #ASSUME: external resources: LLM-backed generation work runs in the
    # separate cyo-worker container (no inbound HTTP), so requests this proxy
    # forwards are all fast enqueue/status calls, not the long-running job.
    # #VERIFY: if a future /api route blocks synchronously for longer than
    # proxy_read_timeout, raise the timeout for that route specifically.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        client_max_body_size 2m;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

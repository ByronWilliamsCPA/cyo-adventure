server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker control scripts must never be cached immutably. Unlike the
    # content-hashed files under /assets/, sw.js and registerSW.js keep a stable
    # filename across every deploy, so a `public, immutable, max-age=1y` header
    # (which the regex asset rule below would otherwise apply, since both end in
    # .js) can pin a browser to a stale service worker that keeps serving an old
    # precached app shell across reloads. That surfaced as a persistent guardian
    # login loop: a clean browser worked, but a browser wedged on a broken-era SW
    # never picked up the fix. Exact-match locations take precedence over the
    # regex asset rule regardless of ordering, so these always win and revalidate
    # on every load, letting vite-plugin-pwa's autoUpdate swap in a new SW.
    # #CRITICAL: external-resources: keep these no-cache; immutable-caching a
    # stable-named SW script strands clients on a stale shell for up to a year.
    # #VERIFY: curl -sI https://<host>/sw.js shows Cache-Control: no-store...,
    # not public, immutable.
    location = /sw.js {
        expires -1;
        # #CRITICAL: security: a location that defines its own add_header
        # directives does not inherit the server block's; repeat them here or
        # this response silently loses X-Frame-Options/CSP-adjacent headers.
        # #VERIFY: curl -sI https://<host>/sw.js shows all four headers below.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
    location = /registerSW.js {
        expires -1;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
        access_log off;
    }

    # API proxy: nginx is the single ingress point in the homelab R1 deploy
    # (services/cyo-adventure/ in homelab-infra), matching the VITE_API_URL=/api
    # build default. FastAPI is not published to the host in that stack; only
    # reachable from here as `backend:8000`, an alias this repo's own compose
    # files also define on the app service so both stacks resolve it.
    # #ASSUME: timing dependencies: proxy_pass resolves its upstream at
    # config-load time unless deferred via a variable, so a plain hostname
    # here would make nginx fail to start if the backend container isn't
    # already up. The resolver + variable below defer resolution to request
    # time instead, so startup order and container restarts don't break nginx.
    # #VERIFY: nginx -t (this repo's CI) confirms the config loads without a
    # live network.
    # #ASSUME: external resources: LLM-backed generation work runs in the
    # separate cyo-worker container (no inbound HTTP), so requests this proxy
    # forwards are all fast enqueue/status calls, not the long-running job.
    # #VERIFY: if a future /api route blocks synchronously for longer than
    # proxy_read_timeout, raise the timeout for that route specifically.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # #CRITICAL: security: forward the ORIGINAL edge scheme, not nginx's
        # own $scheme. This container listens on plain HTTP (port 80) and the
        # TLS-terminating edge (Pangolin/Cloudflare) forwards plain HTTP to it,
        # so $scheme is always "http" here. Sending X-Forwarded-Proto: http to
        # the backend (which trusts this nginx via uvicorn --forwarded-allow-ips)
        # made request.url.scheme resolve to "http", so the backend's
        # HealthExemptHTTPSRedirectMiddleware 307-redirected every /api/* request
        # to its own HTTPS URL, an infinite loop that broke guardian login
        # ("couldn't load your account"). This site is only ever served over
        # HTTPS at the edge, so hardcoding https is correct and cannot loop.
        # #VERIFY: curl -sI https://<host>/api/v1/me returns 401 (auth required),
        # not 307. Also confirms backend HSTS emission and per-client rate-limit
        # keying, both of which key on the resolved scheme/client IP.
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        client_max_body_size 2m;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

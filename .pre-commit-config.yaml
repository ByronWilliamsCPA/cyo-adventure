# Pre-commit hooks configuration
# See https://pre-commit.com for more information
#
# Hook stages:
# - pre-commit: Fast checks on every commit (formatting, syntax, security)
# - pre-push: Full quality checks before pushing (Qlty, full scans)
# - commit-msg: Conventional commit message validation
#
# Installation: curl https://qlty.sh | bash
# Documentation: https://docs.qlty.sh

ci:
  autoupdate_schedule: monthly
  autofix_prs: true
  skip: [validate-front-matter, qlty-check, qlty-full, trufflehog, bandit, bandit-full]  # Skip local-only hooks

repos:
  # ============================================================================
  # Fast File Checks (Lightweight, run on every commit)
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: c4a0b883114b00d8d76b479c820ce7950211c99b  # v4.5.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        exclude: mkdocs.yml  # Exclude mkdocs.yml due to !ENV custom tags
      - id: check-json
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-added-large-files
        args: ['--maxkb=10000']  # 10MB limit
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: mixed-line-ending
        args: ['--fix=lf']
        stages: [pre-commit]
      - id: debug-statements
        stages: [pre-commit]
      - id: check-executables-have-shebangs
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]

  # ============================================================================
  # Secret Detection - TruffleHog
  # ============================================================================
  # Advanced secret detection beyond detect-private-key
  # Detects API keys, tokens, credentials, and other secrets
  # Fail-closed: exits with error if trufflehog is not installed (not silent-skip)
  # Scans staged files only; excludes:
  #   CHANGELOG.md         - commit SHAs trigger false positives
  #   docker-compose*.yml  - dev placeholder credentials (real secrets go in .env, which is gitignored)
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: 30d5bb91af1a771378349dbbb0c82129392acf70  # v3.95.6  # pragma: allowlist secret
    hooks:
      - id: trufflehog
        entry: bash -c 'git diff --cached -z --name-only --diff-filter=d 2>/dev/null | tr "\0" "\n" | grep -v "^CHANGELOG\.md$" | grep -v "^\.submodules/" | grep -v "^docker-compose" | grep -v "^$" | tr "\n" "\0" | xargs -0 -r trufflehog filesystem --fail --no-update'
        pass_filenames: false
        stages: [pre-commit]

  # ============================================================================
  # Secret Detection - detect-secrets Baseline Regression
  # ============================================================================
  # Baseline file prevents regression of known secrets
  # Requires .secrets.baseline file created via: detect-secrets scan > .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # v1.5.0  # pragma: allowlist secret
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # pre-push: the baseline tracks secret line numbers across the whole
        # tree; running at pre-commit churns the baseline whenever unstaged
        # files are stashed. trufflehog (above) is the fail-closed pre-commit
        # secret gate; detect-secrets provides the baseline-regression layer
        # at pre-push (PC-013 dual-layer stays satisfied).
        stages: [pre-push]

  # ============================================================================
  # Security Scanning - Bandit
  # ============================================================================
  # Dedicated Bandit hook for Python security analysis
  # Runs on changed files during pre-commit, full scan on pre-push
  # Configuration in pyproject.toml [tool.bandit]
  - repo: https://github.com/PyCQA/bandit
    rev: 36fd65054fc8864b4037d0918904f9331512feb5  # 1.7.10
    hooks:
      - id: bandit
        name: Bandit Security Scan (changed files)
        args: ['-c', 'pyproject.toml', '-ll']  # Medium+ severity only
        stages: [pre-commit]
        exclude: ^(tests|scripts|benchmarks|tools|fuzz)/

  # Full Bandit scan on pre-push (catches all issues before PR)
  - repo: local
    hooks:
      - id: bandit-full
        name: Bandit Security Scan (full src/)
        entry: uv run bandit -c pyproject.toml -r src/ -ll -q
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

  # ============================================================================
  # Conventional Commits Enforcement
  # ============================================================================
  # Enforces conventional commit message format for semantic versioning
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 406f0d1a4ffcd9eb0be9f0f6b824df619b38f41e  # v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  # ============================================================================
  # Commitizen Message Validation
  # ============================================================================
  # Validates commit message follows conventional commit format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: 286da5488db79f4cf5261e14a3c8976d89b5aa70  # v4.16.3  # pragma: allowlist secret
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ============================================================================
  # pyproject.toml Validation
  # ============================================================================
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 435e09f5ed9fe57f3444ebfa54c663d0ac8033fe  # v0.20.2
    hooks:
      - id: validate-pyproject
        stages: [pre-commit]

  # ============================================================================
  # GitHub Workflow Validation
  # ============================================================================
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 4e7291655d44e99511858efd33bea0bdbb58d835  # 0.29.4
    hooks:
      - id: check-github-workflows
        stages: [pre-commit]

  # ============================================================================
  # Ruff Linting and Formatting (Fast, pre-commit stage)
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: fa1ed65ba95bfa7771a71003a9d74402541f5a5c  # v0.14.6
    hooks:
      - id: ruff
        stages: [pre-commit]
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        stages: [pre-commit]

  # ============================================================================
  # Type Checking with BasedPyright (Strict Mode)
  # ============================================================================
  # BasedPyright: faster, stricter type checker (replaces mypy)
  # Local system hook: avoids spurious "files modified" warnings with --no-sync
  - repo: local
    hooks:
      - id: basedpyright
        name: BasedPyright type checker (strict mode)
        entry: uv run --no-sync basedpyright src/
        language: system
        pass_filenames: false
        # pre-push: matches the repo's heavy-lint-at-pre-push design (qlty-full
        # also runs BasedPyright). Pre-existing middleware type debt is deferred
        # to pre-push and CI rather than gating every commit.
        stages: [pre-push]

  # ============================================================================
  # YAML Linting
  # ============================================================================
  # Validates YAML files for syntax and style issues
  # Configuration: .yamllint
  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # v1.38.0  # pragma: allowlist secret
    hooks:
      - id: yamllint
        args: [--strict]
        # pre-push: aligns with the repo's heavy-lint-at-pre-push philosophy
        # (qlty-full already runs yamllint). Avoids gating every commit on
        # --strict warnings across the generated workflow files.
        stages: [pre-push]

  # ============================================================================
  # Qlty Unified Quality Checks (Pre-Push)
  # ============================================================================
  # Moved to pre-push to avoid clogging PR reviews with issues
  # Qlty runs all quality tools in a single pass:
  # - Ruff (linting + formatting)
  # - BasedPyright (type checking)
  # - Gitleaks (secrets detection)
  # - Markdownlint (markdown linting)
  # - Yamllint (YAML linting)
  # - OSV Scanner (dependency vulnerabilities)
  # - Code smells and complexity analysis
  #
  # Configure via .qlty/qlty.toml
  # Install: curl https://qlty.sh | bash && qlty plugins install
  - repo: local
    hooks:
      - id: qlty-check
        name: Qlty Code Quality Check (changed files)
        entry: >-
          bash -c "command -v qlty >/dev/null 2>&1 && qlty check --filter=diff || echo 'Qlty not installed - skipping (install: curl https://qlty.sh | bash)'"
        language: system
        types: [file]
        pass_filenames: false
        stages: [pre-push]
        verbose: true

      - id: qlty-full
        name: Qlty Full Quality Check (all files)
        entry: >-
          bash -c "command -v qlty >/dev/null 2>&1 && qlty check src/ || echo 'Qlty not installed - skipping'"
        language: system
        pass_filenames: false
        stages: [pre-push]
        verbose: true


  # ============================================================================
  # Custom Documentation Validation
  # ============================================================================
  - repo: local
    hooks:
      - id: validate-front-matter
        name: Validate documentation front matter
        entry: python tools/validate_front_matter.py docs
        language: python
        files: ^docs/(?!planning/).*\.md$
        pass_filenames: false
        stages: [pre-commit]
        additional_dependencies:
          - python-frontmatter>=1.1.0
          - pydantic>=2.0
          - ruamel.yaml>=0.18


  # ============================================================================
  # Python Docstring Coverage
  # ============================================================================
  # Interrogate ensures all Python code has proper docstrings
  # Two scopes: scripts (85% threshold) and src (80% threshold)
  - repo: https://github.com/econchick/interrogate
    rev: 4894019dc8876092bc9b6d56878798c550fad998  # 1.7.0
    hooks:
      - id: interrogate
        alias: interrogate-scripts
        name: Interrogate (scripts/ scope, 85%)
        args: ['-v', '-c', 'pyproject.toml', '--fail-under', '85', 'scripts/']
        language_version: python3.12
        pass_filenames: false
        stages: [pre-commit]
      - id: interrogate
        alias: interrogate-src
        name: Interrogate (src/ scope, 80%)
        args: ['-v', '-c', 'pyproject.toml', '--fail-under', '80', 'src/']
        language_version: python3.12
        pass_filenames: false
        stages: [pre-commit]

  # ============================================================================
  # Docstring Argument Validation
  # ============================================================================
  # Pydoclint validates that docstring arguments match function signatures
  # Configuration in pyproject.toml [tool.pydoclint]
  - repo: https://github.com/jsh9/pydoclint
    rev: 88d83c94156c5e51a09938e77019f2c58e92ab58  # 0.8.4
    hooks:
      - id: pydoclint
        args: ["--config=pyproject.toml"]
        types: [python]
        # pre-push: docstring-signature strictness on pre-existing code is
        # deferred to pre-push and CI, consistent with the heavy-checks-at-
        # pre-push design; the hook stays present for PC-006.
        stages: [pre-push]
        exclude: ^(tests|scripts|benchmarks|tools)/

  # ============================================================================
  # Markdown Linting
  # ============================================================================
  # Validates Markdown files for style and best practices
  # Configuration: .markdownlint.json (with baseline: .markdownlintignore)
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338  # v0.49.0  # pragma: allowlist secret
    hooks:
      - id: markdownlint
        # pre-push: aligns with the repo's heavy-lint-at-pre-push philosophy
        # (qlty-full already runs markdownlint). Pre-existing template-doc debt
        # is tracked in docs/template_feedback.md; gating commits on it is out
        # of scope for the compliance pass.
        stages: [pre-push]

  # ============================================================================
  # No Em-Dash Check (Unicode U+2014)
  # ============================================================================
  # Enforces use of hyphens/commas/semicolons instead of em-dashes
  # Pre-scan confirmed no existing em-dashes in the repository
  - repo: local
    hooks:
      - id: no-em-dash
        name: No em-dash character check
        entry: bash -c 'if git grep --cached -nP "\xe2\x80\x94" -- .; then echo "em-dash (U+2014) found in staged files above; replace with comma, semicolon, or colon"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

# Exclude patterns
exclude: |
  (?x)^(
      \.git/|
      \.venv/|
      venv/|
      build/|
      dist/|
      .*\.egg-info/|
      __pycache__/|
      \.mypy_cache/|
      \.pytest_cache/|
      \.ruff_cache/|
      data/|
      models/|
      .*\.pyc
  )$

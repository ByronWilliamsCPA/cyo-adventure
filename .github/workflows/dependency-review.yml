# Dependency Review - Analyzes dependency changes in PRs
# Checks for vulnerabilities and license compliance
#
# Features:
#   - Vulnerability detection in dependency changes
#   - License compliance checking
#   - Blocks PRs with high severity vulnerabilities
name: Dependency Review

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements*.txt'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # Deny copyleft and restrictive licenses (deny-list approach)
          deny-licenses: AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later, GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, LGPL-2.0-only, LGPL-2.1-only, LGPL-3.0-only, LGPL-3.0-or-later
          comment-summary-in-pr: on-failure

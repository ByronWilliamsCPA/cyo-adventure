---
# Release Workflow (two-phase, ruleset-compatible)
#
# The default-branch rulesets (PRs required, merge queue, required
# signatures, required status checks) reject any direct push to main, so
# python-semantic-release's built-in "commit the bump to main" flow can
# never work here (issue #157; GH013 on every run). This workflow splits
# the release into two phases that respect the rulesets:
#
#   1. propose  - on every push to main (except release-bump merges):
#      compute the next version from conventional commits, then run
#      python-semantic-release's writer (--no-commit/--no-tag/--no-push) to
#      bump pyproject.toml and splice the new version section into
#      CHANGELOG.md, re-lock (uv lock), inject the Keep-a-Changelog
#      compare-link footer PSR omits, assert the artifacts, and open a
#      version-bump PR with auto-merge so it flows through the merge queue
#      like any other change.
#   2. publish  - when that release PR's squash commit
#      ("chore(release): vX.Y.Z") lands on main: create the vX.Y.Z tag
#      and the GitHub Release with the generated CHANGELOG section as the
#      release notes.
#
# CHANGELOG.md is GENERATED at release time from Conventional Commits (PSR
# mode="update" splices each version in at the insertion flag, preserving
# history); it is no longer hand-curated per PR. This is what eliminated the
# per-PR "[Unreleased]" edit that made every merge-queue PR conflict on the
# changelog. The templates/ dir holds PSR's bundled markdown templates,
# patched only to emit Keep-a-Changelog headings.
#
# The PyPI publish step was removed: this app is not a PyPI package and
# the step never had a dist/ to upload (issue #158).
#
# Requires the RELEASE_TOKEN secret (fine-grained PAT: contents write +
# pull requests write on this repo). The propose phase must create its
# branch and PR with a token other than GITHUB_TOKEN, because events
# created with GITHUB_TOKEN do not trigger workflows and the release PR
# would sit forever with no CI Gate to satisfy the merge queue.
#
# The release-bump commit is built via the GraphQL createCommitOnBranch
# mutation instead of local `git commit` + `git push`: this repo's branch
# protection requires every commit to carry a verified signature, and a
# plain local commit is never signed. GitHub signs commits it constructs
# itself through its API, so this needs no GPG key management in CI.
#
# Injection note: github.event.head_commit.message appears ONLY inside
# `if:` expressions (never interpolated into run: shell); all dynamic
# values reach shell steps via env vars.
name: Semantic Release

"on":
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_level:
        description: 'Force bump level (leave empty for auto)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      dry_run:
        description: 'Compute and print the release plan without opening a PR'
        required: false
        type: boolean
        default: false

# Prevent concurrent releases
concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  propose:
    name: Propose Release PR
    # Skip when the push IS the release-bump merge landing on main; that
    # push is handled by the publish job below.
    # #ASSUME external: python-semantic-release recomputes the same version on
    # the just-bumped commit, so even without this guard the job would no-op
    # rather than double-bump. #VERIFY do not delete the head_commit.message
    # guard on that assumption alone: a PSR change could break the no-op and
    # cause a double bump, so the message guard is the real protection.
    # #ASSUME external: releases are cut only from stable main. The pipeline is
    # intentionally main-only: PSR's [branches.main] sets prerelease=false, so
    # the writer emits a clean X.Y.Z into pyproject.toml and CHANGELOG. A
    # workflow_dispatch from a develop/ or release/ branch would instead select
    # PSR's prerelease branch config (dev/rc tokens); that whole path is
    # unvalidated end to end (the writer's prerelease version string vs. what
    # `uv lock` accepts, the "## [X.Y.Z]" heading extract_changelog_section.py
    # greps for, and the live tag ruleset regex) and is deliberately blocked
    # here. #VERIFY propose runs only for refs/heads/main.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Require RELEASE_TOKEN
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "${RELEASE_TOKEN}" ]; then
            {
              echo "::error::RELEASE_TOKEN secret is not configured."
              echo "Create a fine-grained PAT (contents: read/write and"
              echo "pull requests: read/write on this repository) and add it"
              echo "as the RELEASE_TOKEN repository secret. The release PR"
              echo "must be created with a non-GITHUB_TOKEN credential;"
              echo "otherwise its CI checks never run and the merge queue"
              echo "cannot accept it."
            }
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN }}
          # #CRITICAL security: do not leave RELEASE_TOKEN in .git/config
          # while third-party code (uvx, uv lock) runs later in this job.
          # Nothing after this step needs git's own credential storage: the
          # version bump/changelog steps only write local files, and the
          # release commit itself is built via the GraphQL API (GH_TOKEN env
          # var, not a git push) in the "Open release PR" step below.
          # #VERIFY persist-credentials stays false.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Compute next version
        id: version
        env:
          # semantic-release's [tool.semantic_release.remote] config reads
          # GH_TOKEN at config-load time; version --print never calls the API.
          GH_TOKEN: ${{ github.token }}
          FORCE_LEVEL: ${{ inputs.force_level }}
        run: |
          CURRENT="$(uv version --short)"
          FORCE_FLAG=""
          if [ -n "${FORCE_LEVEL}" ]; then
            FORCE_FLAG="--${FORCE_LEVEL}"
          fi
          # shellcheck disable=SC2086  # FORCE_FLAG is intentionally unquoted
          NEXT="$(uvx --from 'python-semantic-release==10.6.1' \
            semantic-release version --print ${FORCE_FLAG})"
          # #ASSUME external: semantic-release prints a bare X.Y.Z(-pre)?
          # #VERIFY reject non-semver before it reaches git refs/tags/titles.
          # Match the whole string in bash: a piped `grep -Eq` anchors PER
          # LINE, so a multi-line value would pass if any single line matched,
          # and the old pattern also accepted 1.2.3.4.
          if [[ ! "${NEXT}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Computed version '${NEXT}' is not valid semver."
            exit 1
          fi
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          if [ "${NEXT}" = "${CURRENT}" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No release-worthy commits since v${CURRENT}; nothing to do."
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "Next version: v${NEXT} (current v${CURRENT})"
          fi

      - name: Write version and changelog
        if: steps.version.outputs.released == 'true'
        env:
          # PSR's [tool.semantic_release.remote] reads GH_TOKEN at config load
          # even for a local-only write. --no-commit/--no-tag/--no-push keep
          # this a pure file mutation (version_toml bump + CHANGELOG render);
          # --no-vcs-release stops PSR creating a GitHub Release (the publish
          # job owns that); --skip-build because there is no build_command and
          # propose must not build. The signed release commit is assembled from
          # these files by the GraphQL mutation in the next step.
          GH_TOKEN: ${{ github.token }}
          FORCE_LEVEL: ${{ inputs.force_level }}
          NEXT: ${{ steps.version.outputs.next }}
          CURRENT: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          FORCE_FLAG=""
          if [ -n "${FORCE_LEVEL}" ]; then
            FORCE_FLAG="--${FORCE_LEVEL}"
          fi
          # shellcheck disable=SC2086  # FORCE_FLAG is intentionally unquoted
          uvx --from 'python-semantic-release==10.6.1' \
            semantic-release version \
              --no-commit --no-tag --no-push --no-vcs-release --skip-build \
              ${FORCE_FLAG}
          uv lock
          # PSR renders the "## [X.Y.Z]" section but not the Keep-a-Changelog
          # compare-link footer; add it so the heading resolves as a link like
          # every prior entry. Append-only at the top of the footer block, so
          # it cannot reintroduce a merge-queue conflict.
          uv run python scripts/inject_changelog_footer_link.py "${NEXT}" "${CURRENT}"

      - name: Verify release artifacts
        if: steps.version.outputs.released == 'true'
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          # #CRITICAL data-integrity: the version bump and the changelog splice
          # ARE the release. If PSR silently no-ops (a config or template
          # regression, an upstream default change) the GraphQL commit would
          # still open a PR that tags and publishes an empty or wrong release,
          # exactly the kind of silent stall this pipeline exists to prevent
          # (cf. PR #241). Assert every artifact here, before the commit is
          # built, so a malformed release fails loudly instead of shipping.
          # #VERIFY each assertion below fails the job rather than continuing.
          FAIL=0
          ACTUAL="$(uv version --short)"
          if [ "${ACTUAL}" != "${NEXT}" ]; then
            echo "::error::pyproject version is '${ACTUAL}', expected '${NEXT}'."
            FAIL=1
          fi
          if ! grep -qF "## [${NEXT}] - " CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${NEXT}] - ' section heading."
            FAIL=1
          fi
          # #ASSUME data-integrity: a heading alone is not a release; the
          # section must carry actual entries. An empty section means the
          # commit filter dropped everything, so fail rather than publish a
          # heading with no notes. #VERIFY awk captures the body between this
          # version's heading and the next '## ' heading, and grep proves it
          # holds a non-whitespace line.
          SECTION_BODY="$(
            awk -v h="## [${NEXT}] - " '
              index($0, h) == 1 { in_sec = 1; next }
              in_sec && /^## / { exit }
              in_sec { print }
            ' CHANGELOG.md
          )"
          if ! printf '%s' "${SECTION_BODY}" | grep -q '[^[:space:]]'; then
            echo "::error::CHANGELOG.md section '[${NEXT}]' has a heading but no entries."
            FAIL=1
          fi
          # The paired heading + footer assertions jointly guarantee the
          # just-injected footer link resolves to a real section: both key off
          # ${NEXT}, so a footer with no section (or a section with no footer)
          # fails here, before the commit that tags and publishes is built.
          if ! grep -qF "[${NEXT}]: " CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '[${NEXT}]: ' compare-link footer."
            FAIL=1
          fi
          if ! grep -qF '<!-- version list -->' CHANGELOG.md; then
            echo "::error::CHANGELOG.md lost its '<!-- version list -->' insertion marker."
            FAIL=1
          fi
          # mode="update" splices; it must never truncate. Guard against a
          # regression that regenerates (init mode) and drops prior history.
          OLD_LINES="$(git show HEAD:CHANGELOG.md | wc -l)"
          NEW_LINES="$(wc -l < CHANGELOG.md)"
          if [ "${NEW_LINES}" -lt "${OLD_LINES}" ]; then
            echo "::error::CHANGELOG.md shrank from ${OLD_LINES} to" \
              "${NEW_LINES} lines; prior history may have been lost."
            FAIL=1
          fi
          if ! grep -qF '[0.1.0]: ' CHANGELOG.md; then
            echo "::error::CHANGELOG.md lost its history tail ('[0.1.0]:' link)."
            FAIL=1
          fi
          [ "${FAIL}" -eq 0 ] || exit 1
          echo "Release artifacts verified for v${NEXT}."

      - name: Open release PR
        if: steps.version.outputs.released == 'true' && !inputs.dry_run
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          BRANCH="release/v${NEXT}"
          # #EDGE external: a re-run after a partial run (or after the hard-fail
          # auto-merge path below) can reach here with the bump already applied
          # and nothing changed on disk vs. HEAD; there is nothing new to
          # commit. Detect that and exit cleanly, matching the idempotent-
          # re-run intent. #VERIFY skip commit/push/PR when the tree is clean.
          if git diff --quiet -- pyproject.toml uv.lock CHANGELOG.md; then
            echo "No release changes to commit for v${NEXT}; the bump is" \
              "already applied. Nothing to do."
            exit 0
          fi
          # #CRITICAL security: this repo's branch protection requires every
          # commit to carry a verified signature. A plain local `git commit`
          # (even with a spoofed github-actions[bot] git config identity, the
          # prior approach) is never signed and permanently blocks the
          # resulting PR from merging - this is what broke PR #241. Rather
          # than provision and rotate a GPG key for a bot identity, build the
          # commit server-side via the GraphQL createCommitOnBranch mutation:
          # GitHub signs commits it constructs itself through its API, so the
          # result shows "Verified" with no key management in CI. Probed
          # against this repo on a disposable branch before wiring this in
          # (confirmed verified=true, reason="valid").
          # #VERIFY every release commit shows "Verified" on GitHub; if this
          # ever regresses, fix the commit-creation path here, do not
          # `--no-verify`/admin-merge past the signature requirement.
          #
          # #EDGE concurrency: the ref-reset (REST, below) and the mutation
          # (GraphQL) hit separate GitHub API surfaces with no read-after-
          # write guarantee between them, so expectedHeadOid can transiently
          # mismatch the branch's observed head immediately after we set it.
          # #VERIFY a transient mismatch is retried, not treated as a hard
          # failure, before this step gives up.
          BASE_SHA="$(git rev-parse HEAD)"

          # shellcheck disable=SC2016  # literal GraphQL text, expansion not wanted
          QUERY='mutation($input: CreateCommitOnBranchInput!) {
            createCommitOnBranch(input: $input) { commit { oid } } }'

          # #CRITICAL external: uv.lock alone base64-encodes to roughly 1MB;
          # passed as a `jq --arg` value it becomes part of that process's
          # argv, and combined with the runner's environment this can exceed
          # the kernel's execve() argument-list limit ("jq: Argument list too
          # long", exit 126) -- observed on the first real run of this
          # pipeline. `--rawfile` reads file content directly instead of
          # putting it on the command line, so lockfile growth cannot
          # reintroduce an argv-size failure through this path. #VERIFY if
          # uv.lock or CHANGELOG.md ever approach GitHub's GraphQL request
          # body-size limit (a distinct ceiling from execve() argv), split
          # fileChanges across multiple mutations rather than reverting to
          # --arg/--argjson.
          PYPROJECT_B64="$(mktemp)"
          UVLOCK_B64="$(mktemp)"
          CHANGELOG_B64="$(mktemp)"
          base64 -w0 pyproject.toml > "${PYPROJECT_B64}"
          base64 -w0 uv.lock > "${UVLOCK_B64}"
          base64 -w0 CHANGELOG.md > "${CHANGELOG_B64}"

          COMMIT_OID=""
          ATTEMPT=1
          MAX_ATTEMPTS=3
          while [ -z "${COMMIT_OID}" ] && [ "${ATTEMPT}" -le "${MAX_ATTEMPTS}" ]; do
            # Release branches are machine-owned; reset the ref to the
            # current main tip on every attempt so a retry (or a recomputed
            # version) is idempotent, mirroring the previous force-push
            # behavior.
            #
            # Distinguish a genuine 404 (branch does not exist yet) from any
            # other lookup failure (rate-limit, auth, transient 5xx): only a
            # confirmed 404 should route to branch creation. Any other
            # failure falling through to `POST .../git/refs` on a branch
            # that DOES exist would hard-fail under `set -e` outside this
            # retry loop.
            set +e
            LOOKUP_ERR="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${BRANCH}" \
              2>&1 >/dev/null)"
            LOOKUP_STATUS=$?
            set -e
            if [ "${LOOKUP_STATUS}" -eq 0 ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}" \
                -f sha="${BASE_SHA}" -F force=true >/dev/null
            elif echo "${LOOKUP_ERR}" | grep -q "HTTP 404"; then
              gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
                -f ref="refs/heads/${BRANCH}" -f sha="${BASE_SHA}" >/dev/null
            else
              echo "Branch lookup for ${BRANCH} failed with a non-404 error" \
                "(attempt ${ATTEMPT}/${MAX_ATTEMPTS}): ${LOOKUP_ERR}" >&2
              if [ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ]; then
                sleep 2
                ATTEMPT=$((ATTEMPT + 1))
                continue
              fi
              echo "::error::Branch lookup for ${BRANCH} kept failing:" \
                "${LOOKUP_ERR}"
              exit 1
            fi

            # #CRITICAL external: a failed commit-creation call must not fall
            # through to `gh pr create` against a branch left on its prior
            # (stale or nonexistent) commit; fail loudly instead of silently
            # opening/reusing a PR with no new bump commit. #VERIFY commit
            # creation errors are a hard failure, not a swallowed warning.
            #
            # `gh api graphql` exits non-zero whenever the response body
            # carries a top-level `errors` array; under this step's default
            # `set -e`, letting that propagate would abort the script before
            # the diagnostic below ever runs. Capture the exit code
            # explicitly instead of relying on set -e to report it.
            #
            # The whole request body is built in a single jq invocation so
            # the large file contents only ever enter via --rawfile (a file
            # read); an intermediate $(jq ...) result reused via --argjson
            # would put that same huge string back onto a command line and
            # reintroduce the argv-size failure this block exists to avoid.
            set +e
            RESPONSE="$(jq -n \
              --arg q "${QUERY}" \
              --arg repo "${GITHUB_REPOSITORY}" \
              --arg branch "${BRANCH}" \
              --arg oid "${BASE_SHA}" \
              --arg headline "chore(release): v${NEXT}" \
              --rawfile pyproject "${PYPROJECT_B64}" \
              --rawfile uvlock "${UVLOCK_B64}" \
              --rawfile changelog "${CHANGELOG_B64}" \
              '{
                query: $q,
                variables: {
                  input: {
                    branch: {repositoryNameWithOwner: $repo, branchName: $branch},
                    message: {headline: $headline},
                    expectedHeadOid: $oid,
                    fileChanges: {
                      additions: [
                        {path: "pyproject.toml", contents: $pyproject},
                        {path: "uv.lock", contents: $uvlock},
                        {path: "CHANGELOG.md", contents: $changelog}
                      ]
                    }
                  }
                }
              }' | gh api graphql --input - 2>&1)"
            GQL_EXIT=$?
            set -e
            if [ "${GQL_EXIT}" -eq 0 ]; then
              COMMIT_OID="$(echo "${RESPONSE}" | jq -r '.data.createCommitOnBranch.commit.oid // empty')"
            fi
            if [ -z "${COMMIT_OID}" ]; then
              if [ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ] \
                  && echo "${RESPONSE}" | grep -qi "expectedHeadOid\|does not match\|head sha"; then
                echo "createCommitOnBranch attempt ${ATTEMPT} hit an" \
                  "expectedHeadOid mismatch (likely REST/GraphQL read-after-" \
                  "write race); retrying." >&2
                sleep 2
              else
                echo "::error::createCommitOnBranch failed for ${BRANCH}" \
                  "(attempt ${ATTEMPT}/${MAX_ATTEMPTS}): ${RESPONSE}"
                exit 1
              fi
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done
          rm -f "${PYPROJECT_B64}" "${UVLOCK_B64}" "${CHANGELOG_B64}"
          # #CRITICAL security: don't just trust that createCommitOnBranch
          # produced a verified commit; ask GitHub to confirm it. This is the
          # exact class of bug that stalled PR #241 for days with green CI
          # and auto-merge enabled and nothing flagging it: a release commit
          # that branch protection would reject sat unnoticed until a human
          # happened to open the merge UI. Failing the job here turns that
          # into an immediate, visible CI failure instead of a silent stall.
          # #VERIFY every release commit is confirmed Verified before this
          # step is allowed to succeed; if this ever fires, fix the
          # commit-creation path above, do not admin-merge past it.
          VERIFIED="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${COMMIT_OID}" \
            --jq '.commit.verification.verified')"
          if [ "${VERIFIED}" != "true" ]; then
            REASON="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${COMMIT_OID}" \
              --jq '.commit.verification.reason')"
            echo "::error::Release commit ${COMMIT_OID} on ${BRANCH} is not" \
              "verified (reason: ${REASON}). Branch protection will block" \
              "this PR from merging; fix the commit-creation path in this" \
              "workflow rather than merging around it."
            exit 1
          fi
          # Reuse an existing open release PR for this branch, else create one.
          PR_NUMBER="$(gh pr list --head "${BRANCH}" --state open \
            --json number --jq '.[0].number // empty')"
          if [ -z "${PR_NUMBER}" ]; then
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(release): v${NEXT}" \
              --body "$(printf '%s\n' \
                "Automated version bump to v${NEXT}." \
                "" \
                "Regenerates the CHANGELOG from Conventional Commits via" \
                "python-semantic-release and bumps pyproject.toml plus uv.lock." \
                "When this PR merges, the publish job in release.yml creates" \
                "the tag and GitHub Release." \
                "" \
                "Closes #183" \
                "Closes #157" \
                "Closes #158")"
            PR_NUMBER="$(gh pr list --head "${BRANCH}" --state open \
              --json number --jq '.[0].number // empty')"
          fi
          # #CRITICAL external: an empty PR number means the release silently
          # stalls; fail loudly instead of feeding "null" to gh pr merge.
          # #VERIFY empty PR_NUMBER is a hard error, not a swallowed warning.
          if [ -z "${PR_NUMBER}" ]; then
            echo "::error::Could not resolve the release PR for ${BRANCH}."
            exit 1
          fi
          # #CRITICAL external: a failed auto-merge enable would otherwise leave
          # the release PR open with green CI and nothing flagging the stalled
          # release/v* branch, the exact silent stall this pipeline exists to
          # prevent. Re-running is safe (branch force-push + PR reuse), so fail
          # hard rather than emit a swallowed warning, matching the empty
          # PR_NUMBER guard above. #VERIFY a failed `gh pr merge --auto` is a
          # hard error (exit 1), not a warning.
          if ! gh pr merge "${PR_NUMBER}" --auto; then
            echo "::error::Could not enable auto-merge on release PR" \
              "#${PR_NUMBER}; re-run the workflow or merge it manually to" \
              "publish v${NEXT}."
            exit 1
          fi

      - name: Dry-run summary
        if: steps.version.outputs.released == 'true' && inputs.dry_run
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          # The writer step already ran (it is gated on `released`, not
          # `dry_run`), so the bumped files exist on disk; show the reviewer
          # exactly what would be committed without opening a PR.
          {
            echo "Dry run: would open a release PR for v${NEXT}."
            echo ""
            echo "### Files changed"
            echo '```'
            git diff --stat
            echo '```'
            echo ""
            echo "### Generated CHANGELOG section for v${NEXT}"
            echo '```markdown'
            echo "## [${NEXT}]"
            uv run python scripts/extract_changelog_section.py "${NEXT}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Tag and GitHub Release
    # #ASSUME external-resource: the merge queue squash-merges the release PR
    # using its "chore(release): vX.Y.Z" title as the commit subject, so this
    # prefix match fires (the propose job's negative guard relies on the same
    # convention). If the repo's squash-merge commit-message setting drifts
    # (e.g. to the PR number or the default merge message), publish silently
    # never runs and every release stalls. #VERIFY the repo keeps "Default
    # commit message" = "Pull request title" for squash merges (Settings >
    # General > Pull Requests > Allow squash merging).
    if: >-
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(grep -m1 -Po '^version = "\K[^"]+' pyproject.toml)"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists; nothing to do."
            exit 0
          fi
          python scripts/extract_changelog_section.py "${VERSION}" > release-notes.md
          gh release create "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "v${VERSION}" \
            --notes-file release-notes.md

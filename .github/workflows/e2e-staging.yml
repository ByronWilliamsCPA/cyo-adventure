# Runs the e2e-staging Playwright tier against the already-deployed staging
# frontend (this repo does not build/ship that frontend itself; homelab-infra
# does, on its own cadence, see trigger-image-build.yml). Scheduled + manual
# only, never on every PR: it authenticates real seeded accounts and mints a
# real device grant against the shared staging Supabase project (see
# docs/testing/README.md for why dev and staging share one backend on the
# Supabase free plan's two-project limit).
name: E2E (staging)

on:
  schedule:
    # Daily. The staging fixtures are disposable and idempotent
    # (scripts/seed_staging.py), so a failure here means either the seed
    # drifted, the staging frontend build is broken, or a real regression.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Every run authenticates against and mints/revokes a device grant on the
  # shared staging Supabase project; two overlapping runs (a schedule firing
  # mid manual-dispatch, or two manual dispatches) could race on the same
  # seeded fixtures. Never cancel a run in favor of a newer one: let the
  # in-flight run finish and its cleanup complete before the next starts.
  group: e2e-staging
  cancel-in-progress: false

jobs:
  e2e-staging:
    name: Playwright (e2e-staging tier)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    defaults:
      run:
        working-directory: ./frontend
    env:
      E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
      E2E_STAGING_GUARDIAN_PASSWORD: ${{ secrets.E2E_STAGING_GUARDIAN_PASSWORD }}
      E2E_STAGING_ADMIN_PASSWORD: ${{ secrets.E2E_STAGING_ADMIN_PASSWORD }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright, staging tier)
        run: npm run test:e2e:staging

      - name: Upload Playwright trace on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-staging-traces
          path: frontend/test-results/
          retention-days: 7

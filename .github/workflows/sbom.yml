# SBOM & Security Scan - Calls Org-Level Reusable Workflow
# This is a lightweight caller workflow that invokes the organization's
# shared SBOM generation and security scanning workflow.
#
# Features:
#   - CycloneDX SBOM generation
#   - Trivy vulnerability scanning
#   - License compliance checking
#   - SARIF upload to GitHub Security tab
name: SBOM & Security Scan

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/sbom.yml"
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    # Weekly scan every Monday at 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INFISICAL_DOMAIN: https://infisical.williamshome.family
jobs:
  # See ci.yml's detect-release-pr for the full rationale: release.yml's
  # propose job opens a "chore(release): vX.Y.Z" PR (branch release/v*) that
  # only ever touches pyproject.toml/uv.lock/CHANGELOG.md, which this
  # workflow's own path filters above match on every single time -- skip the
  # scan there (weekly schedule + the next feature PR's own run remain the
  # backstop for a `uv lock` re-resolve silently picking up a newly
  # vulnerable transitive dependency).
  detect-release-pr:
    name: Detect release-automation PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_pr: ${{ steps.check.outputs.release_pr }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check for release-automation branch/commit
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          RELEASE_PR=false
          case "$EVENT_NAME" in
            pull_request)
              [[ "$HEAD_REF" == release/v* ]] && RELEASE_PR=true
              ;;
            push)
              [[ "$HEAD_COMMIT_MESSAGE" == "chore(release):"* ]] && RELEASE_PR=true
              ;;
          esac
          echo "release_pr=${RELEASE_PR}" >> "$GITHUB_OUTPUT"

  sbom:
    name: SBOM & Security
    needs: detect-release-pr
    if: needs.detect-release-pr.outputs.release_pr != 'true'
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sbom.yml@c4ba2d18e4de831cbdbffcafd8e033473c0a0059  # main
    with:
      python-version: '3.12'
      # cyo_adventure ships a build backend (it is an installable package), so the
      # reusable workflow must NOT pass --no-build; otherwise `uv sync` errors with
      # "marked as --no-build but has no binary distribution".
      no-build: false
      fail-on-vulnerabilities: true
      severity-threshold: 'CRITICAL,HIGH'
      artifact-retention-days: 90
      fail-on-forbidden-licenses: false
    secrets:
      INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

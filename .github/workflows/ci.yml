# CI/CD Pipeline
# Runs tests, linting, type checking, and security scans.
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Security scanning (Bandit)
#   - Optional SonarCloud/Codecov integration
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege at workflow level; jobs that need writes declare them locally.
# (SonarCloud githubactions:S8233: no workflow-level write permissions.)
permissions:
  contents: read

jobs:
  # Delegate Python quality gates (tests, lint, type-check, coverage, bandit) to
  # the org-level reusable CI workflow, mirroring the reference .claude/ci.yml.
  # This replaces the previous standalone job that fetched Infisical/GCP secrets
  # the unit-test suite does not need (and which fail when those secrets are
  # absent on a fork or a repo without them configured).
  ci:
    name: CI (Python 3.12)
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@d5cf99101d4150ae5832d154cb42993705a09e31 # v7.0.1
    with:
      python-version: "3.12"
      coverage-threshold: 80
      # cyo_adventure is an installable package with a build backend; the shared
      # workflow defaults no-build: true, which would block the editable install.
      no-build: false
    secrets: inherit

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./frontend
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Build
        run: npm run build

      - name: Validate nginx.conf syntax
        # Uses the same hardened image pinned in frontend/Dockerfile's production
        # stage so this check exercises the actual runtime image, not a stand-in.
        # That image's ENTRYPOINT is already `nginx`, so the container command is
        # just `-t` (passing `nginx -t` fails with "invalid option: nginx").
        # proxy_pass targets are resolved via a variable + resolver in nginx.conf,
        # so this passes without a live network; no compose stack is started here.
        run: |
          docker run --rm \
            -v "$(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            ghcr.io/byronwilliamscpa/dhi-nginx:1.26-debian13@sha256:6b0137dc31dcff3c86854e3d9bbafb33201a6b0b83c44ecb0f4f6f092d68a7f4 \
            -t

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npm run test:e2e

      - name: Upload frontend coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # v6's action.yml has no singular "file" input (only plural "files");
          # the old key was silently ignored, and lcov.info's SF: paths are
          # relative to frontend/, so working-directory is required to map
          # them back to the PR diff correctly.
          files: ./coverage/lcov.info
          # Vitest's v8 provider also writes coverage/coverage-final.json,
          # which Codecov's auto-search picks up as a second report and
          # merges alongside the explicit lcov.info, diluting/mismapping
          # per-file results. We already pass the exact file, so disable
          # search entirely.
          disable_search: true
          working-directory: frontend
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  design-system:
    name: Design System (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend/design-system
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Build
        run: npm run build

      - name: Upload design-system coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          disable_search: true
          working-directory: frontend/design-system
          flags: design-system
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend-e2e-real:
    name: Frontend e2e (real backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: ghcr.io/byronwilliamscpa/dhi-postgres:16-debian13
        env:
          POSTGRES_DB: cyo_adventure
          POSTGRES_USER: cyo_adventure
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyo_adventure"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # #ASSUME: external resources: the Postgres service container's health-cmd
      # gate keeps this job from starting before Postgres accepts connections;
      # the curl retry loop on /health/ready below (backed by a SELECT 1 probe)
      # covers any remaining settle time on the uvicorn side.
      # #VERIFY: if this job flakes on database-not-ready errors, raise
      # --health-retries or the curl --retry count.
      CYO_ADVENTURE_DATABASE_URL: postgresql+asyncpg://cyo_adventure:password@localhost:5432/cyo_adventure
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --all-extras

      - name: Seed database
        run: uv run python scripts/seed_dev_data.py

      - name: Start backend
        run: |
          uv run uvicorn cyo_adventure.app:app --port 8000 &
          curl --retry 20 --retry-delay 2 --retry-all-errors -fsS http://localhost:8000/health/ready

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run real-backend smoke tier
        # #ASSUME: external resources: this project's webServer (playwright.config.ts)
        # runs `npm run build && npm run preview`, proxying /api to the uvicorn
        # backend started above; VITE_API_URL is intentionally left unset so the
        # build keeps the default '/api' base the preview proxy expects.
        # #VERIFY: if the proxy target ever changes, keep VITE_API_URL unset here
        # or update the proxy target in frontend/vite.config.ts together.
        working-directory: ./frontend
        run: npm run test:e2e:real

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci, frontend, design-system, frontend-e2e-real]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check CI results
        env:
          CI_RESULT: ${{ needs.ci.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DESIGN_SYSTEM_RESULT: ${{ needs.design-system.result }}
          FRONTEND_E2E_REAL_RESULT: ${{ needs.frontend-e2e-real.result }}
        run: |
          FAILED=false
          [ "$CI_RESULT" != "success" ] && FAILED=true
          [ "$FRONTEND_RESULT" != "success" ] && FAILED=true
          [ "$DESIGN_SYSTEM_RESULT" != "success" ] && FAILED=true
          [ "$FRONTEND_E2E_REAL_RESULT" != "success" ] && FAILED=true
          if [ "$FAILED" = "true" ]; then
            echo "CI Gate failed"
            exit 1
          fi
          echo "CI Gate passed"

# CI/CD Pipeline
# Runs tests, linting, type checking, and security scans.
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Security scanning (Bandit)
#   - Optional SonarCloud/Codecov integration
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege at workflow level; jobs that need writes declare them locally.
# (SonarCloud githubactions:S8233: no workflow-level write permissions.)
permissions:
  contents: read

jobs:
  # Delegate Python quality gates (tests, lint, type-check, coverage, bandit) to
  # the org-level reusable CI workflow, mirroring the reference .claude/ci.yml.
  # This replaces the previous standalone job that fetched Infisical/GCP secrets
  # the unit-test suite does not need (and which fail when those secrets are
  # absent on a fork or a repo without them configured).
  ci:
    name: CI (Python 3.12)
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@6f71aecae2c91214ca0a0a2206a36cf912aa31ac # v1.1.0
    with:
      python-version: "3.12"
      coverage-threshold: 80
      # cyo_adventure is an installable package with a build backend; the shared
      # workflow defaults no-build: true, which would block the editable install.
      no-build: false
    secrets: inherit

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./frontend
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npm run test:e2e

      - name: Upload frontend coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci, frontend]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check CI results
        env:
          CI_RESULT: ${{ needs.ci.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
        run: |
          FAILED=false
          [ "$CI_RESULT" != "success" ] && FAILED=true
          [ "$FRONTEND_RESULT" != "success" ] && FAILED=true
          if [ "$FAILED" = "true" ]; then
            echo "CI Gate failed"
            exit 1
          fi
          echo "CI Gate passed"

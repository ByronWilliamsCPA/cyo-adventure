# CI/CD Pipeline
# Runs tests, linting, type checking, and security scans.
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Security scanning (Bandit)
#   - Optional SonarCloud/Codecov integration
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege at workflow level; jobs that need writes declare them locally.
# (SonarCloud githubactions:S8233: no workflow-level write permissions.)
permissions:
  contents: read

jobs:
  # release.yml's `propose` job opens an automated "chore(release): vX.Y.Z" PR
  # (branch release/v*) that only ever touches pyproject.toml/uv.lock/
  # CHANGELOG.md: a version bump, a `uv lock` re-resolve, and a changelog
  # promotion, generated by CI itself. The code it "tests" was already run in
  # full on the feature PR that triggered propose (its own pull_request,
  # merge_group, and post-merge push-to-main runs) -- re-running the whole
  # suite a 4th/5th/6th time (this PR's pull_request + merge_group, then
  # again on push once it merges) adds no new signal about application
  # correctness, only that a version string edit didn't break anything.
  # #ASSUME external-resource: the one real gap this leaves is `uv lock`
  # resolving a newly-published transitive dependency version the original
  # feature PR's tests never exercised. Accepted tradeoff: this is caught by
  # the weekly scheduled scans (python-compatibility.yml, sbom.yml,
  # container-security.yml) and the next feature PR's own full run, not left
  # permanently unverified.
  # #VERIFY: on a merge_group event, github.event.merge_group.head_ref is the
  # synthetic queue ref (refs/heads/gh-readonly-queue/main/pr-<N>-<sha>), NOT
  # the PR's own source branch -- confirmed against this repo's real queue
  # runs (e.g. gh-readonly-queue/main/pr-306-c761f39f...), not assumed from
  # docs alone. The PR number is embedded in that ref; look the PR up via the
  # API to get its actual head branch. If the lookup fails for any reason,
  # this job fails open (release_pr=false), which only costs back the
  # redundant run, not a false skip.
  detect-release-pr:
    name: Detect release-automation PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      release_pr: ${{ steps.check.outputs.release_pr }}
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check for release-automation branch/commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          RELEASE_PR=false
          case "$EVENT_NAME" in
            pull_request)
              [[ "$HEAD_REF" == release/v* ]] && RELEASE_PR=true
              ;;
            merge_group)
              PR_NUMBER="$(echo "$MERGE_GROUP_HEAD_REF" | grep -oP '(?<=/pr-)\d+' || true)"
              if [ -n "${PR_NUMBER}" ]; then
                PR_HEAD_REF="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
                  --jq '.head.ref' 2>/dev/null || true)"
                [[ "$PR_HEAD_REF" == release/v* ]] && RELEASE_PR=true
              fi
              ;;
            push)
              [[ "$HEAD_COMMIT_MESSAGE" == "chore(release):"* ]] && RELEASE_PR=true
              ;;
          esac
          echo "release_pr=${RELEASE_PR}" >> "$GITHUB_OUTPUT"

  # Delegate Python quality gates (tests, lint, type-check, coverage, bandit) to
  # the org-level reusable CI workflow, mirroring the reference .claude/ci.yml.
  # This replaces the previous standalone job that fetched Infisical/GCP secrets
  # the unit-test suite does not need (and which fail when those secrets are
  # absent on a fork or a repo without them configured).
  ci:
    name: CI (Python 3.12)
    needs: detect-release-pr
    if: needs.detect-release-pr.outputs.release_pr != 'true'
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@c4ba2d18e4de831cbdbffcafd8e033473c0a0059 # #270: parallel buckets pass --cov-fail-under=0, coverage-combine gates
    with:
      python-version: "3.12"
      coverage-threshold: 80
      # Run the integration and security buckets as separate pytest passes so
      # they produce coverage-integration.xml / coverage-security.xml (and the
      # matching junit files) for per-test-type Codecov flags. Without these,
      # the reusable's unit step excludes `-m integration`/`-m security`, so
      # those 39 integration-marked and 3 security-marked test files never run
      # in CI at all.
      run-integration-tests: true
      run-security-tests: true
      # cyo_adventure is an installable package with a build backend; the shared
      # workflow defaults no-build: true, which would block the editable install.
      no-build: false
      # Opt-in trial of ByronWilliamsCPA/.github#269: splits unit/integration/
      # security into parallel jobs instead of one sequential job, taking the
      # ~5.5min integration suite off the critical path it currently shares
      # with unit+security. Relies on relative_files = true below (already
      # set) for coverage-combine's cross-runner `coverage combine` to merge
      # correctly; see coverage-combine's inline #ASSUME in python-ci.yml.
      parallel-tests: true
    secrets: inherit

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # merge_group re-runs the identical tree the pull_request run already
    # validated (frontend build/lint/typecheck/tests are file-content-only,
    # not merged-state-sensitive); skip here and rely on the PR run plus the
    # post-merge push-to-main run. See docs/planning/PROJECT-PLAN.md CI notes.
    # Also skipped for release-automation PRs (see detect-release-pr): they
    # never touch frontend/.
    needs: detect-release-pr
    if: github.event_name != 'merge_group' && needs.detect-release-pr.outputs.release_pr != 'true'
    defaults:
      run:
        working-directory: ./frontend
    permissions:
      contents: read
    env:
      # See the coverage-upload job: job-scoped so the Qlty step can gate on it.
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Upload frontend test results to Codecov
        # Feeds Codecov Test Analytics (the "Tests" tab). Vitest writes junit.xml
        # in CI (CI-gated reporter in vite.config.ts). Runs even when tests fail
        # (!cancelled) because failing runs are the most useful to surface.
        # Unlike codecov-action, test-results-action has no working-directory
        # input, so the path is given from the repo root, not ./ under frontend.
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: ./frontend/junit.xml
          disable_search: true
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: npm run build

      - name: Validate nginx.conf syntax
        # Uses the same hardened image pinned in frontend/Dockerfile's production
        # stage so this check exercises the actual runtime image, not a stand-in.
        # That image's ENTRYPOINT is already `nginx`, so the container command is
        # just `-t` (passing `nginx -t` fails with "invalid option: nginx").
        # proxy_pass targets are resolved via a variable + resolver in nginx.conf,
        # so this passes without a live network; no compose stack is started here.
        run: |
          docker run --rm \
            -v "$(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            ghcr.io/byronwilliamscpa/dhi-nginx:1.26-debian13@sha256:6b0137dc31dcff3c86854e3d9bbafb33201a6b0b83c44ecb0f4f6f092d68a7f4 \
            -t

      - name: Install Playwright browsers (mocked e2e tier)
        run: npx playwright install --with-deps chromium

      # Only the mocked `test:e2e` (chromium) project runs in CI; it mocks the
      # API per test and needs no backend. The real-backend `test:e2e:real`
      # tier stays local-only (it needs Postgres + a seeded uvicorn); run it
      # per frontend/README.md before opening a PR.
      - name: E2E (Playwright, mocked tier)
        run: npm run test:e2e

      # Vitest writes lcov SF: paths relative to the package root (src/App.tsx),
      # but Codecov matches against the repo tree where the file is
      # frontend/src/App.tsx. Rewrite the paths to repo-root-relative so they
      # match exactly, then upload from the repo root (no working-directory).
      # This is deterministic: the report path IS the git path, so it merges as
      # a session instead of being dropped as "path mismatch". Working-directory
      # here does the opposite (records src/... which cannot resolve).
      - name: Prefix lcov paths with the package root
        run: sed -i 's|^SF:|SF:frontend/|' coverage/lcov.info

      - name: Upload frontend coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./frontend/coverage/lcov.info
          # Vitest's v8 provider also writes coverage/coverage-final.json, which
          # Codecov's auto-search would pick up as a second, unprefixed report.
          # We pass the exact file, so disable search entirely.
          disable_search: true
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Same prefixed lcov (paths already frontend/src/...) to Qlty; this job's
      # checkout lets qlty attach the commit SHA and qlty merges it with the
      # backend and design-system uploads for one repo coverage number.
      - name: Upload frontend coverage to Qlty
        if: ${{ env.QLTY_COVERAGE_TOKEN != '' && hashFiles('frontend/coverage/lcov.info') != '' }}
        # See the coverage-upload job: a Qlty hiccup must not block a merge.
        continue-on-error: true
        uses: qltysh/qlty-action/coverage@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2.2.3
        with:
          token: ${{ env.QLTY_COVERAGE_TOKEN }}
          files: frontend/coverage/lcov.info

  design-system:
    name: Design System (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # See frontend job: not merged-state-sensitive, skip on merge_group; also
    # skipped for release-automation PRs (see detect-release-pr).
    needs: detect-release-pr
    if: github.event_name != 'merge_group' && needs.detect-release-pr.outputs.release_pr != 'true'
    defaults:
      run:
        working-directory: ./frontend/design-system
    permissions:
      contents: read
    env:
      # See the coverage-upload job: job-scoped so the Qlty step can gate on it.
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Build
        run: npm run build

      # Guards the react/jsx-runtime external in vite.config.ts: if a future
      # Vite/rolldown bump re-inlines the jsx runtime, its CJS-interop shim
      # carries a runtime require("react") that throws in browser consumers
      # of the ESM dist. The inlined runtime is identifiable by this marker.
      - name: Assert jsx-runtime is not inlined in the ESM bundle
        run: |
          if grep -q 'react-stack-top-frame' dist/cyo-design-system.js; then
            echo 'react/jsx-runtime was inlined into dist/cyo-design-system.js;'
            echo 'check rollupOptions.external in frontend/design-system/vite.config.ts'
            exit 1
          fi

      # Same repo-root-relative rewrite as the frontend job (see note there):
      # design-system lcov SF: paths are src/... relative to the package, the
      # repo path is frontend/design-system/src/..., so prefix then upload from
      # the repo root.
      - name: Prefix lcov paths with the package root
        run: sed -i 's|^SF:|SF:frontend/design-system/|' coverage/lcov.info

      - name: Upload design-system coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./frontend/design-system/coverage/lcov.info
          disable_search: true
          flags: design-system
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Same prefixed lcov (frontend/design-system/src/...) to Qlty; merged with
      # the backend and frontend uploads for this commit (see coverage-upload).
      - name: Upload design-system coverage to Qlty
        if: ${{ env.QLTY_COVERAGE_TOKEN != '' && hashFiles('frontend/design-system/coverage/lcov.info') != '' }}
        # See the coverage-upload job: a Qlty hiccup must not block a merge.
        continue-on-error: true
        uses: qltysh/qlty-action/coverage@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2.2.3
        with:
          token: ${{ env.QLTY_COVERAGE_TOKEN }}
          files: frontend/design-system/coverage/lcov.info

  # Note: the mocked Playwright tier (`test:e2e`) runs inside the `frontend`
  # job above. The real-backend tier (`test:e2e:real`) is deliberately not a CI
  # job: it needs Postgres + a seeded uvicorn, so it is local-only; run it per
  # frontend/README.md before opening a PR.

  contract:
    name: OpenAPI Contract Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # See frontend job: skip on merge_group. #EDGE: concurrency: two queued
    # PRs could each pass individually but drift the schema only when
    # combined; the post-merge push-to-main run on ci.yml catches that case
    # after the fact rather than blocking the queue on it.
    # #VERIFY: if combined-PR schema drift becomes a recurring incident, move
    # this job back to running on merge_group.
    # Also skipped for release-automation PRs (see detect-release-pr): they
    # never touch the API surface.
    needs: detect-release-pr
    if: github.event_name != 'merge_group' && needs.detect-release-pr.outputs.release_pr != 'true'
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # The `api` extra (FastAPI, SQLAlchemy, uvicorn) is enough to build the
      # app and call its .openapi() method in-process; no live server, no
      # database connection, and none of the `dev` extra's test/lint tooling
      # are needed just to dump the schema.
      - name: Install backend (api extra)
        run: uv sync --extra api

      - name: Dump OpenAPI schema from the app in-process
        run: |
          uv run python -c "import json; from cyo_adventure.app import app; print(json.dumps(app.openapi()))" > openapi.json

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # OPENAPI_INPUT overrides openapi-ts.config.ts's default localhost URL so
      # this regenerates from the schema dumped above instead of needing a
      # running backend (see openapi-ts.config.ts for the override).
      - name: Regenerate client against the dumped schema
        working-directory: ./frontend
        env:
          SCHEMA_PATH: ${{ github.workspace }}/openapi.json
        run: OPENAPI_INPUT="$SCHEMA_PATH" npm run generate-client

      - name: Fail on generated client drift
        run: |
          git diff --exit-code -- frontend/src/client || (echo "::error::Generated OpenAPI client is out of date. Run 'npm run generate-client' against a live backend (see frontend/README.md) and commit the result." && exit 1)

  # WS-0 Phase 2 diversity regression gate: pure Python over the committed
  # tests/data/diversity_panel/ fixtures (~400 KB), seconds of wall time, no
  # secrets, no network. Standalone (not folded into the reusable `ci` job)
  # for the same reason as `contract`: the backend quality gate is delegated
  # to an org-level reusable workflow that cannot take an extra step. Runs
  # per-PR, not nightly (docs/planning/ws0-phase2-harness-design.md section
  # 4.3): a regression gate is only cheap to act on when it fires on the PR
  # that caused it, and the baseline-update review contract requires the
  # gate and the causal change to land in the same PR.
  diversity:
    name: Diversity Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # The harness logic is pure Python over committed fixtures, but importing
      # `cyo_adventure.diversity` pulls in `diversity/history.py` (the WS-4
      # request-time query), which imports SQLAlchemy, so the `api` extra is
      # required to `import cyo_adventure` at all. `uv sync --extra api` builds
      # the .venv the subsequent `uv run` uses, mirroring the `contract` job
      # above (an earlier `uv pip install --system -e .` failed because `uv run`
      # then created its own base-only .venv without SQLAlchemy).
      - name: Install backend (api extra)
        run: uv sync --extra api

      - name: Diversity eval (offline panel, regression rules R1-R6)
        run: uv run python scripts/run_diversity_eval.py --check

  # Uploads the backend's per-test-type coverage + JUnit to Codecov, INLINE so
  # it runs on PRs (the old workflow_run codecov.yml only ran on main). The
  # reusable `ci` job publishes coverage-{unit,integration,security}.xml and
  # junit-{...}.xml as the `coverage-reports` artifact; each uploads under its
  # own flag (single axis: one report -> one flag). Non-fatal (fail_ci_if_error
  # false) and deliberately NOT in ci-gate's needs: a Codecov hiccup must not
  # block merges. Frontend/design-system coverage upload from their own jobs.
  coverage-upload:
    name: Upload backend coverage (Codecov + Qlty)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    # merge_group's commit is the ephemeral queue merge commit, not the real
    # commit that lands on main, so a coverage upload keyed to it is wasted;
    # the push-to-main run after the queue lands uploads for the real commit.
    if: ${{ !cancelled() && needs.ci.result == 'success' && github.event_name != 'merge_group' }}
    permissions:
      contents: read
    env:
      # Surfaced at job scope so the Qlty step's `if:` can gate on token
      # presence; `secrets.*` is not referenceable in a step-level if:. Absent
      # on forks, so the Qlty upload skips there rather than failing.
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      # Codecov path-fixing needs the source tree present: pytest-cov emits two
      # <source> roots (src and src/cyo_adventure), and Codecov disambiguates
      # them against `git ls-files`. Without a checkout the reports are rejected
      # server-side as "source code unavailability / path mismatch". The reports
      # themselves come from the artifact below.
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download backend coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-reports
          path: coverage-reports

      - name: Upload unit coverage
        if: ${{ hashFiles('coverage-reports/coverage-unit.xml') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage-reports/coverage-unit.xml
          disable_search: true
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload integration coverage
        if: ${{ hashFiles('coverage-reports/coverage-integration.xml') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage-reports/coverage-integration.xml
          disable_search: true
          flags: integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload security coverage
        if: ${{ hashFiles('coverage-reports/coverage-security.xml') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage-reports/coverage-security.xml
          disable_search: true
          flags: security
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Qlty Cloud coverage. This runs here, not the old workflow_run qlty.yml,
      # because `qlty coverage publish` needs the repo checked out: it resolves
      # the Cobertura <source> roots (src and src/cyo_adventure) against the
      # working tree and reads the commit SHA from git. The reusable workflow_run
      # caller had neither, so its uploads carried unresolvable paths and no
      # commit association (green job, nothing on the dashboard). qlty merges the
      # three per-type reports into one report for the commit, mirroring the
      # Codecov sessions above. All three are produced every run; the unit
      # hashFiles gate just confirms the artifact downloaded.
      - name: Upload backend coverage to Qlty
        if: ${{ env.QLTY_COVERAGE_TOKEN != '' && hashFiles('coverage-reports/coverage-unit.xml') != '' }}
        # A Qlty upload hiccup must not fail the job or block a merge, matching
        # the Codecov steps' fail_ci_if_error: false.
        continue-on-error: true
        uses: qltysh/qlty-action/coverage@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2.2.3
        with:
          token: ${{ env.QLTY_COVERAGE_TOKEN }}
          files: coverage-reports/coverage-unit.xml,coverage-reports/coverage-integration.xml,coverage-reports/coverage-security.xml

      - name: Upload unit test results
        if: ${{ !cancelled() && hashFiles('coverage-reports/junit-unit.xml') != '' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: coverage-reports/junit-unit.xml
          disable_search: true
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload integration test results
        if: ${{ !cancelled() && hashFiles('coverage-reports/junit-integration.xml') != '' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: coverage-reports/junit-integration.xml
          disable_search: true
          flags: integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload security test results
        if: ${{ !cancelled() && hashFiles('coverage-reports/junit-security.xml') != '' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: coverage-reports/junit-security.xml
          disable_search: true
          flags: security
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Guards the api-tests job on a Postman collection existing. The check runs in
  # a STEP (job-level `if: hashFiles(...)` is not permitted and fails the whole
  # workflow at startup), exposing the result as an output the api-tests job
  # gates on. Cheap (checkout + one file test).
  detect-api-collection:
    name: Detect API collection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Not in ci-gate's needs (see api-tests comment); skipping here on
    # merge_group cascades to skip the 15-minute docker-compose api-tests job
    # below via its `needs.detect-api-collection.outputs.present` check. Same
    # cascade for release-automation PRs (see detect-release-pr): they never
    # touch the API surface.
    needs: detect-release-pr
    if: github.event_name != 'merge_group' && needs.detect-release-pr.outputs.release_pr != 'true'
    permissions:
      contents: read
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check for Postman collection
        id: check
        run: |
          if [ -f docs/api/postman-collection.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  # API-level tests (Postman/newman) -> Codecov Test Analytics under the `api`
  # flag (org Codecov flag taxonomy; the tiered-flag standard lives in the org
  # standards repo, not at a path in this repo). ACTIVE: the collection lives
  # at docs/api/postman-collection.json; detect-api-collection keeps the job
  # skipped (not failed) only if it is ever removed. Intentionally NOT in
  # ci-gate's needs yet: promotion to a required gate is deferred until the
  # job proves stable across a few merges (see the promotion follow-up issue).
  api-tests:
    name: API Tests (newman)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-api-collection
    if: ${{ needs.detect-api-collection.outputs.present == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install newman
        run: npm install -g --ignore-scripts newman@6.2.1

      # Brings up the API (port 8000, /health/live) plus Postgres from the repo
      # compose stack; the compose defaults (ENVIRONMENT=local dev auth, dev
      # token-signing secrets for the child-session/device-grant mints, no
      # external-service credentials) are all this job needs.
      - name: Start API stack
        run: docker compose up -d --build app db

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health/live >/dev/null 2>&1; then
              echo "API ready"; exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become ready in time"; exit 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # The `api` extra (FastAPI, SQLAlchemy) is enough to seed the compose
      # db; no `dev` extra test/lint tooling is needed here.
      - name: Install backend (api extra)
        run: uv sync --extra api

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      # The baseline dump carries Supabase's `OWNER TO "postgres"` statements;
      # the compose db runs as `cyo_adventure` with no postgres role, so the
      # push fails with SQLSTATE 42704 unless the role exists. Duplicate-
      # tolerant, mirroring tests/integration/test_schema_parity.py; a
      # superuser may reassign ownership to any existing role, so the bare
      # role is sufficient.
      - name: Create postgres role for baseline OWNER statements
        run: |
          docker compose exec -T db psql -U cyo_adventure -d cyo_adventure -c \
            'DO $$ BEGIN CREATE ROLE "postgres"; EXCEPTION WHEN duplicate_object THEN NULL; END $$;'

      # Applies the real Supabase migration chain against the compose db (not
      # Base.metadata.create_all): the collection exercises the migrated
      # schema, matching what staging/production deploys actually run.
      # #ASSUME: external resources: CLI 2.109.1 attempts a TLS handshake by
      # default against plain Postgres with no plaintext fallback, and
      # ignores ?sslmode=disable in the db-url, so pushing to the non-TLS
      # compose db fails with "tls error (server refused TLS connection)"
      # unless the standard libpq env var PGSSLMODE=disable is set (verified
      # locally against a scratch postgres:16-alpine). --yes answers the
      # push confirmation prompt non-interactively.
      # #VERIFY: on future supabase-cli upgrades, re-check whether the CLI
      # honors sslmode in the db-url and drop PGSSLMODE once it does.
      - name: Apply database migrations
        env:
          PGSSLMODE: disable
          SUPABASE_DB_URL: postgresql://cyo_adventure:password@localhost:5432/cyo_adventure
        run: |
          supabase db push --db-url "$SUPABASE_DB_URL" --yes

      # Seeds the family/profiles/published+in-review stories the collection
      # asserts on. Idempotent (scripts/seed_dev_data.py), and runs AFTER the
      # migration so it inserts into the migrated schema, not a schema built
      # ad hoc from ORM metadata.
      - name: Seed dev data
        env:
          DATABASE_URL: postgresql+asyncpg://cyo_adventure:password@localhost:5432/cyo_adventure
        run: uv run python scripts/seed_dev_data.py

      # #ASSUME: timing: --delay-request 1100 keeps consecutive requests from
      # racing the unit-of-work commit, which lands after the response is sent
      # (FastAPI yield-dependency teardown): without a delay, a create's row
      # can be invisible to the immediately following request. It also paces
      # the suite under the 60 req/min rate limiter wherever that middleware
      # is enabled (it is off in this stack's ENVIRONMENT=local). The delay is
      # a mitigation, not the fix: the durable fix is committing the
      # unit-of-work before the response is sent (api/deps.py::get_db_session),
      # which affects every fast client and is tracked as follow-up work.
      # #VERIFY: every newman invocation of this collection (here and the local
      # loop in docs/api/README.md) must carry the same delay, or fast
      # back-to-back requests intermittently 403/404 on just-created rows.
      - name: Run newman (JUnit for Test Analytics)
        run: |
          newman run docs/api/postman-collection.json \
            --env-var "base_url=http://localhost:8000" \
            --delay-request 1100 \
            --reporters cli,junit \
            --reporter-junit-export newman-junit.xml \
            --bail

      - name: Upload API test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: ./newman-junit.xml
          disable_search: true
          flags: api
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Tear down API stack
        if: ${{ always() }}
        run: docker compose down -v

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect-release-pr, ci, frontend, design-system, contract]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check CI results
        env:
          RELEASE_PR: ${{ needs.detect-release-pr.outputs.release_pr }}
          CI_RESULT: ${{ needs.ci.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DESIGN_SYSTEM_RESULT: ${{ needs.design-system.result }}
          CONTRACT_RESULT: ${{ needs.contract.result }}
        run: |
          # A release-automation PR (see detect-release-pr) intentionally
          # skips ci/frontend/design-system/contract entirely -- there is
          # nothing else to check here.
          if [ "$RELEASE_PR" = "true" ]; then
            echo "CI Gate passed (release-automation PR; full suite intentionally skipped)"
            exit 0
          fi
          # frontend/design-system/contract intentionally report "skipped" on
          # merge_group (see their job-level `if:`); ci never skips outside
          # the release-automation case above, so a skipped ci result still
          # fails the gate.
          FAILED=false
          [ "$CI_RESULT" != "success" ] && FAILED=true
          [ "$FRONTEND_RESULT" != "success" ] && [ "$FRONTEND_RESULT" != "skipped" ] && FAILED=true
          [ "$DESIGN_SYSTEM_RESULT" != "success" ] && [ "$DESIGN_SYSTEM_RESULT" != "skipped" ] && FAILED=true
          [ "$CONTRACT_RESULT" != "success" ] && [ "$CONTRACT_RESULT" != "skipped" ] && FAILED=true
          if [ "$FAILED" = "true" ]; then
            echo "CI Gate failed"
            exit 1
          fi
          echo "CI Gate passed"

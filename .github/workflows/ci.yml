# CI/CD Pipeline
# Runs tests, linting, type checking, and security scans.
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Security scanning (Bandit)
#   - Optional SonarCloud/Codecov integration
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege at workflow level; jobs that need writes declare them locally.
# (SonarCloud githubactions:S8233: no workflow-level write permissions.)
permissions:
  contents: read

jobs:
  # Delegate Python quality gates (tests, lint, type-check, coverage, bandit) to
  # the org-level reusable CI workflow, mirroring the reference .claude/ci.yml.
  # This replaces the previous standalone job that fetched Infisical/GCP secrets
  # the unit-test suite does not need (and which fail when those secrets are
  # absent on a fork or a repo without them configured).
  ci:
    name: CI (Python 3.12)
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@9094060cab9ec14e8fb2775965e8872e7d347d9d # v7.0.2
    with:
      python-version: "3.12"
      coverage-threshold: 80
      # cyo_adventure is an installable package with a build backend; the shared
      # workflow defaults no-build: true, which would block the editable install.
      no-build: false
    secrets: inherit

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./frontend
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Upload frontend test results to Codecov
        # Feeds Codecov Test Analytics (the "Tests" tab). Vitest writes junit.xml
        # in CI (CI-gated reporter in vite.config.ts). Runs even when tests fail
        # (!cancelled) because failing runs are the most useful to surface.
        # Unlike codecov-action, test-results-action has no working-directory
        # input, so the path is given from the repo root, not ./ under frontend.
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: ./frontend/junit.xml
          disable_search: true
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: npm run build

      - name: Validate nginx.conf syntax
        # Uses the same hardened image pinned in frontend/Dockerfile's production
        # stage so this check exercises the actual runtime image, not a stand-in.
        # That image's ENTRYPOINT is already `nginx`, so the container command is
        # just `-t` (passing `nginx -t` fails with "invalid option: nginx").
        # proxy_pass targets are resolved via a variable + resolver in nginx.conf,
        # so this passes without a live network; no compose stack is started here.
        run: |
          docker run --rm \
            -v "$(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            ghcr.io/byronwilliamscpa/dhi-nginx:1.26-debian13@sha256:6b0137dc31dcff3c86854e3d9bbafb33201a6b0b83c44ecb0f4f6f092d68a7f4 \
            -t

      - name: Install Playwright browsers (mocked e2e tier)
        run: npx playwright install --with-deps chromium

      # Only the mocked `test:e2e` (chromium) project runs in CI; it mocks the
      # API per test and needs no backend. The real-backend `test:e2e:real`
      # tier stays local-only (it needs Postgres + a seeded uvicorn); run it
      # per frontend/README.md before opening a PR.
      - name: E2E (Playwright, mocked tier)
        run: npm run test:e2e

      - name: Upload frontend coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # v6's action.yml has no singular "file" input (only plural "files");
          # the old key was silently ignored, and lcov.info's SF: paths are
          # relative to frontend/, so working-directory is required to map
          # them back to the PR diff correctly.
          files: ./coverage/lcov.info
          # Vitest's v8 provider also writes coverage/coverage-final.json,
          # which Codecov's auto-search picks up as a second report and
          # merges alongside the explicit lcov.info, diluting/mismapping
          # per-file results. We already pass the exact file, so disable
          # search entirely.
          disable_search: true
          working-directory: frontend
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  design-system:
    name: Design System (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend/design-system
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Build
        run: npm run build

      - name: Upload design-system coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          disable_search: true
          working-directory: frontend/design-system
          flags: design-system
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Note: the mocked Playwright tier (`test:e2e`) runs inside the `frontend`
  # job above. The real-backend tier (`test:e2e:real`) is deliberately not a CI
  # job: it needs Postgres + a seeded uvicorn, so it is local-only; run it per
  # frontend/README.md before opening a PR.

  contract:
    name: OpenAPI Contract Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # The `api` extra (FastAPI, SQLAlchemy, uvicorn) is enough to build the
      # app and call its .openapi() method in-process; no live server, no
      # database connection, and none of the `dev` extra's test/lint tooling
      # are needed just to dump the schema.
      - name: Install backend (api extra)
        run: uv sync --extra api

      - name: Dump OpenAPI schema from the app in-process
        run: |
          uv run python -c "import json; from cyo_adventure.app import app; print(json.dumps(app.openapi()))" > openapi.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # OPENAPI_INPUT overrides openapi-ts.config.ts's default localhost URL so
      # this regenerates from the schema dumped above instead of needing a
      # running backend (see openapi-ts.config.ts for the override).
      - name: Regenerate client against the dumped schema
        working-directory: ./frontend
        env:
          SCHEMA_PATH: ${{ github.workspace }}/openapi.json
        run: OPENAPI_INPUT="$SCHEMA_PATH" npm run generate-client

      - name: Fail on generated client drift
        run: |
          git diff --exit-code -- frontend/src/client || (echo "::error::Generated OpenAPI client is out of date. Run 'npm run generate-client' against a live backend (see frontend/README.md) and commit the result." && exit 1)

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci, frontend, design-system, contract]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check CI results
        env:
          CI_RESULT: ${{ needs.ci.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DESIGN_SYSTEM_RESULT: ${{ needs.design-system.result }}
          CONTRACT_RESULT: ${{ needs.contract.result }}
        run: |
          FAILED=false
          [ "$CI_RESULT" != "success" ] && FAILED=true
          [ "$FRONTEND_RESULT" != "success" ] && FAILED=true
          [ "$DESIGN_SYSTEM_RESULT" != "success" ] && FAILED=true
          [ "$CONTRACT_RESULT" != "success" ] && FAILED=true
          if [ "$FAILED" = "true" ]; then
            echo "CI Gate failed"
            exit 1
          fi
          echo "CI Gate passed"

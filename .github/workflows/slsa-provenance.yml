# SLSA Provenance Generation for CYO Adventure
# Generates SLSA Level 3 provenance attestations for published packages.
#
# This workflow builds the package, generates hashes, and calls the org-level
# SLSA provenance workflow to create cryptographic attestations.
#
# Reference: https://slsa.dev/
name: SLSA Provenance

on:
  # Trigger after successful release
  workflow_run:
    workflows: ["Semantic Release"]
    types: [completed]
    branches: [main, master]
  # Manual trigger for re-generating provenance
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate provenance for (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  actions: read
  attestations: write

jobs:
  # ==========================================================================
  # Build and Generate Hashes
  # ==========================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build package
        run: uv build

      - name: Generate SHA256 hashes
        id: hashes
        run: |
          cd dist
          HASHES=$(sha256sum * | base64 -w0)
          echo "hashes=$HASHES" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 90

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/*'

  # ==========================================================================
  # SLSA Level 3 Provenance (Org-Level Reusable Workflow)
  # ==========================================================================
  slsa:
    name: SLSA Level 3
    needs: [build]
    uses: ByronWilliamsCPA/.github/.github/workflows/python-slsa.yml@1502ecdde74ba30e2db1c91778f98b550bcf100e  # main
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
    permissions:
      id-token: write
      contents: write
      actions: read

# Codecov Coverage Upload for CYO Adventure
# Uploads test coverage reports to Codecov after CI workflow completion.
#
# This is a thin caller to the org-level reusable workflow.
# Security: Downloads artifacts only, no source checkout.
#
# Documentation: https://docs.codecov.com/
name: Codecov Upload

on:
  # Trigger after CI workflow completes. Intentionally NOT branch-filtered:
  # backend coverage.xml must upload for PR-branch CI runs too, or PRs receive
  # only 2 of the 3 coverage surfaces (frontend + design-system) and Codecov's
  # after_n_builds: 3 gate (see codecov.yml) deadlocks waiting for the backend
  # upload that never arrives. This is Codecov's documented secure pattern for
  # uploading coverage from PR CI runs (workflow_run runs in the base-repo
  # context and downloads artifacts only; no untrusted checkout).
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  codecov:
    name: Upload Coverage
    # Only run on successful CI completion
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ByronWilliamsCPA/.github/.github/workflows/python-codecov.yml@8e18d3105967adb431701ec6604d81f665c6f02f  # main
    with:
      artifact-name: 'coverage-reports'
      coverage-files: '*.xml'
      # Backend coverage.xml is the whole pytest suite in one report; per the
      # full-stack surface-flag rule (standards/testing.md 16.2) it uploads
      # under the `backend` surface flag, matching the codecov.yml flag/component.
      flags: 'backend'
      name: 'CYO Adventure Coverage'
      workflow-run-id: ${{ github.event.workflow_run.id }}
      commit-sha: ${{ github.event.workflow_run.head_sha }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  report-failure:
    name: Report CI Failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Report status
        run: |
          echo "## Coverage Upload Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ CI workflow failed - coverage upload skipped" >> $GITHUB_STEP_SUMMARY

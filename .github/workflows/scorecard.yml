---
# OpenSSF Scorecard for CYO Adventure
# Security posture assessment and supply chain security validation.
#
# Dashboard: https://securityscorecards.dev/viewer/?uri=github.com/ByronWilliamsCPA/cyo-adventure
# Documentation: https://github.com/ossf/scorecard
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Tuesdays at 21:21 UTC
    - cron: '21 21 * * 2'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# #CRITICAL: security: the OpenSSF publishing API verifies the signed workflow
# and REJECTS a run that declares ANY write permission at workflow (global)
# level, with "workflow has global write permissions". Write scopes must be
# declared only on the job below. Keep this read-all; never hoist the job's
# write scopes up here. See https://github.com/ossf/scorecard-action#workflow-restrictions
# #VERIFY: the "Run OpenSSF Scorecard" step completes and the dashboard entry
# updates; a regression surfaces as the publish step failing on that message.
permissions: read-all

# Standalone OpenSSF Scorecard workflow
jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # `publish_results` is the scorecard-action's own (still-valid)
          # parameter that enables publishing to the OpenSSF dashboard.
          # Distinct from the deprecated `publish-results` reusable-workflow
          # input (hyphen) removed from the org-workflow caller above.
          publish_results: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

---
# Security Analysis Workflow
# Runs security scans including Bandit and dependency checks.
#
# Features:
#   - Bandit static analysis for Python
#   - OSV-Scanner dependency vulnerability scanning
#   - Weekly scheduled scans
name: Security Analysis

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run security scans weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

# Standalone security workflow
jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Standalone scan runs Bandit + OSV-Scanner and uploads JSON artifacts;
    # no SARIF upload and no PR comments in this path, so write scopes for
    # security-events and pull-requests are not needed.
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Bandit security scan
        run: uv run bandit -r src/ -c pyproject.toml -f json -o bandit-report.json

      - name: Run OSV-Scanner dependency scan
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --output=osv-scanner-report.json
            --format=json
            --recursive
            ./

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-reports
          path: |
            bandit-report.json
            osv-scanner-report.json
          retention-days: 30

  security-gate-success:
    name: Security Gate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check security scan results
        run: |
          if [ "${{ needs.security.result }}" == "success" ]; then
            echo "Security Gate passed"
          else
            echo "Security Gate failed: ${{ needs.security.result }}"
            exit 1
          fi

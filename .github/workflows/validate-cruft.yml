name: Validate Cruft Status

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-cruft:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install cruft
        run: pip install cruft

      - name: Check for manual .cruft.json edits
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          if git diff HEAD^ HEAD --name-only | grep -q '\.cruft\.json'; then
            # .cruft.json was changed
            changed_files=$(git diff HEAD^ HEAD --name-only | wc -l)
            cruft_only=$(git diff HEAD^ HEAD --name-only | grep -c '\.cruft\.json' || true)

            if [ "$changed_files" -eq 1 ] && [ "$cruft_only" -eq 1 ]; then
              echo "❌ ERROR: Only .cruft.json was modified"
              echo ""
              echo "This suggests manual editing instead of running 'cruft update'."
              echo ""
              echo "To fix:"
              echo "  1. Revert the manual edit: git checkout HEAD^ -- .cruft.json"
              echo "  2. Run: cruft update"
              echo "  3. Review changes: git diff"
              echo "  4. Commit if successful: git add . && git commit -m 'chore: update from template'"
              exit 1
            fi
          fi

      - name: Verify cruft status
        run: |
          echo "Checking if project is in sync with template..."

          # Skip if template is a local filesystem path (not a Git URL).
          # CI runners cannot clone a developer's local path, so cruft check
          # would fail with a GitCommandError instead of a real drift result.
          TEMPLATE=$(python3 -c "import json; print(json.load(open('.cruft.json'))['template'])" 2>/dev/null || echo "")
          if [[ -n "$TEMPLATE" ]] && [[ "$TEMPLATE" != http://* ]] && [[ "$TEMPLATE" != https://* ]]; then
            echo "Warning: Template '$TEMPLATE' is a local path; skipping cruft check in CI."
            echo "Update .cruft.json 'template' to a GitHub URL to enable this check."
            exit 0
          fi

          if cruft check; then
            echo "✅ Project is up to date with template"
          else
            echo "⚠️  Project is out of sync with template"
            echo ""
            echo "To update:"
            echo "  cruft diff   # Preview changes"
            echo "  cruft update # Apply changes"
            echo ""
            # Don't fail on scheduled runs or manual triggers (just warn)
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Creating an issue to track this..."
              exit 0
            else
              echo "Failing CI to prevent merging out-of-date code"
              exit 1
            fi
          fi

      - name: Show template diff (if out of sync)
        if: failure()
        run: |
          echo "Template changes that need to be applied:"
          cruft diff || true

      - name: Check for orphaned conditional files
        run: |
          echo "Checking for orphaned conditional files..."
          echo ""
          echo "Note: Cruft update only syncs file contents - it does NOT re-run"
          echo "post-generation hooks that clean up conditional files."
          echo ""
          python scripts/check_orphaned_files.py
        continue-on-error: false

      - name: Orphaned files fix instructions
        if: failure()
        run: |
          echo ""
          echo "=========================================="
          echo "HOW TO FIX ORPHANED FILES"
          echo "=========================================="
          echo ""
          echo "Option 1 - Automated cleanup:"
          echo "  python scripts/cleanup_conditional_files.py"
          echo ""
          echo "Option 2 - Manual cleanup:"
          echo "  Delete the orphaned files/directories listed above"
          echo ""
          echo "After cleanup, commit the changes:"
          echo "  git add -A"
          echo "  git commit -m 'chore: remove orphaned conditional files'"
          echo ""

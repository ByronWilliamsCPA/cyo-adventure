# Deploys the Supabase migration chain to PRODUCTION. Manual dispatch only,
# gated by the `production` GitHub Environment's required-reviewer approval.
# RUN POLICY: only dispatch after the staging deploy of the same migration
# set is green (see docs/guides/supabase-environments.md).
name: Deploy Supabase Migrations (production)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-production:
    name: Push migrations to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push

# CYO Adventure - SonarCloud Analysis
# Thin caller for the organization's reusable SonarCloud workflow.
#
# The reusable workflow uses sonarqube-scan-action v7.2.0, which resolves
# the /analysis/analyses 404 bug encountered with v4.x on new projects.
#
# SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_cyo-adventure
#
# Note: This workflow requires SONAR_TOKEN secret to be configured.
# If not configured, the reusable workflow will skip gracefully.
name: SonarCloud

on:
  push:
    branches:
      - main
      - develop
  # No pull_request, no merge_group. A prior version of this workflow tried
  # `no-build: true` on pull_request to skip the coverage-generating pytest
  # run and get fast static-only Sonar feedback; that failed every PR run
  # with `error: Distribution cyo-adventure==... @ editable+. can't be
  # installed because it is marked as --no-build but has no binary
  # distribution` (uv exit code 2) -- `--no-build` means "only install
  # pre-built wheels," which this local editable-only package (no published
  # wheel) can never satisfy. There is no known lighter-weight input on the
  # reusable workflow (ByronWilliamsCPA/.github/python-sonarcloud.yml, not
  # read from this repo) that installs deps without running the full test
  # suite, so a fast, correct pull_request path isn't available without
  # reading that workflow's source first. `fail-on-quality-gate` below is
  # already forced off outside `push`, so a PR-time run was always advisory
  # with no way to act on the result; push-to-main keeps full, gate-enforced,
  # coverage-backed analysis on every merge.
  # #VERIFY: if per-PR Sonar feedback is wanted again, add the org's
  # `.github` repo to a session and check python-sonarcloud.yml for a
  # skip-tests-but-still-install input before trying `no-build` again.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    permissions:
      contents: read
      pull-requests: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml@c4ba2d18e4de831cbdbffcafd8e033473c0a0059  # main
    with:
      sonar-organization: 'byronwilliamscpa'
      sonar-project-key: 'ByronWilliamsCPA_cyo-adventure'
      # 3.14 matches the primary runtime/CI target since the #295 upgrade.
      # It was chosen here even before that flip: under CPython 3.12
      # coverage.py silently drops the async handler bodies in
      # api/profiles.py (tests pass, lines execute, zero hits recorded;
      # reproduced with both the sysmon and ctrace cores and with coverage
      # 7.6/7.14). 3.14 records them correctly, so it is the truthful
      # measurement interpreter.
      python-version: '3.14'
      source-directory: 'src'
      coverage-paths: 'coverage.xml'
      # Advisory except on push to a protected branch (see the `on:` comment
      # above for why pull_request/merge_group are excluded entirely rather
      # than run advisory-and-slow).
      fail-on-quality-gate: ${{ github.event_name == 'push' }}
      skip-if-no-token: true
      no-build: false  # generated project ships as an installable package; upstream default of true would block 'uv sync' from installing the editable project for coverage
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

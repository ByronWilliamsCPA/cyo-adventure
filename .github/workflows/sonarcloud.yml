# CYO Adventure - SonarCloud Analysis
# Thin caller for the organization's reusable SonarCloud workflow.
#
# The reusable workflow uses sonarqube-scan-action v7.2.0, which resolves
# the /analysis/analyses 404 bug encountered with v4.x on new projects.
#
# SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_cyo-adventure
#
# Note: This workflow requires SONAR_TOKEN secret to be configured.
# If not configured, the reusable workflow will skip gracefully.
name: SonarCloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  # No merge_group: the pull_request run below already covers the commit
  # content; merge_group would just repeat the same fast static-only analysis
  # with no new merged-state signal (Sonar can't enforce anything there
  # anyway, see fail-on-quality-gate below), consistent with tightening
  # merge_group to skip file-content-only checks elsewhere in this repo.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    permissions:
      contents: read
      pull-requests: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml@c4ba2d18e4de831cbdbffcafd8e033473c0a0059  # main
    with:
      sonar-organization: 'byronwilliamscpa'
      sonar-project-key: 'ByronWilliamsCPA_cyo-adventure'
      # 3.14, not the 3.12 local target: under CPython 3.12 coverage.py
      # silently drops the async handler bodies in api/profiles.py (tests
      # pass, lines execute, zero hits recorded; reproduced with both the
      # sysmon and ctrace cores and with coverage 7.6/7.14). 3.14 records
      # them correctly, so it is the truthful measurement interpreter.
      python-version: '3.14'
      source-directory: 'src'
      # Only the push run has a coverage.xml to read (see no-build below);
      # pass an empty path on pull_request so Sonar does static analysis
      # without a coverage report instead of pointing at a file that was
      # never generated.
      # #VERIFY: confirm the reusable workflow treats an empty
      # coverage-paths as "skip coverage import" rather than an error --
      # inferred from its own no-build default (true = skip build/test),
      # not confirmed by reading its source (a separate org repo not in
      # this session).
      coverage-paths: ${{ github.event_name == 'push' && 'coverage.xml' || '' }}
      # Enforce the quality gate only on push to a protected branch; it is
      # advisory (and, on pull_request, coverage-less) everywhere else.
      fail-on-quality-gate: ${{ github.event_name == 'push' }}
      skip-if-no-token: true
      # push: false (generated project ships as an installable package;
      # upstream default of true would block 'uv sync' from installing the
      # editable project for coverage). pull_request/workflow_dispatch: true
      # -- skip the build+full-pytest-run entirely (that run was measured at
      # ~11-12 min of a ~12.5 min job on PRs, vs. well under 90s for the
      # sonar-scanner analysis alone), so PR feedback stays static-analysis
      # fast instead of re-running the suite ci.yml's own buckets already ran.
      no-build: ${{ github.event_name != 'push' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# CYO Adventure - SonarCloud Analysis
# Thin caller for the organization's reusable SonarCloud workflow.
#
# The reusable workflow uses sonarqube-scan-action v7.2.0, which resolves
# the /analysis/analyses 404 bug encountered with v4.x on new projects.
#
# SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_cyo-adventure
#
# Note: This workflow requires SONAR_TOKEN secret to be configured.
# If not configured, the reusable workflow will skip gracefully.
name: SonarCloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    permissions:
      contents: read
      pull-requests: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml@ca897f91b8294d53e98668af81c8446ebd42f155  # main
    with:
      sonar-organization: 'byronwilliamscpa'
      sonar-project-key: 'ByronWilliamsCPA_cyo-adventure'
      # 3.14, not the 3.12 local target: under CPython 3.12 coverage.py
      # silently drops the async handler bodies in api/profiles.py (tests
      # pass, lines execute, zero hits recorded; reproduced with both the
      # sysmon and ctrace cores and with coverage 7.6/7.14). 3.14 records
      # them correctly, so it is the truthful measurement interpreter.
      python-version: '3.14'
      source-directory: 'src'
      coverage-paths: 'coverage.xml'
      # Enforce the quality gate only on push to a protected branch. On
      # pull_request it is advisory; on merge_group it must stay advisory too,
      # otherwise Sonar fails every queue build (the event is not 'pull_request')
      # and floods the merge queue with red, non-required check noise.
      fail-on-quality-gate: ${{ github.event_name == 'push' }}
      skip-if-no-token: true
      no-build: false  # generated project ships as an installable package; upstream default of true would block 'uv sync' from installing the editable project for coverage
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

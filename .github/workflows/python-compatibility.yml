# Python Compatibility Matrix Testing for CYO Adventure
# Tests the project across multiple Python versions and operating systems.
#
# Standalone implementation for Python compatibility testing.
name: Python Compatibility

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    # Weekly compatibility check on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: python-compat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        os: [ubuntu-latest]
        include:
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'

    permissions:
      contents: read
    steps:
      # harden-runner only enforces egress policy on Linux runners; it
      # silently no-ops on macOS/Windows. Gate it explicitly so the
      # limitation is visible in the workflow rather than implicit.
      - name: Harden the runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run tests
        # Force bash on all platforms; Windows runners default to PowerShell,
        # which cannot parse the backslash line-continuations below (ParserError).
        shell: bash
        run: |
          uv run pytest tests/ -v --tb=short -x \
            --ignore=tests/integration \
            --ignore=tests/load \
            -m "not slow and not integration"

  summary:
    name: Compatibility Summary
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::Some compatibility tests failed"
            exit 1
          fi
          echo "All compatibility tests passed!"

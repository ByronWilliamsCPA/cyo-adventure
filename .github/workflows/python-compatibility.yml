# Python Compatibility Matrix Testing for CYO Adventure
# Tests the project across multiple Python versions and operating systems.
#
# Standalone implementation for Python compatibility testing.
name: Python Compatibility

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  # No pull_request trigger: this matrix's 3.12 leg duplicates ci.yml's
  # required py3.12 test run 1:1 on every PR that touches src/tests/pyproject
  # (a 30-min-per-version job on top of ci.yml's own suite). Cross-version
  # compatibility (3.11/3.13) regresses far less often than PR-to-PR content
  # changes; the weekly schedule below plus this push-to-main trigger already
  # catch it within a day of any breakage, which is an acceptable tradeoff
  # for not adding ~30 min to every PR.
  schedule:
    # Weekly compatibility check on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: python-compat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest]
        include:
          - os: macos-latest
            python-version: '3.14'
          - os: windows-latest
            python-version: '3.14'

    permissions:
      contents: read
    steps:
      # harden-runner only enforces egress policy on Linux runners; it
      # silently no-ops on macOS/Windows. Gate it explicitly so the
      # limitation is visible in the workflow rather than implicit.
      - name: Harden the runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run tests
        # Force bash on all platforms; Windows runners default to PowerShell,
        # which cannot parse the backslash line-continuations below (ParserError).
        shell: bash
        run: |
          uv run pytest tests/ -v --tb=short -x \
            --ignore=tests/integration \
            --ignore=tests/load \
            -m "not slow and not integration"

  summary:
    name: Compatibility Summary
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::Some compatibility tests failed"
            exit 1
          fi
          echo "All compatibility tests passed!"

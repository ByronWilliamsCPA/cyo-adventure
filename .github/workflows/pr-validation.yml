# PR Validation for CYO Adventure
# Comprehensive pull request validation using org-level workflow plus additional checks.
#
# This workflow calls the org-level PR validation workflow and adds supplementary
# checks for dead code detection, changelog enforcement, and documentation links.
name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - develop
  merge_group:

# Cancel in-progress runs for the same PR. The `|| github.ref` fallback is
# essential for merge_group events: there is no pull_request context in the
# queue, so without it every merge-group build collapses into the same
# concurrency group and cancels the previous entry's required
# "Dependency & Standards Validation" check, blocking the queue. On a
# merge_group, github.ref is the unique gh-readonly-queue ref per entry.
concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ==========================================================================
  # NOTE: The org-level `python-pr-validation.yml` reusable workflow is
  # DEPRECATED (its upstream now emits a "This workflow is removed" stub).
  # Its responsibilities are already covered locally:
  #   - conventional-commit / PR-title validation -> pr-title.yml
  #   - tests / lint / type-check / coverage       -> ci.yml
  # The deprecated `core-validation` caller was removed to keep the required
  # "Dependency & Standards Validation" gate green. PR-description length and
  # automatic size-labels (previously provided by the org workflow) are no
  # longer enforced; add the standalone size-label action if those are wanted.
  # ==========================================================================

  # ==========================================================================
  # Additional Checks (Template-Specific)
  # ==========================================================================

  # Dead Code Detection with Vulture
  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Advisory-only (see validate-dependencies below, which never fails on
    # this result) and file-content-only, not merged-state-sensitive; skip on
    # merge_group, same rationale as changelog's existing pull_request-only if.
    if: github.event_name != 'merge_group'
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ".uv-cache"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run vulture
        run: |
          echo "## Dead Code Report" >> $GITHUB_STEP_SUMMARY
          uv run vulture src/ --min-confidence 90 | tee vulture-report.txt || true
          if [ -s vulture-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat vulture-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::Potential dead code detected. Review vulture report."
          else
            echo "✅ No dead code detected with 90% confidence." >> $GITHUB_STEP_SUMMARY
          fi

  # Changelog Enforcement (neutralized)
  #
  # CHANGELOG.md is now GENERATED at release time by python-semantic-release
  # from Conventional Commits (see .github/workflows/release.yml); PRs no
  # longer edit it. The old "every PR must touch CHANGELOG.md" gate is
  # therefore obsolete, and was itself the source of the merge-queue changelog
  # conflicts this change eliminates: it forced every PR to edit one shared
  # file, so the speculative squash of any two queued PRs collided there.
  #
  # The job is kept as a passing no-op (rather than deleted) so the required
  # "Dependency & Standards Validation" summary that `needs:` it keeps its
  # topology, and any branch-protection required-check named "Changelog Check"
  # still reports. Conventional Commit subjects drive the changelog now, and
  # pr-title.yml already enforces those.
  changelog:
    name: Changelog Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Changelog is generated at release (no per-PR entry required)
        run: |
          echo "::notice::CHANGELOG.md is generated at release time from" \
            "Conventional Commits; no per-PR changelog entry is required."
          {
            echo "## Changelog Check"
            echo ""
            echo "ℹ️ CHANGELOG.md is generated at release by" \
              "python-semantic-release. Conventional Commit subjects drive it," \
              "so no per-PR changelog entry is required."
          } >> "$GITHUB_STEP_SUMMARY"


  # Documentation Link Check
  link-check:
    name: Documentation Links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Advisory-only and not merged-state-sensitive; see dead-code above.
    if: github.event_name != 'merge_group'
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check documentation links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,403,429
            --exclude '^https://github.com/.*/(issues|pulls|compare)/.*$'
            --exclude '^https://linear.app/.*$'
            './docs/**/*.md'
            './README.md'
            './CONTRIBUTING.md'
          fail: false
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ==========================================================================
  # Validation Summary
  # ==========================================================================
  validate-dependencies:
    name: Dependency & Standards Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dead-code, changelog, link-check]
    if: always()
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check validation results
        run: |
          echo "## Dependency & Standards Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.dead-code.result }}" == "success" ]; then
            echo "✅ Dead Code Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Dead Code Check: ${{ needs.dead-code.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          # Changelog is generated at release, not per PR; the changelog job is
          # a passing no-op kept only for required-check topology. success and
          # skipped (merge_group) both mean "not applicable" here.
          if [ "${{ needs.changelog.result }}" == "success" ] \
            || [ "${{ needs.changelog.result }}" == "skipped" ]; then
            echo "ℹ️ Changelog: Generated at release (no per-PR entry)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Changelog: ${{ needs.changelog.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.link-check.result }}" == "success" ]; then
            echo "✅ Link Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Link Check: ${{ needs.link-check.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          # Fail only if the changelog gate genuinely failed (it is the one hard
          # gate here; dead-code and link-check are advisory). A skipped changelog
          # (label-based) is not a failure.
          if [ "${{ needs.changelog.result }}" == "failure" ]; then
            echo ""
            echo "❌ Changelog check failed. Please review and fix issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo ""
          echo "✅ All validation checks passed!" >> $GITHUB_STEP_SUMMARY

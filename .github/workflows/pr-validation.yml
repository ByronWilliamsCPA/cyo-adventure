# PR Validation for CYO Adventure
# Comprehensive pull request validation using org-level workflow plus additional checks.
#
# This workflow calls the org-level PR validation workflow and adds supplementary
# checks for dead code detection, changelog enforcement, and documentation links.
name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - develop
  merge_group:

# Cancel in-progress runs for the same PR. The `|| github.ref` fallback is
# essential for merge_group events: there is no pull_request context in the
# queue, so without it every merge-group build collapses into the same
# concurrency group and cancels the previous entry's required
# "Dependency & Standards Validation" check, blocking the queue. On a
# merge_group, github.ref is the unique gh-readonly-queue ref per entry.
concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ==========================================================================
  # NOTE: The org-level `python-pr-validation.yml` reusable workflow is
  # DEPRECATED (its upstream now emits a "This workflow is removed" stub).
  # Its responsibilities are already covered locally:
  #   - conventional-commit / PR-title validation -> pr-title.yml
  #   - tests / lint / type-check / coverage       -> ci.yml
  # The deprecated `core-validation` caller was removed to keep the required
  # "Dependency & Standards Validation" gate green. PR-description length and
  # automatic size-labels (previously provided by the org workflow) are no
  # longer enforced; add the standalone size-label action if those are wanted.
  # ==========================================================================

  # ==========================================================================
  # Additional Checks (Template-Specific)
  # ==========================================================================

  # Dead Code Detection with Vulture
  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ".uv-cache"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run vulture
        run: |
          echo "## Dead Code Report" >> $GITHUB_STEP_SUMMARY
          uv run vulture src/ --min-confidence 90 | tee vulture-report.txt || true
          if [ -s vulture-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat vulture-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::Potential dead code detected. Review vulture report."
          else
            echo "✅ No dead code detected with 90% confidence." >> $GITHUB_STEP_SUMMARY
          fi

  # Changelog Enforcement
  changelog:
    name: Changelog Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only meaningful on pull_request events: the changelog gate compares the
    # PR head against its base. On merge_group events there is no PR context
    # (github.base_ref and pull_request.labels are empty), so the job is skipped
    # there and the validate-dependencies summary treats a skip as a pass. This
    # keeps the required "Dependency & Standards Validation" check green inside
    # the merge queue. Label payload skips avoid GitHub API label-timing races
    # on the opened event (e.g. Renovate PRs).
    if: |
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog') &&
      !contains(github.event.pull_request.labels.*.name, 'dependencies') &&
      !contains(github.event.pull_request.labels.*.name, 'documentation') &&
      !contains(github.event.pull_request.labels.*.name, 'automated')
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check for CHANGELOG update
        env:
          BASE_REF: ${{ github.base_ref }}

        run: |
          git fetch origin "$BASE_REF" --no-tags
          MERGE_BASE=$(git merge-base HEAD "origin/$BASE_REF")
          if git diff --name-only "$MERGE_BASE" HEAD | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md was updated - check passed."
          else
            echo "::error::CHANGELOG.md was not updated. Please add a changelog entry, or add the 'skip-changelog' label if no entry is needed."
            exit 1
          fi


  # Documentation Link Check
  link-check:
    name: Documentation Links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check documentation links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,403,429
            --exclude '^https://github.com/.*/(issues|pulls|compare)/.*$'
            --exclude '^https://linear.app/.*$'
            './docs/**/*.md'
            './README.md'
            './CONTRIBUTING.md'
          fail: false
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ==========================================================================
  # Validation Summary
  # ==========================================================================
  validate-dependencies:
    name: Dependency & Standards Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dead-code, changelog, link-check]
    if: always()
    steps:
      - name: Harden the runner
        # deferral: 2026-09-18
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check validation results
        run: |
          echo "## Dependency & Standards Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.dead-code.result }}" == "success" ]; then
            echo "✅ Dead Code Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Dead Code Check: ${{ needs.dead-code.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.changelog.result }}" == "success" ]; then
            echo "✅ Changelog: Updated" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.changelog.result }}" == "skipped" ]; then
            echo "⏭️ Changelog: Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Changelog: ${{ needs.changelog.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.link-check.result }}" == "success" ]; then
            echo "✅ Link Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Link Check: ${{ needs.link-check.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          # Fail only if the changelog gate genuinely failed (it is the one hard
          # gate here; dead-code and link-check are advisory). A skipped changelog
          # (label-based) is not a failure.
          if [ "${{ needs.changelog.result }}" == "failure" ]; then
            echo ""
            echo "❌ Changelog check failed. Please review and fix issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo ""
          echo "✅ All validation checks passed!" >> $GITHUB_STEP_SUMMARY

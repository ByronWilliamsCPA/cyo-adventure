end Player .Python..cond_validator" data-source-line="33" id="ent0004"><rect fill="#BBDEFB" height="95.1875" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="298.0635" x="21.97" y="365.88"/><rect fill="#BBDEFB" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="300.0335" y="370.88"/><rect fill="#BBDEFB" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="298.0335" y="372.88"/><rect fill="#BBDEFB" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="298.0335" y="376.88"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="166.3867" x="36.97" y="398.8751">Condition DSL Validator</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="160.583" x="36.97" y="415.172">storybook/condition.py</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="138.8652" x="36.97" y="431.4689">validate_condition()</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="258.0635" x="36.97" y="447.7657">whitelisted-op check at schema time</text></g><!--entity evaluator--><g class="entity" data-qualified-name="Backend Player .Python..evaluator" data-source-line="35" id="ent0005"><rect fill="#BBDEFB" height="127.7813" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="300.1826" x="70.91" y="561.21"/><rect fill="#BBDEFB" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="351.0926" y="566.21"/><rect fill="#BBDEFB" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="349.0926" y="568.21"/><rect fill="#BBDEFB" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="349.0926" y="572.21"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="138.1201" x="85.91" y="594.2051">Condition Evaluator</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="162.4834" x="85.91" y="610.502">storybook/evaluator.py</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="210.5605" x="85.91" y="626.7989">evaluate(condition, var_state)</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="252.5605" x="85.91" y="643.0957">whitelisted 10-op JSONLogic subset:</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="260.1826" x="85.91" y="659.3926">var, !, and, or, ==, !=, &lt;, &lt;=, &gt;, &gt;=</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="187.0176" x="85.91" y="675.6895">strict equality, no coercion</text></g><!--entity engine--><g class="entity" data-qualified-name="Backend Player .Python..engine" data-source-line="37" id="ent0006"><rect fill="#1565C0" height="111.4844" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="251.5449" x="355.23" y="357.73"/><rect fill="#1565C0" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="586.7749" y="362.73"/><rect fill="#1565C0" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="584.7749" y="364.73"/><rect fill="#1565C0" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="584.7749" y="368.73"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="89.4141" x="370.23" y="390.7251">Story Engine</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="118.0977" x="370.23" y="407.022">player/engine.py</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="211.5449" x="370.23" y="423.3189">StoryEngine: start(), choose(),</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="201.332" x="370.23" y="439.6157">visible_choices(), is_ending()</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="154.123" x="370.23" y="455.9126">Pure: no I/O, no async</text></g><!--entity reading_state--><g class="entity" data-qualified-name="Backend Player .Python..reading_state" data-source-line="39" id="ent0007"><rect fill="#BBDEFB" height="111.4844" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="218.835" x="440.58" y="569.36"/><rect fill="#BBDEFB" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="639.415" y="574.36"/><rect fill="#BBDEFB" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="637.415" y="576.36"/><rect fill="#BBDEFB" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="637.415" y="580.36"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="94.5137" x="455.58" y="602.3551">ReadingState</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="105.8135" x="455.58" y="618.652">player/state.py</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="171.4316" x="455.58" y="634.9489">current_node, var_state,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="162.5996" x="455.58" y="651.2457">path, visit_set, version,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="178.835" x="455.58" y="667.5426">state_revision, save_slots</text></g><!--entity ts_evaluator--><g class="entity" data-qualified-name="Frontend Player .TypeScript..ts_evaluator" data-source-line="45" id="ent0009"><rect fill="#FFE0B2" height="95.1875" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="273.1602" x="1045.42" y="112.77"/><rect fill="#FFE0B2" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="1298.5802" y="117.77"/><rect fill="#FFE0B2" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1296.5802" y="119.77"/><rect fill="#FFE0B2" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1296.5802" y="123.77"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="160.0088" x="1060.42" y="145.7651">TS Condition Evaluator</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="222.7559" x="1060.42" y="162.062">frontend/src/player/evaluator.ts</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="233.1602" x="1060.42" y="178.3589">Mirrors Python evaluator exactly;</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="201.8174" x="1060.42" y="194.6557">conformance fixtures shared</text></g><!--entity ts_engine--><g class="entity" data-qualified-name="Frontend Player .TypeScript..ts_engine" data-source-line="47" id="ent0010"><rect fill="#FFE0B2" height="95.1875" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="246.9307" x="1058.53" y="365.88"/><rect fill="#FFE0B2" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="1285.4607" y="370.88"/><rect fill="#FFE0B2" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1283.4607" y="372.88"/><rect fill="#FFE0B2" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1283.4607" y="376.88"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="111.3027" x="1073.53" y="398.8751">TS Story Engine</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="203.875" x="1073.53" y="415.172">frontend/src/player/engine.ts</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="158.9902" x="1073.53" y="431.4689">Mirrors Python engine:</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="206.9307" x="1073.53" y="447.7657">same transition order (RS v1)</text></g><!--entity xstate--><g class="entity" data-qualified-name="Frontend Player .TypeScript..xstate" data-source-line="49" id="ent0011"><rect fill="#FFE0B2" height="95.1875" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="256.2891" x="1053.86" y="577.51"/><rect fill="#FFE0B2" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="1290.1491" y="582.51"/><rect fill="#FFE0B2" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1288.1491" y="584.51"/><rect fill="#FFE0B2" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1288.1491" y="588.51"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="109.7031" x="1068.86" y="610.5051">XState Machine</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="216.2891" x="1068.86" y="626.802">frontend/src/player/machine.ts</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="190.75" x="1068.86" y="643.0989">Wraps TS engine in explicit</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="198.0234" x="1068.86" y="659.3957">state machine for testability</text></g><!--entity reader_ui--><g class="entity" data-qualified-name="Frontend Player .TypeScript..reader_ui" data-source-line="51" id="ent0012"><rect fill="#FFF3E0" height="95.1875" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="242.207" x="1060.9" y="782.99"/><rect fill="#FFF3E0" height="10" style="stroke:#555555;stroke-width:0.5;" width="15" x="1283.107" y="787.99"/><rect fill="#FFF3E0" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1281.107" y="789.99"/><rect fill="#FFF3E0" height="2" style="stroke:#555555;stroke-width:0.5;" width="4" x="1281.107" y="793.99"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="69.002" x="1075.9" y="815.9851">Reader UI</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="141.0869" x="1075.9" y="832.282">frontend/src/reader/</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="202.207" x="1075.9" y="848.5789">Renders node body, choices,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="133.0137" x="1075.9" y="864.8757">triggers transitions</text></g><g class="entity" data-qualified-name="semantics_doc.semantics_note" data-source-line="57" id="ent0014"><path d="M1376.02,61 L1376.02,259.7266 A4,4 0 0 0 1380.02,263.7266 L1659.977,263.7266 A4,4 0 0 0 1663.977,259.7266 L1663.977,67 L1653.977,57 L1380.02,57 A4,4 0 0 0 1376.02,61" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1653.977,57 L1653.977,65 A2,2 0 0 0 1655.977,67 L1663.977,67 L1653.977,57" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="215.5981" x="1382.02" y="74.0669">Transition order on every choice:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="266.957" x="1382.02" y="89.1997">1. Evaluate choice condition vs var_state</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="147.7671" x="1382.02" y="104.3325">2. Apply choice effects</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="235.6694" x="1382.02" y="119.4653">3. Set current_node to choice target</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="206.9272" x="1382.02" y="134.5981">4. Apply target on_enter effects</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="196.0601" x="1394.417" y="149.731">(once: true -&gt; first entry only)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1382.02" y="164.8638">&#160;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="179.7656" x="1382.02" y="179.9966">Bounds clamping (int vars):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="235.5044" x="1382.02" y="195.1294">- set/inc/dec all clamp to [min, max]</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1382.02" y="210.2622">&#160;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="177.0107" x="1382.02" y="225.395">Hidden choices (section 4):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="241.3252" x="1382.02" y="240.5278">- condition false -&gt; choice not shown</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="231.0293" x="1382.02" y="255.6606">- condition true or absent -&gt; visible</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="87" id="ent0026"><path d="M728.69,578.7 L728.69,671.4969 A4,4 0 0 0 732.69,675.4969 L1009.3145,675.4969 A4,4 0 0 0 1013.3145,671.4969 L1013.3145,584.7 L1003.3145,574.7 L732.69,574.7 A4,4 0 0 0 728.69,578.7" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1003.3145,574.7 L1003.3145,582.7 A2,2 0 0 0 1005.3145,584.7 L1013.3145,584.7 L1003.3145,574.7" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="187.7002" x="734.69" y="591.7669">ADR-006: in-house evaluator</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="176.1982" x="734.69" y="606.8997">No third-party logic library.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="175.7222" x="734.69" y="622.0325">Whitelisted operators only.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="212.4434" x="734.69" y="637.1653">Strict equality, no type coercion.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="263.6245" x="734.69" y="652.2981">Python + TypeScript share conformance</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="170.4346" x="734.69" y="667.431">fixtures (cross-impl tests).</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="96" id="ent0029"><path d="M418.38,791.75 L418.38,869.4141 A4,4 0 0 0 422.38,873.4141 L677.6193,873.4141 A4,4 0 0 0 681.6193,869.4141 L681.6193,797.75 L671.6193,787.75 L554,787.75 L550,681.17 L546,787.75 L422.38,787.75 A4,4 0 0 0 418.38,791.75" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M671.6193,787.75 L671.6193,795.75 A2,2 0 0 0 673.6193,797.75 L681.6193,797.75 L671.6193,787.75" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="190.9692" x="424.38" y="804.8169">save_slots: named snapshots</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="200.313" x="424.38" y="819.9497">(a clone of state at save time).</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="220.0542" x="424.38" y="835.0825">visit_set drives once: true effects.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="242.2393" x="424.38" y="850.2153">state_revision: server-owned counter</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="174.5859" x="424.38" y="865.3481">for optimistic concurrency.</text></g><!--link storybook_model to engine--><g class="link" data-entity-1="ent0003" d
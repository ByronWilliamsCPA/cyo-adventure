<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="751px" preserveAspectRatio="none" style="width:1860px;height:751px;background:#FAFAFA;" version="1.1" viewBox="0 0 1860 751" width="1860px" zoomAndPan="magnify"><defs/><g><rect fill="#FAFAFA" height="751" style="stroke:none;stroke-width:1;" width="1860" x="0" y="0"/><!--cluster system--><g class="cluster" data-qualified-name="system" data-source-line="38" id="ent0005"><rect fill="#FFF3E0" height="313.08" rx="4" ry="4" style="stroke:#555555;stroke-width:1;" width="326" x="821.9" y="192.39"/><text fill="#222222" font-family="'Roboto'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="182.8818" x="893.4591" y="207.3851">CYO Adventure System</text><text fill="#222222" font-family="'Roboto'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="310.4336" x="829.6832" y="223.682">[Homelab, Docker, Pangolin zero-trust]</text></g><!--entity pwa--><g class="entity" data-qualified-name="system.pwa" data-source-line="39" id="ent0006"><rect fill="#E3F2FD" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="211.3379" x="904.23" y="243.39"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="86.4883" x="914.23" y="266.3851">PWA Reader</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="157.1377" x="914.23" y="282.682">[React 19, TypeScript]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="191.3379" x="914.23" y="298.9789">Play stories, offline support</text></g><!--entity backend--><g class="entity" data-qualified-name="system.backend" data-source-line="40" id="ent0007"><rect fill="#E8F5E9" height="85.1875" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="260.7412" x="869.53" y="404.28"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="116.375" x="879.53" y="427.2751">FastAPI Backend</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="95.0742" x="879.53" y="443.572">[Python 3.12]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="240.7412" x="879.53" y="459.8689">Library, generation, reading state,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="113.3809" x="879.53" y="476.1657">guardian review</text></g><!--entity child--><g class="entity" data-qualified-name="child" data-source-line="33" id="ent0002"><ellipse cx="867.9002" cy="22.15" fill="#E3F2FD" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M867.9002,30.15 L867.9002,57.15 M854.9002,38.15 L880.9002,38.15 M867.9002,57.15 L854.9002,72.15 M867.9002,57.15 L880.9002,72.15" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="89.9404" x="822.93" y="86.6451">Child Reader</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="84.957" x="822.93" y="102.942">(age 3-16+)</text></g><!--entity guardian--><g class="entity" data-qualified-name="guardian" data-source-line="34" id="ent0003"><ellipse cx="1009.8981" cy="22.15" fill="#E8F5E9" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M1009.8981,30.15 L1009.8981,57.15 M996.8981,38.15 L1022.8981,38.15 M1009.8981,57.15 L996.8981,72.15 M1009.8981,57.15 L1022.8981,72.15" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="125.0361" x="947.38" y="86.6451">Guardian / Author</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="116.7441" x="947.38" y="102.942">(parent or carer)</text></g><!--entity admin--><g class="entity" data-qualified-name="admin" data-source-line="35" id="ent0004"><ellipse cx="1243.8951" cy="14" fill="#EDE7F6" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M1243.8951,22 L1243.8951,49 M1230.8951,30 L1256.8951,30 M1243.8951,49 L1230.8951,64 M1243.8951,49 L1256.8951,64" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="44.8643" x="1161.44" y="78.4951">Admin</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="164.9102" x="1161.44" y="94.792">(global safety operator,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="161.0889" x="1161.44" y="111.0889">cross-family, ADR-005)</text></g><!--entity openrouter--><g class="entity" data-qualified-name="openrouter" data-source-line="44" id="ent0008"><rect fill="#F3E5F5" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="193.7969" x="7" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="84.417" x="17" y="652.6851">OpenRouter</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="160.4873" x="17" y="668.982">[Primary LLM provider]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="173.7969" x="17" y="685.2789">Multi-model API gateway</text></g><!--entity ollama--><g class="entity" data-qualified-name="ollama" data-source-line="45" id="ent0009"><rect fill="#FFEBEE" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="169.0371" x="515.38" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="49.5947" x="525.38" y="652.6851">Ollama</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="138.5918" x="525.38" y="668.982">[Local fallback LLM]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="149.0371" x="525.38" y="685.2789">Self-hosted, homelab</text></g><!--entity supabase_auth--><g class="entity" data-qualified-name="supabase_auth" data-source-line="46" id="ent0010"><rect fill="#E0F7FA" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="278.8701" x="719.46" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="119.6768" x="729.46" y="652.6851">Supabase (OIDC)</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="246.627" x="729.46" y="668.982">[Managed auth platform, ADR-009]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="258.8701" x="729.46" y="685.2789">Guardian sign-in only (Apple/Google)</text></g><!--entity postgres--><g class="entity" data-qualified-name="postgres" data-source-line="47" id="ent0011"><rect fill="#FFF8E1" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="214.9336" x="1033.43" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="80.7529" x="1043.43" y="652.6851">PostgreSQL</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="162.4219" x="1043.43" y="668.982">[Operational database]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="194.9336" x="1043.43" y="685.2789">Metadata and reading state</text></g><!--entity redis--><g class="entity" data-qualified-name="redis" data-source-line="48" id="ent0012"><rect fill="#E0E0E0" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="175.4014" x="1283.2" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="79.7891" x="1293.2" y="652.6851">Redis + RQ</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="80.8145" x="1293.2" y="668.982">[Job queue]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="155.4014" x="1293.2" y="685.2789">Async generation jobs</text></g><g class="entity" data-qualified-name="GMN22" data-source-line="62" id="ent0023"><path d="M1165.48,415.61 L1165.48,478.1412 A4,4 0 0 0 1169.48,482.1412 L1472.3076,482.1412 A4,4 0 0 0 1476.3076,478.1412 L1476.3076,421.61 L1466.3076,411.61 L1169.48,411.61 A4,4 0 0 0 1165.48,415.61" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1466.3076,411.61 L1466.3076,419.61 A2,2 0 0 0 1468.3076,421.61 L1476.3076,421.61 L1466.3076,411.61" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="149.4873" x="1171.48" y="428.6769">Generated API client in</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="216.125" x="1171.48" y="443.8097">frontend/src/client/ (build output,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="267.0459" x="1171.48" y="458.9425">not hand-written) from OpenAPI schema.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="289.8276" x="1171.48" y="474.0753">Service worker + IndexedDB for offline play.</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="69" id="ent0026"><path d="M235.44,610.17 L235.44,660.14 L201.13,664.14 L235.44,668.14 L235.44,718.0997 A4,4 0 0 0 239.44,722.0997 L476.3472,722.0997 A4,4 0 0 0 480.3472,718.0997 L480.3472,616.17 L470.3472,606.17 L239.44,606.17 A4,4 0 0 0 235.44,610.17" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M470.3472,606.17 L470.3472,614.17 A2,2 0 0 0 472.3472,616.17 L480.3472,616.17 L470.3472,606.17" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="223.9072" x="241.44" y="623.2369">Provider fallback cascade (3 legs):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="202.9727" x="241.44" y="638.3697">OpenRouter haiku (primary) -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="211.4722" x="241.44" y="653.5025">OpenRouter sonnet (fallback) -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="145.4121" x="241.44" y="668.6353">Ollama (local fallback)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="169.9331" x="241.44" y="683.7681">Layer 1: per-adapter retry</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="222.1426" x="241.44" y="698.901">Layer 2: FallbackProvider cascade</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="211.9736" x="241.44" y="714.0338">Layer 3: orchestrator repair loop</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="79" id="ent0029"><path d="M1493.99,587.47 L1493.99,740.7981 A4,4 0 0 0 1497.99,744.7981 L1849.8152,744.7981 A4,4 0 0 0 1853.8152,740.7981 L1853.8152,593.47 L1843.8152,583.47 L1497.99,583.47 A4,4 0 0 0 1493.99,587.47" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1843.8152,583.47 L1843.8152,591.47 A2,2 0 0 0 1845.8152,593.47 L1853.8152,593.47 L1843.8152,583.47" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="326.1108" x="1499.99" y="600.5369">Mandatory human approval (ADR-005, amended):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="254.3633" x="1499.99" y="615.6697">no story reaches a child profile without</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="316.729" x="1499.99" y="630.8025">a recorded admin approval (global, cross-family;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="338.8252" x="1499.99" y="645.9353">guardians author and submit, they do not approve).</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="156.7363" x="1499.99" y="661.0681">Two separate lifecycles:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="252.605" x="1499.99" y="676.201">- GenerationJob: queued -&gt; running -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="196.3584" x="1508.2546" y="691.3338">passed | needs_review | failed</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="219.7939" x="1499.99" y="706.4666">- Storybook: draft -&gt; in_review -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="241.7568" x="1508.2546" y="721.5994">needs_revision | published | archived</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="290.9829" x="1499.99" y="736.7322">("approved" is an action, not a resting state)</text></g><!--link child to pwa--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="51" id="lnk13"><path d="M876.44,106.53 C881.98,128.75 890.69,155.19 903.9,176.39 C919.79,201.89 939.0947,221.4403 960.1747,239.2303" fill="none" id="child-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="964.76,243.1,960.4618,234.2385,960.9389,239.8752,955.3022,240.3523,964.76,243.1" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="91.8379" x="905.63" y="157.4569">Reads stories,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="93.2979" x="904.9" y="172.5897">chooses paths</text></g><!--link guardian to pwa--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="dependency" data-source-line="52" id="lnk14"><path d="M1007.97,106.41 C1007.52,118.74 1007.12,132.07 1006.9,144.39 C1006.3,177.97 1007.1315,210.3344 1008.1515,237.0944" fill="none" id="guardian-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1008.38,243.09,1012.0343,233.9442,1008.1896,238.0936,1004.0401,234.2489,1008.38,243.09" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="117.4126" x="1045.4654" y="157.4569">Authors concepts,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="192.5435" x="1007.9" y="172.5897">submits for review (ADR-005)</text></g><!--link admin to pwa--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="53" id="lnk15"><path d="M1234.81,114.72 C1229.07,135.82 1219.8,159.07 1204.9,176.39 C1179.88,205.48 1149.7954,224.7106 1115.9054,240.3906" fill="none" id="admin-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1110.46,242.91,1120.3077,242.7611,1114.9978,240.8105,1116.9485,235.5006,1110.46,242.91" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="195.0444" x="1242.4422" y="157.4569">Reviews and approves/rejects</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="230.1089" x="1224.91" y="172.5897">storybooks, cross-family (ADR-005)</text></g><!--link pwa to backend--
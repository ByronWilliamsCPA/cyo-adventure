"470.2949">rollback fallback (R1 Task 1.7); carries</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="231.626" x="1656.9419" y="485.5293">no live traffic since 2026-07-05. Tracked</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="199.9004" x="1656.9419" y="500.7637">for removal in homelab-infra #577.</text></g><g class="entity" data-qualified-name="GMN38" data-source-line="95" id="ent0039"><path d="M1650.4419,707.5 L1650.4419,800.9063 A4,4 0 0 0 1654.4419,804.9063 L1912.5884,804.9063 A4,4 0 0 0 1916.5884,800.9063 L1916.5884,713.5 L1906.5884,703.5 L1654.4419,703.5 A4,4 0 0 0 1650.4419,707.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1906.5884,703.5 L1906.5884,711.5 A2,2 0 0 0 1908.5884,713.5 L1916.5884,713.5 L1906.5884,703.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="228.4648" x="1656.4419" y="720.5605">The worker runs in a separate container</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="245.1465" x="1656.4419" y="735.7949">so long-running generation (30-120s) does</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="164.9946" x="1656.4419" y="751.0293">not block the API event loop.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="220.835" x="1656.4419" y="766.2637">Worker and API share the same image</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="223.9961" x="1656.4419" y="781.498">or a shared base; Dockge manages the</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="92.0156" x="1656.4419" y="796.7324">compose stack.</text></g><g class="entity" data-qualified-name="GMN41" data-source-line="104" id="ent0042"><path d="M1650.9419,1018 L1650.9419,1080.9375 A4,4 0 0 0 1654.9419,1084.9375 L1881.6865,1084.9375 A4,4 0 0 0 1885.6865,1080.9375 L1885.6865,1024 L1875.6865,1014 L1654.9419,1014 A4,4 0 0 0 1650.9419,1018" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1875.6865,1014 L1875.6865,1022 A2,2 0 0 0 1877.6865,1024 L1885.6865,1024 L1875.6865,1014" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="213.7446" x="1656.9419" y="1031.0605">Phase 1: blob stored inline as JSONB</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="155.4224" x="1656.9419" y="1046.2949">on storybook_version.blob.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="186.6274" x="1656.9419" y="1061.5293">Phase 5: MinIO container added;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="212.7163" x="1656.9419" y="1076.7637">blob_ref column set to S3 object key.</text></g><g class="entity" data-qualified-name="GMN44" data-source-line="111" id="ent0045"><path d="M403.4419,427 L403.4419,520.4063 A4,4 0 0 0 407.4419,524.4063 L639.2837,524.4063 A4,4 0 0 0 643.2837,520.4063 L643.2837,433 L633.2837,423 L527.4419,423 L523.4419,158.26 L519.4419,423 L407.4419,423 A4,4 0 0 0 403.4419,427" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M633.2837,423 L633.2837,431 A2,2 0 0 0 635.2837,433 L643.2837,433 L633.2837,423" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="218.8418" x="409.4419" y="440.0605">PWA assets cached by service worker</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="173.6846" x="409.4419" y="455.2949">(Workbox via vite-plugin-pwa).</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="200.3892" x="409.4419" y="470.5293">IndexedDB stores reading state for</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="179.2261" x="409.4419" y="485.7637">offline play. Offline write queue</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="199.2275" x="409.4419" y="500.998">replays on reconnect with event_id</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="78.2095" x="409.4419" y="516.2324">idempotency.</text></g><!--link pwa_client to tls--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="dependency" data-source-line="74" id="lnk23"><path d="M590.7119,114.54 C737.1919,123.39 1079.4219,150.54 1173.4419,215 C1254.9419,270.88 1296.5886,380.9688 1313.3586,436.1988" fill="none" id="pwa_client-to-tls" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1315.1019,441.94,1316.3145,432.1661,1313.6492,437.1557,1308.6596,434.4904,1315.1019,441.94" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="74.8262" x="1157.4419" y="203.0605">HTTPS (443)</text></g><!--link tls to fastapi_app--><g class="link" data-entity-1="ent0009" data-entity-2="ent0011" data-link-type="dependency" data-source-line="75" id="lnk24"><path d="M1308.0619,505.1 C1283.6619,553.64 1238.6068,643.2693 1209.8168,700.5393" fill="none" id="tls-to-fastapi_app" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1207.1219,705.9,1214.7381,699.6555,1209.3676,701.4327,1207.5904,696.0623,1207.1219,705.9" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="74.4136" x="1274.4419" y="589.5605">HTTP (8000)</text></g><!--link fastapi_app to supabase_pg_cloud--><g clas
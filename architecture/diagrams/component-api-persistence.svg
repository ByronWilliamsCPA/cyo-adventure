1622.3706 2088.31,1612.3706 L2088.31,1554.48" fill="#FFF8E1" style="stroke:#181818;stroke-width:0.5;"/><path d="M2088.31,1554.48 C2088.31,1564.48 2204.0004,1564.48 2204.0004,1564.48 C2204.0004,1564.48 2319.6909,1564.48 2319.6909,1554.48" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="103.0176" x="2098.31" y="1581.4751">PostgreSQL 16</text><text fill="#000000" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="211.3809" x="2098.31" y="1597.772">Async SQLAlchemy 2 sessions</text><text fill="#000000" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="135.502" x="2098.31" y="1614.0689">Alembic migrations</text></g><g class="entity" data-qualified-name="GMN53" data-source-line="117" id="ent0054"><path d="M2745.64,477.59 L2745.64,535.12 L1606.6,539.12 L2745.64,543.12 L2745.64,600.6525 A4,4 0 0 0 2749.64,604.6525 L3052.3534,604.6525 A4,4 0 0 0 3056.3534,600.6525 L3056.3534,483.59 L3046.3534,473.59 L2749.64,473.59 A4,4 0 0 0 2745.64,477.59" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3046.3534,473.59 L3046.3534,481.59 A2,2 0 0 0 3048.3534,483.59 L3056.3534,483.59 L3046.3534,473.59" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="236.7866" x="2751.64" y="490.6569">local-only seam: treats bearer token</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="268.5059" x="2751.64" y="505.7897">as OIDC subject without signature check;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="222.3394" x="2751.64" y="520.9225">fails to start outside "local" unless</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="264.894" x="2751.64" y="536.0553">OIDC_ISSUER + OIDC_JWKS_URL are set.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="257.48" x="2751.64" y="551.1881">Non-local: _verify_oidc_jwt() validates a</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="289.7134" x="2751.64" y="566.321">real Supabase-issued JWT (signature, issuer,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="225.2656" x="2751.64" y="581.4538">audience, expiry) via cached JWKS</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="207.562" x="2751.64" y="596.5866">(jwt.PyJWKClient), per ADR-009.</text></g><g class="entity" data-qualified-name="GMN56" data-source-line="128" id="ent0057"><path d="M2746.36,1135.12 L2746.36,1212.7841 A4,4 0 0 0 2750.36,1216.7841 L3013.6354,1216.7841 A4,4 0 0 0 3017.6354,1212.7841 L3017.6354,1141.12 L3007.6354,1131.12 L2750.36,1131.12 A4,4 0 0 0 2746.36,1135.12" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3007.6354,1131.12 L3007.6354,1139.12 A2,2 0 0 0 3009.6354,1141.12 L3017.6354,1141.12 L3007.6354,1131.12" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="159.3896" x="2752.36" y="1148.1869">PUT /reading-state uses:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="221.4697" x="2752.36" y="1163.3197">SELECT ... FOR UPDATE (row lock)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="190.5376" x="2752.36" y="1178.4525">+ state_revision check (OCC)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="159.4531" x="2752.36" y="1193.5853">+ event_id idempotency</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="250.2754" x="2752.36" y="1208.7181">Returns 409 + current row on conflict.</text></g><g class="entity" data-qualified-name="GMN59" data-source-line="136" id="ent0060"><path d="M2403.23,1386.91 L2403.23,1464.5741 A4,4 0 0 0 2407.23,1468.5741 L2654.7759,1468.5741 A4,4 0 0 0 2658.7759,1464.5741 L2658.7759,1392.91 L2648.7759,1382.91 L2531.96,1382.91 L2516.97,1230.08 L2523.96,1382.91 L2407.23,1382.91 A4,4 0 0 0 2403.23,1386.91" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2648.7759,1382.91 L2648.7759,1390.91 A2,2 0 0 0 2650.7759,1392.91 L2658.7759,1392.91 L2648.7759,1382.91" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="234.5459" x="2409.23" y="1399.9769">All four endpoints are guardian-only</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="213.8716" x="2409.23" y="1415.1097">(checked before any DB access).</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="196.9233" x="2409.23" y="1430.2425">PII screen on concept creation</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="191.9214" x="2409.23" y="1445.3753">(child display_name must not</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="160.3672" x="2409.23" y="1460.5081">appear in the brief text).</text></g><!--link corr_mw to sec_mw--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="88" id="lnk29"><path d="M1475,195.55 C1475,219.36 1475,242.19 1475,265.98" fill="none" id="corr_mw-to-sec_mw" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1475,271.98,1479,262.98,1475,266.98,1471,262.98,1475,271.98" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="89.0386" x="1476" y="
 x="1461.4446" y="497.801">PII-guard -&gt; provider.complete -&gt; parse JSON</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="77.3525" x="1461.4446" y="512.9338">-&gt; run_gate</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="280.4966" x="1453.18" y="528.0666">Stage C (Repair, bounded max_repairs=3):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="288.4565" x="1461.4446" y="543.1994">while blocked AND attempts &lt; max_repairs:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="232.8638" x="1469.7093" y="558.3322">build_repair_prompt -&gt; PII-guard -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="235.3774" x="1469.7093" y="573.465">provider.complete -&gt; parse JSON -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="201.2524" x="1469.7093" y="588.5978">run_gate -&gt; no-progress check</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1453.18" y="603.7306">&#160;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="63.7114" x="1453.18" y="618.8635">Outcome:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="283.5625" x="1461.4446" y="633.9963">gate clean, not safety_flagged  -&gt; "passed"</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="321.8262" x="1461.4446" y="649.1291">gate clean, safety_flagged       -&gt; "needs_review"</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="336.3687" x="1461.4446" y="664.2619">blocked after exhausting repairs -&gt; "needs_review"</text><text fill="#000000" font-family
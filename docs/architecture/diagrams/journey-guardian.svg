<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="681px" preserveAspectRatio="none" style="width:731px;height:681px;background:#000000;" version="1.1" viewBox="0 0 731 681" width="731px" zoomAndPan="magnify"><defs/><g><rect fill="#08121B" height="1" style="stroke:#08121B;stroke-width:1.0;" width="1" x="0" y="0"/><text fill="#33FF02" font-family="sans-serif" font-size="12" font-style="italic" font-weight="bold" lengthAdjust="spacing" textLength="104.8807" x="5" y="17">PlantUML 1.2024.7</text><text fill="#33FF02" font-family="sans-serif" font-size="12" font-style="italic" font-weight="bold" lengthAdjust="spacing" textLength="3.12" x="5" y="33.3441">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="12" font-style="italic" font-weight="bold" lengthAdjust="spacing" textLength="330.5063" x="5" y="49.6882">&lt;b&gt;This version of PlantUML is 665 days old, so you should</text><text fill="#33FF02" font-family="sans-serif" font-size="12" font-style="italic" font-weight="bold" lengthAdjust="spacing" textLength="347.5103" x="5" y="66.0323">&lt;b&gt;consider upgrading from https://plantuml.com/download</text><rect fill="#33FF02" height="24.0679" style="stroke:#33FF02;stroke-width:1.0;" width="719.5134" x="5" y="78.3765"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="273.965" x="6" y="93.3765">[From journey-guardian.puml (line 83) ]</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.64" x="5" y="116.4444">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="199.4292" x="5" y="135.5123">@startuml journey-guardian</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.64" x="5" y="154.5802">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="719.5134" x="5" y="173.6481">title Guardian + Admin Surface Journey\n("/guardian"; rose = planned. Approve is admin-only, ADR-005)</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.64" x="5" y="192.716">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="269.6949" x="5" y="211.784">skinparam defaultFontName "Roboto"</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="11.97" x="5" y="230.8519">...</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="148.6095" x="5" y="249.9198">... ( skipping 40 lines )</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="11.97" x="5" y="268.9877">...</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="149.7294" x="5" y="288.0556">:Write the story, then</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="146.9014" x="5" y="307.1235">run the safety check;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="514.0081" x="5" y="326.1915">note right: generation + validator gate  &#8226;  shipped\ndetail: seq-generation</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="3.64" x="5" y="345.2594">&#160;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="61.1658" x="5" y="364.3273">|Admin|</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="233.7151" x="5" y="383.3952">repeat :pick the top of the queue;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="166.8654" x="12.28" y="402.4631">:Open the review queue</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="150.8215" x="12.28" y="421.531">(Flagged, then Ready,</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="150.9615" x="12.28" y="440.599">then Still processing);</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="294.5169" x="12.28" y="459.6669">note right: /guardian  (Console)  &#8226;  shipped</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="221.2832" x="12.28" y="478.7348">:Open a story: flagged passages</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="155.5954" x="12.28" y="497.8027">first, then the full text</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="201.2213" x="12.28" y="516.8706">with flags highlighted inline;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="298.6049" x="12.28" y="535.9385">note right: /guardian/review/:id  &#8226;  shipped</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="226.8411" x="5" y="555.0065">backward:Send back with a note</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="168.7274" x="5" y="574.0744">-&gt; the story is rewritten;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="398.2285" x="5" y="593.1423">repeat while (Safe for a child?) is (no) not (yes -&gt; approve)</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="62.6358" x="5" y="612.2102">:Approve</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="225.7491" x="5" y="631.2781">(recorded human gate, ADR-005;</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" text-decoration="wavy underline" textLength="169.6094" x="5" y="650.346">guardians get 403 here);</text><text fill="#FF0000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="93.3936" x="8.64" y="669.414">Syntax Error?</text><!--SRC=[fLVTRjis5BxNKvov5xKNoqwRj4YKDeKN9qM7jYlY5Xc6tj0IRNEHIPMauXhmnPvbZxOdsNSeoNz9UjCOWIpo_9_l_FWflVw9l-Wf_MNCN6RqnKaRNtulf5LIfvAkShD8w6qfRAQ4fWCQP7EbQLJQYKXbz1ISdwp9ojJtl_mPfxcmoYz9v5xvCfCqCPRyJ58XhDG-1e_IKqgDTYQNrBQcz9AybP14hVwqLjFgzEYZONQLvmajPWfKhydDL578h4lME7ulSg4rR6vhusafFOrBbVjE3x8-GwSe2clky4ozCfgK8y6snqRdIseFXjVnuU6BpXarMXsby71kjFAmUbnw4f3KtF8bwt4odyIDwFRWqpkoqfSMtCU7HwmRF2DJMiJEfN1CkmGdH1Dhj9SwwpkRzeFVjkVTTwBsMiCc6WcjOz7_jNEVVttvtaoL_YIcacLrwQ8AxERWMjufkHXABrJUdFv0t3ljnUqMErAB54YtEHaufwRwOgRo31aTAf6RwLfePbBN3rb1bliYi_pFKOxdGcS2OLt6inBVwm2Al3VFDfok1EmAiv0Mtmk9a-U7pr_6Xo_ZeyEuc0adusCHpyqO9iMbYXVAoeaLS-dYJB9PbRIVAeG8m0Ko7mCy_OxKQhdygjjRS3tRGsIF1ZL0Ta27wDMWYo9tgpIAGimfanDHvluA-VW8NwXrRSR6czOMoLYajrEWGsSN9WSsdrmD-BD5KL_2D4lF3hSkt4naPi55Dn6varit0slDefRtGXp9voVxbspIemGegZkK-c_tJBkw6buzI6bi9crDTPA-dBnu-G0L48KApEw9dPnCZkJ93nX-AFsZyVA-fSykJuSd-rJRSjBJyV79P3kQ2pL7YkMDoloC7D8LHQid5yFXnUN5gi7CYezU34ylBbO1E_n-USoVrMZfl9olmBGXTbvO7oKZu9UKZjfoZbhj5yAv1MmXsF7Mc6akkn501MYgIUYearnC6Lv6TyuYD2P9LardVhjpvDmSYFxxvrzgUcUKl4SbWYd8gDl5MOIgYUEOHkXaHK95NVLy5YM3B1WXCuM6I2bN_bFNq4HjpPWzmBjqwC3YJi2
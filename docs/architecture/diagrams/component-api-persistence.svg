-size="14" lengthAdjust="spacing" textLength="215.0313" x="1880.5" y="1603.3945">[Managed DB, ADR-009 decision 2]</text><text fill="#000000" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="191.1602" x="1880.5" y="1619.8008">Async SQLAlchemy 2 sessions</text><text fill="#000000" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="230.9316" x="1880.5" y="1636.207">Session pooler :5432 (session mode)</text><text fill="#000000" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="121.1328" x="1880.5" y="1652.6133">Alembic migrations</text></g><g class="entity" data-qualified-name="GMN53" data-source-line="119" id="ent0054"><path d="M2512.5,479 L2512.5,537 L1636.71,541 L2512.5,545 L2512.5,602.875 A4,4 0 0 0 2516.5,606.875 L2787.9385,606.875 A4,4 0 0 0 2791.9385,602.875 L2791.9385,485 L2781.9385,475 L2516.5,475 A4,4 0 0 0 2512.5,479" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2781.9385,475 L2781.9385,483 A2,2 0 0 0 2783.9385,485 L2791.9385,485 L2781.9385,475" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="206.1147" x="2518.5" y="492.0605">local-only seam: treats bearer token</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="235.9297" x="2518.5" y="507.2949">as OIDC subject without signature check;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="195.7935" x="2518.5" y="522.5293">fails to start outside "local" unless</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="237.2944" x="2518.5" y="537.7637">OIDC_ISSUER + OIDC_JWKS_URL are set.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="226.7573" x="2518.5" y="552.998">Non-local: _verify_oidc_jwt() validates a</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="258.4385" x="2518.5" y="568.2324">real Supabase-issued JWT (signature, issuer,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="200.021" x="2518.5" y="583.4668">audience, expiry) via cached JWKS</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="185.4277" x="2518.5" y="598.7012">(jwt.PyJWKClient), per ADR-009.</text></g><g class="entity" data-qualified-name="GMN56" data-source-line="130" id="ent0057"><path d="M2512,1139.5 L2512,1217.6719 A4,4 0 0 0 2516,1221.6719 L2746.2739,1221.6719 A4,4 0 0 0 2750.2739,1217.6719 L2750.2739,1145.5 L2740.2739,1135.5 L2516,1135.5 A4,4 0 0 0 2512,1139.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2740.2739,1135.5 L2740.2739,1143.5 A2,2 0 0 0 2742.2739,1145.5 L2750.2739,1145.5 L2740.2739,1135.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="142.9429" x="2518" y="1152.5605">PUT /reading-state uses:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="199.583" x="2518" y="1167.7949">SELECT ... FOR UPDATE (row lock)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="166.4102" x="2518" y="1183.0293">+ state_revision check (OCC)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="136.481" x="2518" y="1198.2637">+ event_id idempotency</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="217.2739" x="2518" y="1213.498">Returns 409 + current row on conflict.</text></g><g class="entity" data-qualified-name="GMN59" data-source-line="138" id="ent0060"><path d="M2186,1392 L2186,1470.1719 A4,4 0 0 0 2190,1474.1719 L2408.1816,1474.1719 A4,4 0 0 0 2412.1816,1470.1719 L
" font-size="14" lengthAdjust="spacing" textLength="211.3809" x="474.31" y="1565.172">Async SQLAlchemy 2 sessions</text><text fill="#000000" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="135.502" x="474.31" y="1581.4689">Alembic migrations</text></g><g class="entity" data-qualified-name="GMN43" data-source-line="97" id="ent0044"><path d="M1332.64,477.58 L1332.64,535.11 L425.76,539.11 L1332.64,543.11 L1332.64,600.6425 A4,4 0 0 0 1336.64,604.6425 L1639.3534,604.6425 A4,4 0 0 0 1643.3534,600.6425 L1643.3534,483.58 L1633.3534,473.58 L1336.64,473.58 A4,4 0 0 0 1332.64,477.58" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1633.3534,473.58 L1633.3534,481.58 A2,2 0 0 0 1635.3534,483.58 L1643.3534,483.58 L1633.3534,473.58" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="236.7866" x="1338.64" y="490.6469">local-only seam: treats bearer token</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="268.5059" x="1338.64" y="505.7797">as OIDC subject without signature check;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="222.3394" x="1338.64" y="520.9125">fails to start outside "local" unless</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="264.894" x="1338.64" y="536.0453">OIDC_ISSUER + OIDC_JWKS_URL are set.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="257.48" x="1338.64" y="551.1781">Non-local: _verify_oidc_jwt() validates a</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="289.7134" x="1338.64" y="566.311">real Supabase-issued JWT (signature, issuer,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="225.2656" x="1338.64" y="581.4438">audience, expiry) via cached JWKS</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="207.562" x="1338.64" y="596.5766">(jwt.PyJWKClient), per ADR-009.</text></g><g class="entity" data-qualified-name="GMN46" data-source-line="108" id="ent0047"><path d="M1333.36,1118.82 L1333.36,1196.4841 A4,4 0 0 0 1337.36,1200.4841 L1600.6354,1200.4841 A4,4 0 0 0 1604.6354,1196.4841 L1604.6354,1124.82 L1594.6354,1114.82 L1337.36,1114.82 A4,4 0 0 0 1333.36,1118.82" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1594.6354,1114.82 L1594.6354,1122.82 A2,2 0 0 0 1596.6354,1124.82 L1604.6354,1124.82 L1594.6354,1114.82" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="159.3896" x="1339.36" y="1131.8869">PUT /reading-state uses:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="221.4697" x="1339.36" y="1147.0197">SELECT ... FOR UPDATE (row lock)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="190.5376" x="1339.36" y="1162.1525">+ state_revision check (OCC)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="159.4531" x="1339.36" y="1177.2853">+ event_id idempotency</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="250.2754" x="1339.36" y="1192.4181">Returns 409 + current row on conflict.</text></g><g class="entity" data-qualified-name="GMN49" data-source-line="116" id="ent0050"><path d="M779.23,1354.31 L779.23,1431.9741 A4,4 0 0 0 783.23,1435.9741 L1030.7759,1435.9741 A4,4 0 0 0 1034.7759,1431.9741 L1034.7759,1360.31 L1024.7759,1350.31 L907.74,1350.31 L893.24,1213.69 L899.74,1350.31 L783.23,1350.31 A4,4 0 0 0 779.23,1354.31" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1024.7759,1350.31 L1024.7759,1358.31 A2,2 0 0 0 1026.7759,1360.31 L1034.7759,1360.31 L1024.7759,1350.31" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="234.5459" x="785.23" y="1367.3769">All four endpoints are guardian-only</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="213.8716" x="785.23" y="1382.5097">(checked before any DB access).</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="196.9233" x="785.23" y="1397.6425">PII screen on concept creation</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="191.9214" x="785.23" y="1412.7753">(child display_name must not</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="160.3672" x="785.23" y="1427.9081">appear in the brief text).</text></g><!--link corr_mw to sec_mw--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="73" id="lnk24"><path d="M294,195.55 C294,219.36 294,242.19 294,265.98" fill="none" id="corr_mw-to-sec_mw" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="294,271.98,298,262.98,294,266.98,290,262.98,294,271.98" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="89.0386" x="295" y="238.2469">request chain</text></g><!--link sec_mw to auth_seam--><g class="link" data-entity-1="ent0005" data-entity-2="ent0007" data-link-type="dependency" data-source-line="74" id="lnk25"><path d="M294,367.67 C294,401.61 294,441.59 294,477.24" fill="none" id="sec_mw-to-auth_seam" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="294,483.24,298,474.24,294,478.24,290,474.24,294,483.24" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" 
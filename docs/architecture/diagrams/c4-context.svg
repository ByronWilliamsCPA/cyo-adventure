<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="751px" preserveAspectRatio="none" style="width:1858px;height:751px;background:#FAFAFA;" version="1.1" viewBox="0 0 1858 751" width="1858px" zoomAndPan="magnify"><defs/><g><rect fill="#FAFAFA" height="751" style="stroke:none;stroke-width:1;" width="1858" x="0" y="0"/><!--cluster system--><g class="cluster" data-qualified-name="system" data-source-line="38" id="ent0005"><rect fill="#FFF3E0" height="313.08" rx="4" ry="4" style="stroke:#555555;stroke-width:1;" width="326" x="819.9" y="192.39"/><text fill="#222222" font-family="'Roboto'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="182.8818" x="891.4591" y="207.3851">CYO Adventure System</text><text fill="#222222" font-family="'Roboto'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="310.4336" x="827.6832" y="223.682">[Homelab, Docker, Pangolin zero-trust]</text></g><!--entity pwa--><g class="entity" data-qualified-name="system.pwa" data-source-line="39" id="ent0006"><rect fill="#E3F2FD" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="211.3379" x="902.23" y="243.39"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="86.4883" x="912.23" y="266.3851">PWA Reader</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="157.1377" x="912.23" y="282.682">[React 19, TypeScript]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="191.3379" x="912.23" y="298.9789">Play stories, offline support</text></g><!--entity backend--><g class="entity" data-qualified-name="system.backend" data-source-line="40" id="ent0007"><rect fill="#E8F5E9" height="85.1875" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="260.7412" x="867.53" y="404.28"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="116.375" x="877.53" y="427.2751">FastAPI Backend</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="95.0742" x="877.53" y="443.572">[Python 3.12]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="240.7412" x="877.53" y="459.8689">Library, generation, reading state,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="113.3809" x="877.53" y="476.1657">guardian review</text></g><!--entity child--><g class="entity" data-qualified-name="child" data-source-line="33" id="ent0002"><ellipse cx="865.9002" cy="22.15" fill="#E3F2FD" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M865.9002,30.15 L865.9002,57.15 M852.9002,38.15 L878.9002,38.15 M865.9002,57.15 L852.9002,72.15 M865.9002,57.15 L878.9002,72.15" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="89.9404" x="820.93" y="86.6451">Child Reader</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="84.957" x="820.93" y="102.942">(age 3-16+)</text></g><!--entity guardian--><g class="entity" data-qualified-name="guardian" data-source-line="34" id="ent0003"><ellipse cx="1007.8981" cy="22.15" fill="#E8F5E9" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M1007.8981,30.15 L1007.8981,57.15 M994.8981,38.15 L1020.8981,38.15 M1007.8981,57.15 L994.8981,72.15 M1007.8981,57.15 L1020.8981,72.15" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="125.0361" x="945.38" y="86.6451">Guardian / Author</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="116.7441" x="945.38" y="102.942">(parent or carer)</text></g><!--entity admin--><g class="entity" data-qualified-name="admin" data-source-line="35" id="ent0004"><ellipse cx="1241.8951" cy="14" fill="#EDE7F6" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M1241.8951,22 L1241.8951,49 M1228.8951,30 L1254.8951,30 M1241.8951,49 L1228.8951,64 M1241.8951,49 L1254.8951,64" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="44.8643" x="1159.44" y="78.4951">Admin</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="164.9102" x="1159.44" y="94.792">(global safety operator,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="161.0889" x="1159.44" y="111.0889">cross-family, ADR-005)</text></g><!--entity openrouter--><g class="entity" data-qualified-name="openrouter" data-source-line="44" id="ent0008"><rect fill="#F3E5F5" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="193.7969" x="7" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="84.417" x="17" y="652.6851">OpenRouter</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="160.4873" x="17" y="668.982">[Primary LLM provider]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="173.7969" x="17" y="685.2789">Multi-model API gateway</text></g><!--entity ollama--><g class="entity" data-qualified-name="ollama" data-source-line="45" id="ent0009"><rect fill="#FFEBEE" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="169.0371" x="513.38" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="49.5947" x="523.38" y="652.6851">Ollama</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="138.5918" x="523.38" y="668.982">[Local fallback LLM]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="149.0371" x="523.38" y="685.2789">Self-hosted, homelab</text></g><!--entity supabase_auth--><g class="entity" data-qualified-name="supabase_auth" data-source-line="46" id="ent0010"><rect fill="#E0F7FA" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="278.8701" x="717.46" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="119.6768" x="727.46" y="652.6851">Supabase (OIDC)</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="246.627" x="727.46" y="668.982">[Managed auth platform, ADR-009]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="258.8701" x="727.46" y="685.2789">Guardian sign-in only (Apple/Google)</text></g><!--entity postgres--><g class="entity" data-qualified-name="postgres" data-source-line="47" id="ent0011"><rect fill="#FFF8E1" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="214.9336" x="1031.43" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="80.7529" x="1041.43" y="652.6851">PostgreSQL</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="162.4219" x="1041.43" y="668.982">[Operational database]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="194.9336" x="1041.43" y="685.2789">Metadata and reading state</text></g><!--entity redis--><g class="entity" data-qualified-name="redis" data-source-line="48" id="ent0012"><rect fill="#E0E0E0" height="68.8906" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="175.4014" x="1281.2" y="629.69"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="79.7891" x="1291.2" y="652.6851">Redis + RQ</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="80.8145" x="1291.2" y="668.982">[Job queue]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="155.4014" x="1291.2" y="685.2789">Async generation jobs</text></g><g class="entity" data-qualified-name="GMN22" data-source-line="62" id="ent0023"><path d="M1163.48,415.61 L1163.48,478.1412 A4,4 0 0 0 1167.48,482.1412 L1470.3076,482.1412 A4,4 0 0 0 1474.3076,478.1412 L1474.3076,421.61 L1464.3076,411.61 L1167.48,411.61 A4,4 0 0 0 1163.48,415.61" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1464.3076,411.61 L1464.3076,419.61 A2,2 0 0 0 1466.3076,421.61 L1474.3076,421.61 L1464.3076,411.61" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="149.4873" x="1169.48" y="428.6769">Generated API client in</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="216.125" x="1169.48" y="443.8097">frontend/src/client/ (build output,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="267.0459" x="1169.48" y="458.9425">not hand-written) from OpenAPI schema.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="289.8276" x="1169.48" y="474.0753">Service worker + IndexedDB for offline play.</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="69" id="ent0026"><path d="M235.33,617.74 L235.33,660.14 L201.24,664.14 L235.33,668.14 L235.33,710.5369 A4,4 0 0 0 239.33,714.5369 L474.4726,714.5369 A4,4 0 0 0 478.4726,710.5369 L478.4726,623.74 L468.4726,613.74 L239.33,613.74 A4,4 0 0 0 235.33,617.74" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M468.4726,613.74 L468.4726,621.74 A2,2 0 0 0 470.4726,623.74 L478.4726,623.74 L468.4726,613.74" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="170.5933" x="241.33" y="630.8069">Provider fallback cascade:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="163.2554" x="241.33" y="645.9397">OpenRouter (primary) -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="145.4121" x="241.33" y="661.0725">Ollama (local fallback)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="169.9331" x="241.33" y="676.2053">Layer 1: per-adapter retry</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="222.1426" x="241.33" y="691.3381">Layer 2: FallbackProvider cascade</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="211.9736" x="241.33" y="706.471">Layer 3: orchestrator repair loop</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="78" id="ent0029"><path d="M1491.99,587.47 L1491.99,740.7981 A4,4 0 0 0 1495.99,744.7981 L1847.8152,744.7981 A4,4 0 0 0 1851.8152,740.7981 L1851.8152,593.47 L1841.8152,583.47 L1495.99,583.47 A4,4 0 0 0 1491.99,587.47" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1841.8152,583.47 L1841.8152,591.47 A2,2 0 0 0 1843.8152,593.47 L1851.8152,593.47 L1841.8152,583.47" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="326.1108" x="1497.99" y="600.5369">Mandatory human approval (ADR-005, amended):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="254.3633" x="1497.99" y="615.6697">no story reaches a child profile without</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="316.729" x="1497.99" y="630.8025">a recorded admin approval (global, cross-family;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="338.8252" x="1497.99" y="645.9353">guardians author and submit, they do not approve).</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="156.7363" x="1497.99" y="661.0681">Two separate lifecycles:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="252.605" x="1497.99" y="676.201">- GenerationJob: queued -&gt; running -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="196.3584" x="1506.2546" y="691.3338">passed | needs_review | failed</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="219.7939" x="1497.99" y="706.4666">- Storybook: draft -&gt; in_review -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="241.7568" x="1506.2546" y="721.5994">needs_revision | published | archived</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="290.9829" x="1497.99" y="736.7322">("approved" is an action, not a resting state)</text></g><!--link child to pwa--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="51" id="lnk13"><path d="M874.44,106.53 C879.98,128.75 888.69,155.19 901.9,176.39 C917.79,201.89 937.0947,221.4403 958.1747,239.2303" fill="none" id="child-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="962.76,243.1,958.4618,234.2385,958.9389,239.8752,953.3022,240.3523,962.76,243.1" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="91.8379" x="903.63" y="157.4569">Reads stories,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="93.2979" x="902.9" y="172.5897">chooses paths</text></g><!--link guardian to pwa--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="dependency" data-source-line="52" id="lnk14"><path d="M1005.97,106.41 C1005.52,118.74 1005.12,132.07 1004.9,144.39 C1004.3,177.97 1005.1315,210.3344 1006.1515,237.0944" fill="none" id="guardian-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1006.38,243.09,1010.0343,233.9442,1006.1896,238.0936,1002.0401,234.2489,1006.38,243.09" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="117.4126" x="1043.4654" y="157.4569">Authors concepts,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="192.5435" x="1005.9" y="172.5897">submits for review (ADR-005)</text></g><!--link admin to pwa--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="53" id="lnk15"><path d="M1232.81,114.72 C1227.07,135.82 1217.8,159.07 1202.9,176.39 C1177.88,205.48 1147.7954,224.7106 1113.9054,240.3906" fill="none" id="admin-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1108.46,242.91,1118.3077,242.7611,1112.9978,240.8105,1114.9485,235.5006,1108.46,242.91" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="195.0444" x="1240.4422" y="157.4569">Reviews and approves/rejects</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="230.1089" x="1222.91" y="172.5897">storybooks, cross-family (ADR-005)</text></g><!--link pwa to backend--><g class="link" data-entity-1="ent0006" data-entity-2="ent0007" data-link-type="dependency" data-source-line="54" id="lnk16"><path d="M1005.87,312.64 C1004.3,338.95 1002.4567,369.6206
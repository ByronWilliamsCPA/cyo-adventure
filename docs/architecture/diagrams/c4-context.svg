<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="676px" preserveAspectRatio="none" style="width:1535px;height:676px;background:#FAFAFA;" version="1.1" viewBox="0 0 1535 676" width="1535px" zoomAndPan="magnify"><defs><style type="text/css">@import url('https://fonts.googleapis.com/css?family=Roboto:400,100,100italic,300,300italic,400italic,500,500italic,700,700italic,900,900italic');</style></defs><g><rect fill="#FAFAFA" height="676" style="stroke:none;stroke-width:1.0;" width="1535" x="0" y="0"/><!--cluster system--><g id="cluster_system"><rect fill="#FFF3E0" height="314" rx="4" ry="4" style="stroke:#555555;stroke-width:1.0;" width="260" x="720.5" y="176.5"/><text fill="#222222" font-family="Roboto" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="146.7949" x="777.1025" y="191.4883">CYO Adventure System</text><text fill="#222222" font-family="Roboto" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="244.5352" x="728.2324" y="207.8945">[Homelab, Docker, Pangolin zero-trust]</text></g><!--entity pwa--><g id="elem_pwa"><rect fill="#E3F2FD" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="189.8936" x="762.5" y="227.5"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="77.5879" x="772.5" y="250.4883">PWA Reader</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="134.9277" x="772.5" y="266.8945">[React 19, TypeScript]</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="169.8936" x="772.5" y="283.3008">Play stories, offline support</text></g><!--entity backend--><g id="elem_backend"><rect fill="#E8F5E9" height="85.625" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="225.8164" x="737.5" y="388.5"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="106.2168" x="747.5" y="411.4883">FastAPI Backend</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="81.6553" x="747.5" y="427.8945">[Python 3.12]</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="205.8164" x="747.5" y="444.3008">Library, generation, reading state,</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="98.3555" x="747.5" y="460.707">guardian review</text></g><!--entity child--><g id="elem_child"><ellipse cx="792.3647" cy="14" fill="#E3F2FD" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M792.3647,22 L792.3647,49 M779.3647,30 L805.3647,30 M792.3647,49 L779.3647,64 M792.3647,49 L805.3647,64 " fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="78.7295" x="753" y="78.4883">Child Reader</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="63.5127" x="753" y="94.8945">(age 8-16)</text></g><!--entity guardian--><g id="elem_guardian"><ellipse cx="922.4258" cy="14" fill="#E8F5E9" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M922.4258,22 L922.4258,49 M909.4258,30 L935.4258,30 M922.4258,49 L909.4258,64 M922.4258,49 L935.4258,64 " fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="110.8516" x="867" y="78.4883">Guardian / Author</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="101.1514" x="867" y="94.8945">(parent or carer)</text></g><!--entity openrouter--><g id="elem_openrouter"><rect fill="#F3E5F5" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="175.1416" x="7" y="584.5"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="73.7256" x="17" y="607.4883">OpenRouter</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="140.752" x="17" y="623.8945">[Primary LLM provider]</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="155.1416" x="17" y="640.3008">Multi-model API gateway</text></g><!--entity ollama--><g id="elem_ollama"><rect fill="#FFEBEE" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="151.2021" x="471" y="584.5"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="43.9482" x="481" y="607.4883">Ollama</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="124.7354" x="481" y="623.8945">[Local fallback LLM]</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="131.2021" x="481" y="640.3008">Self-hosted, homelab</text></g><!--entity authentik--><g id="elem_authentik"><rect fill="#E0F7FA" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="170.4453" x="657.5" y="584.5"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="59.377" x="667.5" y="607.4883">Authentik</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="142.5908" x="667.5" y="623.8945">[OIDC identity provider]</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="150.4453" x="667.5" y="640.3008">Guardian and child roles</text></g><!--entity postgres--><g id="elem_postgres"><rect fill="#FFF8E1" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="191.3086" x="863" y="584.5"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="74.1357" x="873" y="607.4883">PostgreSQL</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="140.7246" x="873" y="623.8945">[Operational database]</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="171.3086" x="873" y="640.3008">Metadata and reading state</text></g><!--entity redis--><g id="elem_redis"><rect fill="#E0E0E0" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="157.9082" x="1089.5" y="584.5"/><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="67.7236" x="1099.5" y="607.4883">Redis + RQ</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="72.707" x="1099.5" y="623.8945">[Job queue]</text><text fill="#222222" font-family="Roboto" font-size="14" lengthAdjust="spacing" textLength="137.9082" x="1099.5" y="640.3008">Async generation jobs</text></g><g id="elem_GMN20"><path d="M998.5,400 L998.5,462.9375 A4,4 0 0 0 1002.5,466.9375 L1266.4165,466.9375 A4,4 0 0 0 1270.4165,462.9375 L1270.4165,406 L1260.4165,396 L1002.5,396 A4,4 0 0 0 998.5,400 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1260.4165,396 L1260.4165,404 A2,2 0 0 0 1262.4165,406 L1270.4165,406 L1260.4165,396 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="131.46" x="1004.5" y="413.0605">Generated API client in</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="193.7686" x="1004.5" y="428.2949">frontend/src/client/ (build output,</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="236.2598" x="1004.5" y="443.5293">not hand-written) from OpenAPI schema.</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="250.9165" x="1004.5" y="458.7637">Service worker + IndexedDB for offline play.</text></g><g id="elem_GMN23"><path d="M217.5,572.5 L217.5,615 L182.41,619 L217.5,623 L217.5,665.9063 A4,4 0 0 0 221.5,669.9063 L431.29,669.9063 A4,4 0 0 0 435.29,665.9063 L435.29,578.5 L425.29,568.5 L221.5,568.5 A4,4 0 0 0 217.5,572.5 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M425.29,568.5 L425.29,576.5 A2,2 0 0 0 427.29,578.5 L435.29,578.5 L425.29,568.5 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="152.0708" x="223.5" y="585.5605">Provider fallback cascade:</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="138.1694" x="223.5" y="600.7949">OpenRouter (primary) -&gt;</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="129.5239" x="223.5" y="616.0293">Ollama (local fallback)</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="144.2759" x="223.5" y="631.2637">Layer 1: per-adapter retry</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="196.79" x="223.5" y="646.498">Layer 2: FallbackProvider cascade</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="184.5898" x="223.5" y="661.7324">Layer 3: orchestrator repair loop</text></g><g id="elem_GMN26"><path d="M1282.5,572.5 L1282.5,665.9063 A4,4 0 0 0 1286.5,669.9063 L1524.0547,669.9063 A4,4 0 0 0 1528.0547,665.9063 L1528.0547,578.5 L1518.0547,568.5 L1286.5,568.5 A4,4 0 0 0 1282.5,572.5 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1518.0547,568.5 L1518.0547,576.5 A2,2 0 0 0 1520.0547,578.5 L1528.0547,578.5 L1518.0547,568.5 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="224.5547" x="1288.5" y="585.5605">Mandatory human approval (ADR-005):</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="223.5327" x="1288.5" y="600.7949">no story reaches a child profile without</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="172.3579" x="1288.5" y="616.0293">a recorded guardian approval.</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="209.1299" x="1288.5" y="631.2637">State machine: draft -&gt; generating -&gt;</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="220.9556" x="1288.5" y="646.498">auto_check -&gt; in_review -&gt; approved -&gt;</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="122.1479" x="1288.5" y="661.7324">published -&gt; archived</text></g><!--link child to pwa--><g id="link_child_pwa"><path d="M787.42,98.54 C786.65,117.99 787.64,140.73 793.5,160.5 C800.67,184.7 811.9795,203.8207 825.5895,222.2807 " fill="none" id="child-to-pwa" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="829.15,227.11,827.0288,217.4923,826.1829,223.0855,820.5896,222.2397,829.15,227.11" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="81.3452" x="796.2393" y="141.5605">Reads stories,</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="84.8237" x="794.5" y="156.7949">chooses paths</text></g><!--link guardian to pwa--><g id="link_guardian_pwa"><path d="M908.24,98.65 C896.09,137.51 880.7094,186.723 869.7894,221.673 " fill="none" id="guardian-to-pwa" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="868,227.4,874.502,220.0025,869.4911,222.6275,866.8661,217.6166,868,227.4" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="104.73" x="926.5823" y="141.5605">Authors concepts,</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="158.8945" x="899.5" y="156.7949">approves stories (ADR-005)</text></g><!--link pwa to backend--><g id="link_pwa_backend"><path d="M856.08,296.9 C854.98,323.28 853.69,354.0452 852.51,382.3352 " fill="none" id="pwa-to-backend" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="852.26,388.33,856.6316,379.5045,852.4684,383.3343,848.6385,379.1711,852.26,388.33" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="75.9624" x="875.616" y="339.5605">REST /api/v1</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="114.1943" x="856.5" y="354.7949">(OIDC bearer token)</text></g><!--link backend to openrouter--><g id="link_backend_openrouter"><path d="M737.22,447.91 C605.65,467.69 383.15,506.98 199.5,568.5 C186.31,572.92 178.0777,576.0792 165.0877,581.9492 " fill="none" id="backend-to-openrouter" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="159.62,584.42,169.4687,584.359,164.1764,582.361,166.1743,577.0687,159.62,584.42" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="100.2676" x="416.9592" y="519.5605">LLM completions</text><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="109.186" x="412.5" y="534.7949">(primary, ADR-003)</text></g><!--link backend to ollama--><g id="link_backend_ollama"><path d="M737.46,469.54 C712.54,479.84 686.91,492.2 664.5,506.5 C630.64,528.1 601.98,555.7915 579.62,580.0115 " fill="none" id="backend-to-ollama" style="stroke:#181818;stroke-width:1.0;stroke-dasharray:7.0,7.0;"/><polygon fill="#181818" points="575.55,584.42,584.594,580.5205,578.9417,580.7462,578.7159,575.0939,575.55,584.42" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Roboto" font-size="13" lengthAdjust="spacing" textLength="100.2676" x="665.5" y="51
<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="753px" preserveAspectRatio="none" style="width:1771px;height:753px;background:#FAFAFA;" version="1.1" viewBox="0 0 1771 753" width="1771px" zoomAndPan="magnify"><defs/><g><rect fill="#FAFAFA" height="753" style="stroke:none;stroke-width:1;" width="1771" x="0" y="0"/><!--cluster system--><g class="cluster" data-qualified-name="system" data-source-line="40" id="ent0005"><rect fill="#FFF3E0" height="314" rx="4" ry="4" style="stroke:#555555;stroke-width:1;" width="260" x="815.5" y="192.5"/><text fill="#222222" font-family="'Roboto'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="146.7949" x="872.1025" y="207.4883">CYO Adventure System</text><text fill="#222222" font-family="'Roboto'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="244.5352" x="823.2324" y="223.8945">[Homelab, Docker, Pangolin zero-trust]</text></g><!--entity pwa--><g class="entity" data-qualified-name="system.pwa" data-source-line="41" id="ent0006"><rect fill="#E3F2FD" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="189.8936" x="857.5" y="243.5"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="77.5879" x="867.5" y="266.4883">PWA Reader</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="134.9277" x="867.5" y="282.8945">[React 19, TypeScript]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="169.8936" x="867.5" y="299.3008">Play stories, offline support</text></g><!--entity backend--><g class="entity" data-qualified-name="system.backend" data-source-line="42" id="ent0007"><rect fill="#E8F5E9" height="85.625" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="225.8164" x="832.5" y="404.5"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="106.2168" x="842.5" y="427.4883">FastAPI Backend</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="81.6553" x="842.5" y="443.8945">[Python 3.12]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="205.8164" x="842.5" y="460.3008">Library, generation, reading state,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="98.3555" x="842.5" y="476.707">guardian review</text></g><!--entity child--><g class="entity" data-qualified-name="child" data-source-line="35" id="ent0002"><ellipse cx="822.3647" cy="22" fill="#E3F2FD" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M822.3647,30 L822.3647,57 M809.3647,38 L835.3647,38 M822.3647,57 L809.3647,72 M822.3647,57 L835.3647,72" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="78.7295" x="783" y="86.4883">Child Reader</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="71.4561" x="783" y="102.8945">(age 3-16+)</text></g><!--entity guardian--><g class="entity" data-qualified-name="guardian" data-source-line="36" id="ent0003"><ellipse cx="952.4258" cy="22" fill="#E8F5E9" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M952.4258,30 L952.4258,57 M939.4258,38 L965.4258,38 M952.4258,57 L939.4258,72 M952.4258,57 L965.4258,72" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="110.8516" x="897" y="86.4883">Guardian / Author</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="101.1514" x="897" y="102.8945">(parent or carer)</text></g><!--entity admin--><g class="entity" data-qualified-name="admin" data-source-line="37" id="ent0004"><ellipse cx="1163.4482" cy="14" fill="#EDE7F6" rx="8" ry="8" style="stroke:#555555;stroke-width:0.5;"/><path d="M1163.4482,22 L1163.4482,49 M1150.4482,30 L1176.4482,30 M1163.4482,49 L1150.4482,64 M1163.4482,49 L1176.4482,64" fill="none" style="stroke:#555555;stroke-width:0.5;"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="40.4414" x="1091.5" y="78.4883">Admin</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="143.8965" x="1091.5" y="94.8945">(global safety operator,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="142.0918" x="1091.5" y="111.3008">cross-family, ADR-005)</text></g><!--entity openrouter--><g class="entity" data-qualified-name="openrouter" data-source-line="46" id="ent0008"><rect fill="#F3E5F5" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="175.1416" x="7" y="631"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="73.7256" x="17" y="653.9883">OpenRouter</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="140.752" x="17" y="670.3945">[Primary LLM provider]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="155.1416" x="17" y="686.8008">Multi-model API gateway</text></g><!--entity ollama--><g class="entity" data-qualified-name="ollama" data-source-line="47" id="ent0009"><rect fill="#FFEBEE" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="151.2021" x="473" y="631"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="43.9482" x="483" y="653.9883">Ollama</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="124.7354" x="483" y="670.3945">[Local fallback LLM]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="131.2021" x="483" y="686.8008">Self-hosted, homelab</text></g><!--entity supabase_auth--><g class="entity" data-qualified-name="supabase_auth" data-source-line="48" id="ent0010"><rect fill="#E0F7FA" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="273.5654" x="659.5" y="631"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="106.5107" x="669.5" y="653.9883">Supabase (OIDC)</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="214.3408" x="669.5" y="670.3945">[Managed auth platform, ADR-009]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="253.5654" x="669.5" y="686.8008">Guardian + admin sign-in (Apple/Google)</text></g><!--entity postgres--><g class="entity" data-qualified-name="postgres" data-source-line="49" id="ent0011"><rect fill="#E0F7FA" height="102.0313" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="250.9316" x="969" y="614.5"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="120.9824" x="979" y="637.4883">Supabase Postgres</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="199.958" x="979" y="653.8945">[Managed operational database,</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="125.3438" x="979" y="670.3008">ADR-009 decision 2]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="230.9316" x="979" y="686.707">Session pooler :5432 (session mode)</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="171.3086" x="979" y="703.1133">Metadata and reading state</text></g><!--entity redis--><g class="entity" data-qualified-name="redis" data-source-line="50" id="ent0012"><rect fill="#E0E0E0" height="69.2188" rx="4" ry="4" style="stroke:#555555;stroke-width:0.5;" width="157.9082" x="1255.5" y="631"/><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="67.7236" x="1265.5" y="653.9883">Redis + RQ</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="72.707" x="1265.5" y="670.3945">[Job queue]</text><text fill="#222222" font-family="'Roboto'" font-size="14" lengthAdjust="spacing" textLength="137.9082" x="1265.5" y="686.8008">Async generation jobs</text></g><g class="entity" data-qualified-name="GMN22" data-source-line="64" id="ent0023"><path d="M1093.5,416 L1093.5,478.9375 A4,4 0 0 0 1097.5,482.9375 L1361.4165,482.9375 A4,4 0 0 0 1365.4165,478.9375 L1365.4165,422 L1355.4165,412 L1097.5,412 A4,4 0 0 0 1093.5,416" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1355.4165,412 L1355.4165,420 A2,2 0 0 0 1357.4165,422 L1365.4165,422 L1355.4165,412" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="131.46" x="1099.5" y="429.0605">Generated API client in</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="193.7686" x="1099.5" y="444.2949">frontend/src/client/ (build output,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="236.2598" x="1099.5" y="459.5293">not hand-written) from OpenAPI schema.</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="250.9165" x="1099.5" y="474.7637">Service worker + IndexedDB for offline play.</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="71" id="ent0026"><path d="M217.5,611 L217.5,661.5 L182.33,665.5 L217.5,669.5 L217.5,719.6406 A4,4 0 0 0 221.5,723.6406 L433.3657,723.6406 A4,4 0 0 0 437.3657,719.6406 L437.3657,617 L427.3657,607 L221.5,607 A4,4 0 0 0 217.5,611" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M427.3657,607 L427.3657,615 A2,2 0 0 0 429.3657,617 L437.3657,617 L427.3657,607" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="198.8657" x="223.5" y="624.0605">Provider fallback cascade (3 legs):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="172.542" x="223.5" y="639.2949">OpenRouter haiku (primary) -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="182.8062" x="223.5" y="654.5293">OpenRouter sonnet (fallback) -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="129.5239" x="223.5" y="669.7637">Ollama (local fallback)</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="144.2759" x="223.5" y="684.998">Layer 1: per-adapter retry</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="196.79" x="223.5" y="700.2324">Layer 2: FallbackProvider cascade</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="184.5898" x="223.5" y="715.4668">Layer 3: orchestrator repair loop</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="81" id="ent0029"><path d="M1449,588.5 L1449,742.8438 A4,4 0 0 0 1453,746.8438 L1760.252,746.8438 A4,4 0 0 0 1764.252,742.8438 L1764.252,594.5 L1754.252,584.5 L1453,584.5 A4,4 0 0 0 1449,588.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1754.252,584.5 L1754.252,592.5 A2,2 0 0 0 1756.252,594.5 L1764.252,594.5 L1754.252,584.5" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="284.4385" x="1455" y="601.5605">Mandatory human approval (ADR-005, amended):</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="223.5327" x="1455" y="616.7949">no story reaches a child profile without</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="277.1006" x="1455" y="632.0293">a recorded admin approval (global, cross-family;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="294.252" x="1455" y="647.2637">guardians author and submit, they do not approve).</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="139.3945" x="1455" y="662.498">Two separate lifecycles:</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="215.249" x="1455" y="677.7324">- GenerationJob: queued -&gt; running -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="171.6914" x="1461.4492" y="692.9668">passed | needs_review | failed</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="183.5107" x="1455" y="708.2012">- Storybook: draft -&gt; in_review -&gt;</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="210.647" x="1461.4492" y="723.4355">needs_revision | published | archived</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="251.4497" x="1455" y="738.6699">("approved" is an action, not a resting state)</text></g><!--link child to pwa--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="53" id="lnk13"><path d="M830.15,106.64 C835.17,128.75 843.16,155.09 855.5,176.5 C870.03,201.71 887.8534,221.2979 907.3534,239.3179" fill="none" id="child-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="911.76,243.39,907.8649,234.3441,908.0879,239.9966,902.4354,240.2195,911.76,243.39" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="81.3452" x="858.2393" y="157.5605">Reads stories,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="84.8237" x="856.5" y="172.7949">chooses paths</text></g><!--link guardian to pwa--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="dependency" data-source-line="54" id="lnk14"><path d="M950.55,106.93 C950.12,119.14 949.72,132.32 949.5,144.5 C948.9,178.09 949.7316,210.4643 950.7516,237.2443" fill="none" id="guardian-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="950.98,243.24,954.6346,234.0943,950.7897,238.2436,946.6404,234.3988,950.98,243.24" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="104.73" x="982.9556" y="157.5605">Authors concepts,</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="169.6411" x="950.5" y="172.7949">submits for review (ADR-005)</text></g><!--link admin to pwa--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="55" id="lnk15"><path d="M1153.87,114.7 C1148.05,135.67 1138.87,158.86 1124.5,176.5 C1101.23,205.05 1072.8832,224.491 1041.4932,240.671" fill="none" id="admin-to-pwa" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1036.16,243.42,1045.9925,242.852,1040.6043,241.1292,1042.3271,235.741,1036.16,243.42" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="173.5894" x="1159.6931" y="157.5605">Reviews and approves/rejects</text><text fill="#000000" font-family="'Roboto'" font-size="13" lengthAdjust="spacing" textLength="203.9756" x="1144.5" y="172.7949">storybooks, cross-family (ADR